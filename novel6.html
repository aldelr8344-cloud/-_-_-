<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قارئ الروايات — مدينة السحاب</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Lateef:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon-pink: #ff2d9b;
      --neon-pink-glow: #ff2d9b88;
      --neon-pink-light: #ff6ec7;
    }

    html, body { min-height: 100vh; font-family: 'Tajawal', sans-serif; }

    body {
      background: #0a050a;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(120, 0, 80, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(60, 0, 100, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(80, 0, 60, 0.12) 0%, transparent 50%);
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("https://files.catbox.moe/bng341.png");
      pointer-events: none;
      z-index: 0;
    }

    .view { display: none; }
    .view.active { display: block; }

    #view-main {
      min-height: 100vh;
      position: relative;
      z-index: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }
    #view-main.active { display: flex; }

    .profile-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
    }

    .avatar-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      cursor: pointer;
      margin-bottom: 14px;
    }

    .avatar-wrap img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 2;
      transition: transform 0.4s ease;
    }
    .avatar-wrap:hover img { transform: scale(1.06); }

    .avatar-ring {
      position: absolute; inset: -5px;
      border-radius: 50%;
      background: conic-gradient(
        var(--neon-pink) 0deg, transparent 80deg,
        var(--neon-pink-light) 160deg, transparent 240deg,
        var(--neon-pink) 360deg
      );
      animation: spin 3s linear infinite;
      z-index: 1;
    }
    .avatar-ring::after {
      content: '';
      position: absolute; inset: 4px;
      border-radius: 50%;
      background: #0a050a;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-glow {
      position: absolute; inset: -15px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--neon-pink-glow) 0%, transparent 70%);
      animation: pulse-glow 2s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes pulse-glow {
      from { opacity: 0.5; transform: scale(0.95); }
      to   { opacity: 1;   transform: scale(1.05); }
    }

    .avatar-msg {
      position: absolute;
      bottom: -52px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(10,5,25,0.92);
      border: 1px solid var(--neon-pink);
      color: var(--neon-pink-light);
      font-size: 13px;
      white-space: nowrap;
      padding: 7px 16px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      box-shadow: 0 0 14px var(--neon-pink-glow);
      z-index: 10;
    }
    .avatar-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .novel-title-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .novel-main-title {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(26px, 6vw, 42px);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 30px var(--neon-pink-glow), 0 0 60px rgba(255,45,155,0.3);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .novel-subtitle {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(13px, 2.5vw, 16px);
      color: rgba(255,110,199,0.7);
      font-weight: 400;
      letter-spacing: 3px;
    }

    .main-card {
      background: rgba(10, 10, 15, 0.75);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border: 1px solid rgba(255, 45, 155, 0.22);
      border-radius: 20px;
      width: 100%; max-width: 640px;
      padding: 36px 28px 30px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .card-title {
      text-align: center;
      color: #f0e6ff;
      font-size: clamp(16px, 3.5vw, 20px);
      font-weight: 700;
      margin-bottom: 28px;
      text-shadow: 0 0 20px var(--neon-pink-glow);
    }

    .buttons-wrapper {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 24px;
    }

    .fall-btn {
      position: relative;
      padding: 0; border: none; background: none;
      cursor: pointer; outline: none;
      font-family: 'Tajawal', sans-serif;
      width: 100%;
    }

    .fall-btn .btn-top {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      padding: 14px 22px;
      font-size: clamp(13px, 2.5vw, 16px);
      font-weight: 700;
      color: var(--neon-pink-light);
      background: linear-gradient(135deg, #1a0a1e 0%, #0f0515 100%);
      border-radius: 12px;
      border: 1.5px solid rgba(255,45,155,0.4);
      box-shadow: 0 0 8px rgba(255,45,155,0.15), inset 0 1px 0 rgba(255,255,255,0.06);
      transform: translateY(-4px);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.2s;
      text-align: right;
    }
    .fall-btn .btn-num {
      font-size: 11px;
      color: rgba(255,110,199,0.5);
      font-weight: 400;
      margin-right: auto;
    }
    .fall-btn .btn-preview {
      display: block;
      font-size: 11px;
      color: rgba(200,160,220,0.6);
      font-weight: 400;
      margin-top: 3px;
    }
    .fall-btn .btn-text-wrap { text-align: right; flex: 1; }
    .fall-btn::after {
      content: '';
      display: block;
      position: absolute;
      bottom: 0; left: 6px; right: 6px; height: 8px;
      background: #5a0030;
      border-radius: 0 0 12px 12px;
      z-index: -1;
    }
    .fall-btn:hover .btn-top {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(255,45,155,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
      border-color: rgba(255,45,155,0.7);
    }
    .fall-btn:active .btn-top {
      transform: translateY(0);
      box-shadow: 0 0 6px var(--neon-pink-glow);
    }

    .chapter-msg {
      overflow: hidden; max-height: 0; opacity: 0;
      transition: max-height 0.5s ease, opacity 0.4s ease, padding 0.3s ease;
      text-align: center;
    }
    .chapter-msg.show { max-height: 80px; opacity: 1; padding: 12px 0 4px; }
    .chapter-msg span {
      display: inline-block;
      background: rgba(255,45,155,0.10);
      border: 1px solid rgba(255,45,155,0.3);
      border-radius: 30px;
      padding: 6px 20px;
      color: var(--neon-pink-light);
      font-size: 13px;
    }

    #view-chapter {
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .top-bar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8, 3, 20, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,45,155,0.20);
      padding: 13px 24px;
      text-align: center;
    }

    .chapter-label {
      color: #e8d8f8;
      font-size: clamp(14px, 3vw, 18px);
      font-weight: 700;
      text-shadow: 0 0 16px var(--neon-pink-glow);
    }

    .chapter-body {
      display: flex;
      justify-content: center;
      padding: 40px 16px 120px;
    }

    .reading-card {
      width: 100%; max-width: 760px;
      background: rgba(8, 5, 18, 0.82);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border: 1px solid rgba(255,45,155,0.15);
      border-radius: 16px;
      padding: clamp(28px, 5vw, 56px) clamp(22px, 5vw, 58px);
      box-shadow: 0 8px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .reading-card h2 {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(20px, 4vw, 30px);
      font-weight: 900;
      color: #fff;
      text-align: center;
      margin-bottom: 36px;
      text-shadow: 0 0 24px var(--neon-pink-glow);
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,45,155,0.2);
    }

    #chapterContent {
      font-family: 'Lateef', serif;
      font-size: clamp(19px, 2.8vw, 24px);
      line-height: 2.2;
      color: rgba(235,225,245,0.93);
      text-align: justify;
    }

    #chapterContent strong {
      display: block;
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(16px, 2.5vw, 20px);
      font-weight: 800;
      color: var(--neon-pink-light);
      text-align: center;
      margin: 36px 0 20px;
      text-shadow: 0 0 16px var(--neon-pink-glow);
      letter-spacing: 1px;
    }

    .bottom-controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(5, 2, 15, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,45,155,0.15);
      padding: 14px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      background: rgba(20,10,30,0.9); color: #ccc;
      border: 1.5px solid rgba(255,255,255,0.15); border-radius: 10px;
      padding: 10px 24px;
      font-family: 'Tajawal', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .ctrl-btn:hover { background: rgba(40,20,50,0.9); border-color: rgba(255,255,255,0.3); color: #fff; }
    .ctrl-btn:active { transform: scale(0.97); }
    .ctrl-btn.music-active { border-color: var(--neon-pink); color: var(--neon-pink-light); background: rgba(255,45,155,0.1); }

    .music-status {
      position: fixed;
      bottom: 72px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(10,5,25,0.93);
      border: 1px solid var(--neon-pink);
      color: #ff6ec7;
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      padding: 7px 20px;
      border-radius: 30px;
      white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      box-shadow: 0 0 16px var(--neon-pink-glow);
      z-index: 300;
    }
    .music-status.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .reading-card { border-radius: 12px; }
      .bottom-controls { gap: 10px; padding: 10px 12px; }
      .ctrl-btn { padding: 8px 16px; font-size: 13px; }
    }
  </style>
</head>
<body>

  <div id="view-main" class="view active">
    <div class="profile-section">
      <div class="avatar-wrap" onclick="toggleAvatarMsg()">
        <div class="avatar-glow"></div>
        <div class="avatar-ring"></div>
        <img
          src="https://files.catbox.moe/inbpcb.jpg"
          alt="صورة الرواية"
          onerror="this.src='https://ui-avatars.com/api/?name=رواية&background=1a0a1e&color=ff6ec7&size=200'"
        />
        <div class="avatar-msg" id="avatarMsg">ي بت اسكتي مدوسيش وخلاص 😂</div>
      </div>
    </div>

    <div class="novel-title-area" style="margin-top:60px;">
      <div class="novel-main-title">مدينة السحاب</div>
      <div class="novel-subtitle"> رواية خيال علمي </div>
    </div>

    <div class="main-card">
      <div class="card-title">✦ اختري الفصل الى عايزه تقرأيه  ✦<br> 🧪خيال علمي 🧪</div>
      <div class="buttons-wrapper" id="chaptersButtons"></div>
      <div class="chapter-msg" id="chapterMsg">
        <span id="chapterMsgText"></span>
      </div>
    </div>
  </div>

  <div id="view-chapter" class="view">
    <div class="top-bar">
      <span class="chapter-label" id="chapterLabel"></span>
    </div>
    <div class="chapter-body">
      <div class="reading-card">
        <h2 id="chapterTitle"></h2>
        <div id="chapterContent"></div>
      </div>
    </div>
    <div class="bottom-controls">
      <button class="ctrl-btn" id="musicBtn" onclick="handleMusic()">♪ تشغيل موسيقى</button>
      <button class="ctrl-btn" onclick="goBack()">← رجوع</button>
    </div>
    <div class="music-status" id="musicStatus"></div>
  </div>

  <script>
    const chapters = [
  {
    title: 'الفصل الأول — الخريطة اللي ما اتطبعتش',
    preview: '🗺️ سلمى تلاقي خريطة لمدينة طايرة... اختفت من مئة سنة',
    content: `<strong>— جزء أول —</strong><br/><br/>
الساعة كانت بالكاد واحدة الضهر لما سلمى فتحت الدرج القديم في مكتبة جدتها. الدرج ده كان مقفول من زمن — من قبل ما جدتها تموت بكتير. مفتاحه كان في ظرف صغير مكتوب عليه بخط جدتها: "لسلمى وبس، لما تبقى جاهزة."<br/><br/>
سلمى كانت دايماً بتتساءل: جاهزة لإيه بالظبط؟ جدتها ماتت وهي عندها سبع سنين، وفضل الظرف في درج الصالة لحد دلوقتي — وهي بقت عندها تسعة وعشرين سنة، باحثة في تاريخ العمارة القديمة، بتشتغل في الجامعة الأمريكية بالقاهرة.<br/><br/>
فتحت الدرج. جوه — ورق قديم، مطوي بعناية. مش ورق عادي — ورق سميك، أصفر من القِدَم، بس محفوظ كويس. فتحته بإيد واحدة وهي ماسكة نفسها بالتاني.<br/><br/>
خريطة.<br/><br/>
خريطة لمدينة — مدينة طايرة في السما.<br/><br/>
<strong>— جزء تاني —</strong><br/><br/>
سلمى اتكأت على الترابيزة. الخريطة كانت مرسومة بتفصيل مذهل — شوارع، مباني، ميادين، حتى تفاصيل صغيرة زي بيارات المياه وأعمدة الإنارة. الخط الفني دقيق ومتقن، زي خرايط المدن الأوروبية القديمة من القرن التاسع عشر.<br/><br/>
بس الغريب إن المدينة دي ما كانتش على الأرض. في الخريطة، المدينة كانت معلقة — جزر صخرية في السما، موصولة بجسور ضيقة. وتحتها — رسمة للأرض من بعيد، فيها مساحات خضرا ونيل.<br/><br/>
في أسفل الخريطة، مكتوب بخط رفيع: "مدينة العُلا — بُنيت سنة ١٨٩٤، اختفت سنة ١٩٢٠."<br/><br/>
وتحت ده مباشرة، بخط جدتها: "أنا شُفتِها. هي موجودة. دوّري."<br/><br/>
<strong>— جزء تالت —</strong><br/><br/>
سلمى قعدت على الكرسي ببطء. دماغها بدأ يشتغل — دماغ الباحثة اللي جوها. مدينة اسمها "العُلا" بُنيت سنة ١٨٩٤ واختفت سنة ١٩٢٠؟ ده مش موجود في أي سجل تاريخي قرأته. وهي قرأت كتير — التاريخ المعماري المصري محفوظ من الفراعنة لحد دلوقتي.<br/><br/>
رجعت لأول ما سمعت عن جدتها من أمها. جدتها — نجوى حلمي — كانت امرأة غريبة بكل المقاييس. كانت عالمة. مش موضة الست العالمة دي — هي فعلاً كانت عالمة في وقت مافيهوش ستات بتشتغل في العلوم. كانت متخصصة في الفيزيا وكانت بتشتغل مع فريق بحثي صغير، ما عرفتش أمها اسمه ولا وين كانوا بيشتغلوا.<br/><br/>
"أمها — إيه اللي كانت جدتي بتعمله بالظبط؟"<br/><br/>
أمها — اللي بتعيش في الإسكندرية — كانت دايماً بتقول: "كانت بتعمل أبحاث. مش فاهماه إيه بالظبط." ولما سلمى كانت بتلح، أمها كانت بتغير الموضوع.<br/><br/>
<strong>— جزء رابع —</strong><br/><br/>
سلمى صورت الخريطة بموبايلها — صورها من كل الزوايا. بعدين لفتها بحرص في ورقة ناعمة وحطتها في شنطتها. مش قادرة تسيبها هنا.<br/><br/>
في طريقها للجامعة، في الأوتوبيس، فتحت الصور على موبايلها وبدأت تكبّر وتدرس التفاصيل. الخريطة كانت فيها حاجات مثيرة للاهتمام — في زاوية، رسمة لآلة. آلة معقدة، مش واضح استخدامها، بس شكلها يشبه محرك ضخم. وجنبها أرقام ومعادلات.<br/><br/>
"دي معادلات فيزيا." سلمى همست لنفسها.<br/><br/>
الراجل الجالس جنبها في الأوتوبيس بصّلها. هي مش واخداه باله. كانت منهمكة في الصور.<br/><br/>
المعادلات — حتى هي مش عندها خلفية قوية في الفيزيا — كانت واضح إنها مش بسيطة. فيها رموز ما شافتهاش في حياتها.<br/><br/>
<strong>— جزء خامس —</strong><br/><br/>
وصلت الجامعة، روحت على طول لمكتب الدكتور طارق — زميلها في القسم، متخصص في تاريخ العلوم.<br/><br/>
طارق كان راجل أربعيني، نضيف، بيلبس نضارة سميكة ودايماً عنده كوباية قهوة في إيده. لما سلمى دخلت عليه، كان بيصحح أوراق إجابة.<br/><br/>
"طارق، عندي حاجة عايزك تبص فيها."<br/><br/>
"تفضلي." من غير ما يرفع راسه.<br/><br/>
"مش هتقدر تشوفها وإنت بتصحح." سحبت له الكرسي المقابل وقعدت.<br/><br/>
رفع راسه. شاف وشها — شاف إن الموضوع جدي. حط الأوراق جانب.<br/><br/>
"إيه اللي فيه؟"<br/><br/>
أرته الصور على موبايلها.<br/><br/>
<strong>— جزء سادس —</strong><br/><br/>
طارق أخد الموبايل وبدأ يكبّر الصور بأصابعه. وشه بدأ يتغير — الاسترخاء اختفى، وبدأ ترتسم عليه علامات الاهتمام الحقيقي.<br/><br/>
"ده إيه ده؟"<br/><br/>
"بسألك أنا."<br/><br/>
"مدينة طايرة؟" ضحك. بس الضحكة ما كانتش مقتنعة — كانت فيها شوية قلق. "ده خيال علمي."<br/><br/>
"الخريطة قديمة جداً يا طارق. ورقها أصيل — من الأرجح نهاية القرن التاسع عشر أو أول القرن العشرين. وجدتي كتبت عليها بإيدها."<br/><br/>
"جدتك كتبت إيه بالظبط؟"<br/><br/>
سلمى أخدت الموبايل وكبّرت الجزء التحتاني من الخريطة. طارق قرأ. صمت.<br/><br/>
"أنا شُفتِها. هي موجودة. دوّري." قرأ بصوت عالي. "ده... غريب."<br/><br/>
"المعادلات دي. إيه هي؟" سلمى كبّرت الجزء التاني.<br/><br/>
طارق بص. وجهه اتغير مرة تانية.<br/><br/>

"المدينة." ليلى دخلت الغرفة وقفلت الباب في إيدها. "إحنا هنا — ثلاتمية وخمسين نسمة دلوقتي. والجيل الجديد عايز ينزل. عايز يبني حياة في الأرض. البرج بيتعب — مش هيتحمل أكتر من خمستاشر سنة على الأكتر."<br/><br/>
"يعني المدينة هتنزل في الآخر."<br/><br/>
"آه. هتنزل. السؤال — إزاي وإمتى وفين."<br/><br/>
سلمى فكّرت. ثلاتمية وخمسين إنسان. عايشين في السما من مئة وأكتر من ثلاتين سنة. ما عرفوش الأرض من تحتهم. محتاجين مساعدة ينزلوا.<br/><br/>
"أنا هساعد." سلمى قالتها وهي متأكدة. "هساعدكوا تنزلوا. وهساعدكوا تبدأوا حياتكوا في الأرض. وهساعد في نشر النظرية بالطريقة الصح."<br/><br/>
طارق بصلها. "ده مشروع حياتك كلها."<br/><br/>
"أعرف."<br/><br/>
"وإنتي مستعدة؟"<br/><br/>
سلمى نظرت للأوراق — أوراق جدتها. نظرت للنافذة — للسما الصافية فوق السحاب. نظرت في إيدها — المفتاح النحاس الصغير اللي كان معاها طول عمرها من غير ما تعرف.<br/><br/>
"من زمان."<br/><br/>
<strong>— جزء اتناشر —</strong><br/><br/>
في اليوم التاني، قبل ما يرجعوا للأرض، سلمى عملت جولة في المدينة. مشت في شوارعها. شافت الناس — ناس عاديين، بيعيشوا حياتهم. أطفال بيلعبوا. ستات بتعمل حاجات في شرفاتهم. رجالة بيتكلموا في ميدان صغير.<br/><br/>
الكل بص إليها بفضول. بعضهم حياها. واحدة بعتت ابنها يجيبلها برتقالة — برتقالة مزروعة في المدينة الطايرة.<br/><br/>
في وسط الميدان، قعدت على حافة نافورة صغيرة. المياه كانت عذبة ومتدفقة. رفعت راسها وبصت للسما — سما فوقهم صافية وزرقا.<br/><br/>
جدتها جلست هنا يوماً ما. حلمت بالمدينة دي. بنتها. وتركتها — سلمى — تكمل.<br/><br/>
<strong>— جزء تلتاشر —</strong><br/><br/>
رجعوا بالمصعد للأرض. الصعود كان صعود المسؤولية، والنزول كان نزول الحكمة.<br/><br/>
في الأسفل — سامي كان مستنيهم.<br/><br/>
كان واقف بجانب العربية بتاعت عادل. وحده. ومافيش أسلحة — ما كانش مسلح. بيبص بعيون تعبت، مش بعيون عدوانية.<br/><br/>
"كنت عارف إنكوا هترجعوا من هنا." قاله بهدوء.<br/><br/>
سلمى وقفت قدامه. "مين إنت بالظبط؟"<br/><br/>
"أنا باحث. في مجال الطاقة." سامي أخرج بطاقة من جيبه. "بشتغل لمنظمة علمية دولية مستقلة — مش حكومة ومش شركة. هدفنا الوحيد هو إتاحة العلم للجميع."<br/><br/>
"وبعتوا رسالة تهديد لأمي."<br/><br/>
"مش تهديد — عرض تعاون. الرسالة اتكتبت بطريقة غلط. آسف على ده." سامي بصلها بمباشرة. "لاقيتوا اللي كنتوا بتدوروا عليه؟"<br/><br/>
<strong>— جزء أربعتاشر —</strong><br/><br/>
سلمى فكرت. نظرت لطارق — الاتنين فكروا في نفس اللحظة. بعدين نظرت لعادل — العجوز الهادي بص إليها بعيون "القرار قرارك".<br/><br/>
"آه. لاقينا حاجة." سلمى قالت بحذر. "بس مش هنقدر نشاركها دلوقتي. لو منظمتك صادقة — هيجي وقت ونتعاون بالطريقة الصح."<br/><br/>
سامي بص بوشها طويلاً. بعدين قال: "فاهم." أخد خطوة للجانب. "أنا ما هعيقكوش. بس خلّوا في بالكوا — في ناس تانية بيدوروا على نفس الحاجة. وهم مش زيّي."<br/><br/>
"شكراً على التحذير." سلمى مشت. وطارق وعادل مشوا وراها.<br/><br/>
في العربية، وهم بيرجعوا لأسوان، كانوا صاتين. الصحرا حواليهم حمرا في الغروب. والسما — البنية الأولى للليل — كانت بتملا بالنجوم.<br/><br/>
<strong>— جزء خمستاشر — النهاية —</strong><br/><br/>
بعد سنة من رحلتها لأسوان، سلمى كانت قاعدة في مكتبها في الجامعة. على الترابيزة — أوراق. مش أوراق عادية — نسخ من أوراق جدتها، معدّلة ومراجعة ومشروحة بلغة عصرية.<br/><br/>
طارق كان يساعدها — قضوا السنة دي بيترجموا المعادلات لنظام رياضي حديث. بيراجعوا كل سطر. بيتأكدوا من كل معادلة. الشغل كان بطيء ومضني — بس ما في وقفة واحدة.<br/><br/>
وعادل — العجوز — كان بيتواصل معاهم كل أسبوع. من أسوان، كان بيتابع المدينة. والمدينة — ببطء — بدأت عملية النزول. بدأت بعيلات عايزة تنزل للأرض. عادل كان بيساعدهم يندمجوا، يجيبلهم أوراق رسمية، يجيبلهم مسكن.<br/><br/>
وليلى — نزلت هي برضو. لأول مرة في حياتها رأت النيل عن قرب. لأول مرة في حياتها وقفت على أرض تحتها أرض تانية.<br/><br/>
قالت لسلمى يوم النزول: "ظننت سأخاف. لكنني شعرت بالسلام."<br/><br/>
وأمها — نادية — جات من الإسكندرية وقابلت ليلى. الاتنين قعدوا يتكلموا لساعات — عن جدتين، عن حياتين، عن مدينة ربطتهم من غير ما يعرفوا.<br/><br/>
سلمى، في الليل، رجعت للبلكونة وبصت للسما. مش بتدور على المدينة — المدينة كانت لسه هناك، فوق السحاب. ببطء بتنزل.<br/><br/>
وهي — سلمى — كانت عارفة إنها هتكمل اللي جدتها بدأته. مش لأنها ملزمة. لأنها بتحب.<br/><br/>
والعلم — زي ما جدتها كتبت — يجب أن يُشارَك.<br/><br/>
<strong>— النهاية —</strong>`
  }

    let currentChapterIndex = null;

    function toggleAvatarMsg() {
      const msg = document.getElementById('avatarMsg');
      msg.classList.toggle('show');
      setTimeout(() => msg.classList.remove('show'), 3000);
    }

    function renderChapters() {
      const container = document.getElementById('chaptersButtons');
      container.innerHTML = '';
      chapters.forEach((ch, idx) => {
        const btn = document.createElement('button');
        btn.className = 'fall-btn';
        btn.onclick = () => openChapter(idx);
        btn.innerHTML = `
          <div class="btn-top">
            <span class="btn-num">${idx + 1}</span>
            <div class="btn-text-wrap">
              <div>${ch.title}</div>
              <div class="btn-preview">${ch.preview}</div>
            </div>
          </div>
        `;
        container.appendChild(btn);
      });
    }

    function openChapter(index) {
      currentChapterIndex = index;
      const ch = chapters[index];
      document.getElementById('chapterLabel').textContent = ch.title;
      document.getElementById('chapterTitle').textContent = ch.title;
      document.getElementById('chapterContent').innerHTML = ch.content;
      document.getElementById('view-main').classList.remove('active');
      document.getElementById('view-chapter').classList.add('active');
      window.scrollTo(0, 0);
    }

    function goBack() {
      document.getElementById('view-chapter').classList.remove('active');
      document.getElementById('view-main').classList.add('active');
      window.scrollTo(0, 0);
    }

    function handleMusic() {
      const btn = document.getElementById('musicBtn');
      const status = document.getElementById('musicStatus');

      if (!musicPlaying) {
        audio = new Audio(tracks[currentTrack]);
        audio.loop = true;
        audio.volume = 0.5;
        audio.play();
        musicPlaying = true;
        btn.classList.add('music-active');
        btn.textContent = '♪ إيقاف الموسيقى';
        status.textContent = '🎵 موسيقى ' + (currentTrack + 1);
      } else {
        audio.pause();
        currentTrack++;
        if (currentTrack < tracks.length) {
          audio = new Audio(tracks[currentTrack]);
          audio.loop = true;
          audio.volume = 0.5;
          audio.play();
          btn.textContent = '♪ إيقاف الموسيقى';
          status.textContent = '🎵 موسيقى ' + (currentTrack + 1);
        } else {
          musicPlaying = false;
          currentTrack = 0;
          audio = null;
          btn.classList.remove('music-active');
          btn.textContent = '♪ تشغيل موسيقى';
          status.textContent = '🎵 الموسيقى متوقفة';
        }
      }
      status.classList.add('show');
      setTimeout(() => status.classList.remove('show'), 2000);
    }

    renderChapters();
