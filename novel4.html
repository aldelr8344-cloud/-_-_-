<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قارئ الروايات</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon-pink: #23B31D;
      --neon-pink-glow: #326D2C;
      --neon-pink-light: #18FF00;
    }

    html, body { min-height: 100vh; font-family: 'Cairo', sans-serif; }

    body {
      background: url('https://files.catbox.moe/wp6z00.jpg') no-repeat center center fixed;
      background-size: cover;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, rgba(10,5,30,0.45) 0%, rgba(5,0,20,0.55) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ═══════════════════════════════════
       VIEWS — كل .view هي "صفحة" كاملة
    ═══════════════════════════════════ */
    .view { display: none; }
    .view.active { display: block; }

    /* ═══════════════════════════════════
       VIEW 1 — الصفحة الرئيسية
    ═══════════════════════════════════ */
    #view-main {
      min-height: 100vh;
      position: relative;
      z-index: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }
    #view-main.active { display: flex; }

    /* Avatar */
    .profile-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
    }

    .avatar-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      cursor: pointer;
      margin-bottom: 14px;
    }

    .avatar-wrap img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 2;
      transition: transform 0.4s ease;
    }
    .avatar-wrap:hover img { transform: scale(1.06); }

    .avatar-ring {
      position: absolute; inset: -5px;
      border-radius: 50%;
      background: conic-gradient(
        var(--neon-pink) 0deg, transparent 80deg,
        var(--neon-pink-light) 160deg, transparent 240deg,
        var(--neon-pink) 360deg
      );
      animation: spin 3s linear infinite;
      z-index: 1;
    }
    .avatar-ring::after {
      content: '';
      position: absolute; inset: 4px;
      border-radius: 50%;
      background: #0a050a;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-glow {
      position: absolute; inset: -15px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--neon-pink-glow) 0%, transparent 70%);
      animation: pulse-glow 2s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes pulse-glow {
      from { opacity: 0.5; transform: scale(0.95); }
      to   { opacity: 1;   transform: scale(1.05); }
    }

    .avatar-msg {
      position: absolute;
      bottom: -52px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(10,5,25,0.92);
      border: 1px solid var(--neon-pink);
      color: var(--neon-pink-light);
      font-size: 13px;
      white-space: nowrap;
      padding: 7px 16px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      box-shadow: 0 0 14px var(--neon-pink-glow);
      z-index: 10;
    }
    .avatar-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Main card */
    .main-card {
      background: rgba(10, 10, 15, 0.70);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border: 1px solid rgba(255, 45, 155, 0.22);
      border-radius: 20px;
      width: 100%; max-width: 620px;
      padding: 36px 28px 30px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .card-title {
      text-align: center;
      color: #f0e6ff;
      font-size: clamp(18px, 4vw, 24px);
      font-weight: 700;
      margin-bottom: 28px;
      text-shadow: 0 0 20px var(--neon-pink-glow);
    }

    /* Fall buttons */
    .buttons-wrapper {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .fall-btn {
      position: relative;
      padding: 0; border: none; background: none;
      cursor: pointer; outline: none;
      font-family: 'Cairo', sans-serif;
    }

    .fall-btn .btn-top {
      display: block;
      position: relative;
      padding: 10px 20px;
      font-size: clamp(13px, 2.5vw, 15px);
      font-weight: 700;
      color: var(--neon-pink-light);
      background: #1a0a1e;
      border-radius: 10px;
      border: 1.5px solid var(--neon-pink);
      box-shadow: 0 0 8px var(--neon-pink-glow), inset 0 1px 0 rgba(255,255,255,0.08);
      transform: translateY(-4px);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      white-space: nowrap;
    }
    .fall-btn::after {
      content: '';
      display: block;
      position: absolute;
      bottom: 0; left: 4px; right: 4px; height: 8px;
      background: #7a0040;
      border-radius: 0 0 10px 10px;
      z-index: -1;
    }
    .fall-btn:hover .btn-top {
      transform: translateY(-2px);
      box-shadow: 0 0 16px var(--neon-pink), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .fall-btn:active .btn-top {
      transform: translateY(0);
      box-shadow: 0 0 6px var(--neon-pink-glow);
    }

    .chapter-msg {
      overflow: hidden; max-height: 0; opacity: 0;
      transition: max-height 0.5s ease, opacity 0.4s ease, padding 0.3s ease;
      text-align: center;
    }
    .chapter-msg.show { max-height: 80px; opacity: 1; padding: 12px 0 4px; }
    .chapter-msg span {
      display: inline-block;
      background: rgba(255,45,155,0.10);
      border: 1px solid rgba(255,45,155,0.3);
      border-radius: 30px;
      padding: 6px 20px;
      color: var(--neon-pink-light);
      font-size: 13px;
    }

    /* ═══════════════════════════════════
       VIEW 2 — صفحة الفصل
    ═══════════════════════════════════ */
    #view-chapter {
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .top-bar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8, 3, 20, 0.80);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,45,155,0.20);
      padding: 13px 24px;
      text-align: center;
    }

    .chapter-label {
      color: #e8d8f8;
      font-size: clamp(14px, 3vw, 18px);
      font-weight: 700;
      text-shadow: 0 0 16px var(--neon-pink-glow);
    }

    .chapter-body {
      display: flex;
      justify-content: center;
      padding: 40px 16px 120px;
    }

    .reading-card {
      width: 100%; max-width: 720px;
      background: rgba(255, 252, 255, 0.18);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 16px;
      padding: clamp(24px, 5vw, 48px) clamp(20px, 5vw, 52px);
      box-shadow: 0 8px 50px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.06) inset;
    }

    .reading-card h2 {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 900;
      color: #fff;
      text-align: center;
      margin-bottom: 28px;
      text-shadow: 0 0 24px var(--neon-pink-glow);
    }

    .reading-card p {
      font-family: 'Amiri', serif;
      font-size: clamp(16px, 2.5vw, 20px);
      line-height: 2.1;
      color: rgba(255,255,255,0.92);
      text-align: justify;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }

    /* Fixed bottom bar */
    .bottom-controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(5, 2, 15, 0.90);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,0.10);
      padding: 14px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      background: #111; color: #ddd;
      border: 1.5px solid #333; border-radius: 8px;
      padding: 9px 22px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .ctrl-btn:hover { background: #1e1e1e; border-color: #555; color: #fff; }
    .ctrl-btn:active { background: #0a0a0a; transform: scale(0.97); }
    .ctrl-btn.music-active { border-color: var(--neon-pink); color: var(--neon-pink-light); }

    .music-status {
      position: fixed;
      bottom: 72px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(10,5,25,0.93);
      border: 1px solid var(--neon-pink);
      color: #23B31D;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      padding: 7px 20px;
      border-radius: 30px;
      white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      box-shadow: 0 0 16px var(--neon-pink-glow);
      z-index: 300;
    }
    .music-status.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Responsive */
    @media (max-width: 480px) {
      .reading-card { border-radius: 12px; }
      .bottom-controls { gap: 10px; padding: 10px 12px; }
      .ctrl-btn { padding: 8px 16px; font-size: 13px; }
      .avatar-msg { font-size: 11px; white-space: normal; text-align: center; width: 200px; bottom: -66px; }
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════ -->
  <!-- VIEW 1 — الصفحة الرئيسية     -->
  <!-- ══════════════════════════════ -->
  <div id="view-main" class="view active">

    <div class="profile-section">
      <div class="avatar-wrap" onclick="toggleAvatarMsg()">
        <div class="avatar-glow"></div>
        <div class="avatar-ring"></div>
        <!-- ← غيّر الـ src بصورتك -->
        <img
          src="https://files.catbox.moe/inbpcb.jpg"
          alt="صورة الكاتب"
          onerror="this.src='https://ui-avatars.com/api/?name=رواية&background=1a0a1e&color=ff6ec7&size=200'"
        />
        <div class="avatar-msg" id="avatarMsg">بخ👻😂 ازيك ي مزه 🫣
        </div>
      </div>
    </div>

    <div class="main-card">
      <div class="card-title">✦ اختري الفصل الى هتقرأيه 🌹✦
      <br>رعب إلكتروني 💻</div>
      <div class="buttons-wrapper">
        <button class="fall-btn" onclick="goToChapter(0, this)"><span class="btn-top">الفصل الأول</span></button>
        <button class="fall-btn" onclick="goToChapter(1, this)"><span class="btn-top">الفصل الثاني</span></button>
        <button class="fall-btn" onclick="goToChapter(2, this)"><span class="btn-top">الفصل الثالث</span></button>
        <button class="fall-btn" onclick="goToChapter(3, this)"><span class="btn-top">الفصل الرابع</span></button>
        <button class="fall-btn" onclick="goToChapter(4, this)"><span class="btn-top">الفصل الخامس</span></button>
      </div>
      <div class="chapter-msg" id="chapterMsg">
        <span id="chapterMsgText"></span>
      </div>
    </div>

  </div>

  <!-- ══════════════════════════════ -->
  <!-- VIEW 2 — صفحة الفصل           -->
  <!-- ══════════════════════════════ -->
  <div id="view-chapter" class="view">

    <div class="top-bar">
      <span class="chapter-label" id="chapterLabel"></span>
    </div>

    <div class="chapter-body">
      <div class="reading-card">
        <h2 id="chapterTitle"></h2>
        <p id="chapterContent"></p>
      </div>
    </div>

    <div class="bottom-controls">
      <button class="ctrl-btn" id="musicBtn" onclick="handleMusic()">♪ تشغيل أغاني</button>
      <button class="ctrl-btn" onclick="goBack()">← رجوع</button>
    </div>
    <div class="music-status" id="musicStatus"></div>

  </div>

  <script>
    /* ══════════════════════════════
       DATA — محتوى الفصول
    ══════════════════════════════ */
    const chapters = [
      {
        title: 'الفصل الأول — شاشة سودا وكلام منور',
        preview: 'البداية مكنتش مرعبة، البداية كانت مجرد رسالة غريبة على جهاز "الديلر" في وقت متأخر من الليل.',
        content: `<strong>الجزء الأول: هدوء قبل العاصفة</strong><br/><br/>الساعة كانت داخلة على ثلاثة الفجر. الأوضة مفيهاش أي صوت غير الزن الخفيف بتاع مروحة الكيسة، والنور الوحيد اللي صاحي هو إضاءة الشاشة الزرقا اللي عاكسة على وش مصطفى. مصطفى، أو زي ما كل الناس في جروبات البرمجة والتليجرام بتلقبه "الديلر"، كان قاعد ضهره محني، عينيه متبتة في السطور بتاعة الكود اللي شغال عليه بقاله ست ساعات من غير فصلة. كوباية الشاي اللي جنبه كانت بردت تماماً، وعليها وش خفيف بيعكس ضوء الشاشة الرقاق.<br/><br/>مصطفى طالب في تالتة ثانوي، بس دماغه في السيرفرات والأكواد تعدي سنين. كان بيقفل بوت تليجرام جديد لجروب المذاكرة بتاعه، بيظبط فيه شوية ملفات وحماية عشان يستحمل الضغط. مد إيده مسك الماوس، عمل "سيف" للمشروع، وأخد نفس طويل وهو بيرجع ضهره لورا وسامع طقطقة ضلوعه. فتح شباك الأوضة الموارب، دخلت نسمة هوا باردة من بتاعة الفجرية، طيرت ورق المحاضرات اللي مالي المكتب. سكت ثواني وهو بيبص على الشارع الفاضي تحت، مفيش غير كلب غلبان بيجر شكل ضل عمود النور.<br/><br/>قفل الشباك ورجع قعد، قال في سره: "خلاص هانت، أرفع الملفات دي على السيرفر وأقوم أنام عشان الدرس الصبح". فتحت اللاب توب تيرمنال سودا، وبدأ يكتب أوامر الـ SSH عشان يدخل على السيرفر الخاص بتاعه. الشاشات كانت بتتحرك بسرعة، سطور بيضا بتجري ورا بعضها، ومصطفى حافظ الخطوات دي زي اسمه، بيعملها وعينيه مقفلة من التعب.<br/><br/><strong>الجزء الثاني: الإشعار الغريب</strong><br/><br/>وفجأة، الكيبورد وقفت عن الاستجابة. مصطفى داس على زرار الـ Enter كذا مرة، مفيش فايدة. افتكر في الأول إن الجهاز هنج من كتر الشغل، أو إن الرامات اتملت. لسه بيمد إيده عشان يعمل ريستارت للتيرمنال، سمع صوت "تكة" غريبة خارجة من سماعات اللاب توب. الصوت مكنش عالي، بس في هدوء الفجر ده كان زي ضربة شاكوش.<br/><br/>الشاشة السودا اتنطفت خالص لثانية واحدة، وبعدين اشتغلت تاني. بس المرة دي مكنش فيه سطور الأكواد بتاعة البوت اللي صممها. كان فيه سطر واحد بس مكتوب في نص الشاشة بلون أحمر غامق، لون يشبه الدم الناشف. السطر كان مكتوب بفرونت غريب، حروفه بتتهز كأنها بتتحرك تحت المايه: [مرحباً بك في السيرفر المحلي.. يا ديلر].<br/><br/>جسم مصطفى قشعر. أول حاجة جت في باله إن حد من أصحابه الهكرز بيغلس عليه، أو إن في "ثغرة" في البوت اللي لسه رافعه وحد استغلها عشان يخترق جهازه. ابتسم بسخرية وهو بيقول لنفسه: "ماشي يا يوسف، مفيش غيرك بيحب الحركات دي، هجيبك". بدأ يكتب أمر عشان يقفل الاتصال الخارجي (Kill Connection)، بس الحروف مكنتش بتكتب على الشاشة. الجهاز كان رافض يستقبل أي أمر منه تماماً.<br/><br/><strong>الجزء الثالث: الرسالة الشخصية</strong><br/><br/>بينما هو بيحاول يشد كابل النت، السطر الأحمر اختفى، وظهر مكانه كلام جديد، بس المرة دي الكلام مكنش عام. الكلام كان دقيق لدرجة تخوف. ظهر على الشاشة: [جنى نايمة دلوقتي، متقلقش عليها.. ركز معايا أنا].<br/><br/>مصطفى حس ببرودة مفاجئة نزلت في عموده الفقري. جنى؟ مفيش حد من أصحابه يعرف الاسم ده بالعمق ده، ولا الدلع اللي بينهم. دي تفاصيل في شات مقفول ومتشفر ومش ظاهر لأي حد. ايده بدأت تترعش وهو ماسك الماوس. شال الفيشة بتاعة النت خالص من الراوتر اللي جنبه، وبص على لمبات الراوتر لقاها طفت فعلياً. المفروض كدا الجهاز معزول تماماً عن العالم الخارجي ولا يمكن يستقبل بيانات.<br/><br/>لكن الشاشة منطفتش، بالعكس، الإضاءة زادت، والكلام اتغير فوراً كأنه شايف حركته وبيرد على تفكيره: [فاكر لما تفصل اللان كده أنت أمان؟ أنا مش جاي من السلك يا مصطفى.. أنا جوه الـ Bios بتاعك، أنا جوه الأوضة].<br/><br/>في اللحظة دي، مروحة اللاب توب بدأت تلف بسرعة جنونية مسمعتهاش قبل كده. الصوت بقى عالي جداً كأن الجهاز هيتفجر من كتر الضغط. مصطفى وقف من على الكرسي ورجع خطوتين لورا وهو بينهج. الأوضة بقت دافية وسخنة فجأة بسبب الحرارة اللي طالعة من اللاب توب. حاول يدوس على زرار الباور عشان يقفل الجهاز قفل إجباري، صباعه لمس الزرار بس مفيش أي استجابة. اللاب توب كان عايش حياته الخاصة ومسيطر على الهاردوير كله.<br/><br/><strong>الجزء الرابع: الصوت المجهول</strong><br/><br/>الصوت مكنش طالع من السماعات بس، مصطفى بدأ يسمع خروشة خفيفة تانية جاية من ورا الدولاب بتاعه. صوت شبه حك ضوافر في الخشب، أو سلك نحاس بيتكحت في الحيطة ببطء. بص لورا بسرعة وهو بيتلفّت، النور الفوسفوري بتاع الماوس الجيمنج كان بينور ويطفي على الأرض بريتم سريع ومنتظم، زي ضربات قلب واحد خايف بيموت من الرعب.<br/><br/>التلفزيون القديم اللي محطوط في الصالة بره الأوضة اشتغل لوحده فجأة. مصطفى سمع صوت وش المذياع أو قنوات مش متظبطة [شـشـشـشـش]. الصوت كان عالي وبيتردد في شقة عيلته النايمة ومفيش حد فيهم صحي. جري على باب الأوضة وفتحه بسرعة عشان يخرج يقفله، بس أول ما فتح الباب، لقى الصالة كحل، مفيش أي نور، والتلفزيون شاشته سودا تماماً بس مطلع الصوت المرعب ده من سماعاته الداخلية.<br/><br/>"بابا؟ ماما؟" مصطفى نده بصوت مخنوق ومكتوم عشان ميصحيهمش برعب، بس مكنش فيه أي رد. الشقة كانت هادية زيادة عن اللزوم، هدوء تقيل وبارد يخليك تسمع صوت ريقك وأنت بتبلعه بالعافية. رجع أوضته بسرعة وقفل الباب وراه بالمفتاح، وحط ضهره على الباب وهو بينهج ونبضه واصل لسقف الأوضة.<br/><br/><strong>الجزء الخامس: الكاميرا مفتوحة</strong><br/><br/>لما بص على اللاب توب تاني، لقى اللمبة الصغيرة الخضرا اللي جنب الكاميرا (Webcam) نورت وثبتت. اللمبة دي معناها إن الكاميرا شغالة وبتسجل لايف. الشاشة السودا اتغيرت وبقت عارضة بث مباشر للمكان اللي هو واقف فيه في اللحظة دي! كان شايف نفسه وضهره وهو ساند على الباب من زاوية الكاميرا المحطوطة عالمكتب.<br/><br/>بس الغريب والمخيف، إن في البث المباشر اللي معروض على الشاشة، مكنش واقف لوحده عند الباب. كان فيه ضل أسود طويل جداً، ملوش ملامح واضحة، واقف لازق في ضهره، وايد الضل ده كانت مرفوعة ومحطوطة على كتف مصطفى اليمين في الشاشة وبتضغط عليه ببطء.<br/><br/>مصطفى بص على كتفه اليمين في الحقيقة وهو هيموت من الرعب، مكنش فيه حاجة شايفها بعينه المجردة في الأوضة. بس كتفه كان ساقع جداً، برودة لدرجة التجميد، كأن حد حاطط حتة تلت على لحمه المكشوف. صرخ صرخة مكتومة وتحرك بسرعة بعيد عن الباب، ورمى نفسه في نص الأوضة وهو بيبص حواليه يمين وشمال وجروب المذاكرة كله بيدور في دماغه.<br/><br/><strong>الجزء السادس: الرمز الملعون</strong><br/><br/>الكلام رجع يتكتب تاني على الشاشة، بسرعة شديدة الأسطر بتنزل ورا بعضها وعاملة زحمة أكواد: [أنت شاطر في الأكواد يا ديلر، بتعرف تعمل فك تشفير؟ طب فك ده]. الشاشة بدأت تعرض رموز غريبة، مش لغات برمجة معروفة خالص، مكنتش C++ ولا Python ولا لغة JavaScript اللي متعود عليها. كانت رموز تشبه الحروف الهيروغليفية القديمة بس مدموجة مع علامات رياضية معقدة وكسور غريبة بشكل يوجع العين.<br/><br/>الرموز دي كانت بتتحرك وبتلف في دوائر سريعة على الشاشة، وكل ما تلف، صوت الزن في ودن مصطفى كان بيزيد بطريقة لا تحتمل. بدأ يحس بصداع رهيب في نفوخه، كأن في مسمار صددي بيدق في دماغه من ورا بمرزبة. حط إيديه الاتنين على ودنه وضغط جامد عشان يفصل الصوت، بس الصوت مكنش من بره.. الصوت كان بيطلع من جوه جمجمته وخلايا مخه نفسها.<br/><br/>الموبايل بتاعه اللي كان محطوط على السرير بدأ يتهز فجأة بشكل متواصل. مكنش فيه رن ولا اتصال عادي، كان بيتهز ويسخن لدرجة الغليان. شاشة الموبايل نورت لوحدها، وفتحت برنامج التليجرام من غير ما يلمسه، ودخلت على الجروب بتاعه وبدأت تبعت رسايل لوحدها.<br/><br/><strong>الجزء السابع: انتشار العدوى</strong><br/><br/>مصطفى زحف على الأرض بتعب وبطء لحد ما وصل للموبايل، مسكه بإيد بتترعش عشان يقفله خالص. شاف الرسايل اللي بتتبعت من أكونته لجروب "عباقرة تالتة ثانوي". كانت نفس الرموز الملعونة الغريبة اللي بتجري على اللاب توب. المشكلة الكبيرة إن في أعضاء من المشرفين والطلاب كانوا صاحيين بيذاكروا في الوقت ده، وبدأوا يشوفوا الرسايل ويتفاعلوا معاها.<br/><br/>منة وحبيبة كتبوا في نفس الوقت برعب: "إيه ده يا مصطفى؟ أنت بتهزر؟ إيه الحروف دي؟". مصطفى حاول يكتب لهم "اخرجوا من الجروب واقفلوا النت فورا"، بس الكيبورد بتاعة الموبايل كانت بتكتب الرموز دي بس وبترفض أي حرف عربي. وفجأة، أكونت يوسف (الادمن التالت) كتب رسالة أخيرة: "الحقوني.. الشاشة عندي بتنور أحمر لوحدها واللاب قفل".<br/><br/>الشيء اللي اخترق جهاز مصطفى مكنش ناوي يقعد عنده بس، ده كان بيستخدم السيرفر الشخصي والبوت بتاعه كـ "موزع" رئيسي عشان ينقل العدوى دي لكل الأجهزة المتصلة بالجروب. مصطفى بص للشاشة الكبيرة بتاعة اللاب توب ودموعه نازلة، الضل الأسود اللي في الكاميرا مكنش عند الباب خلاص.. الضل كان بيتحرك في البث المباشر وجاي ناحية الكرسي والمكتب.. كأنه بيمد إيده برا الشاشة عشان يخرج للواقع الفعلي ويبدأ الفصل التاني في بيوت باقي زمايله.`

       {
        title: 'الفصل الثاني — صدى في صمت البيوت',
        preview: 'الرموز الملعونة مبقتش مجرد رسايل على شاشة مصطفى، دي بدأت تمد إيديها لبيوت صحابه في نص الليل.',
        content: `<strong>الجزء الأول: انقطاع مفاجئ</strong><br/><br/>
الساعة كانت مأخرة والجو بدأ يسقع زيادة، وفي بيت يوسف، الهادي اللي ملوش في المشاكل ومقضيها مذاكرة وبرمجة على الهادي، كان قاعد في أوضته متبت في ملخص الفيزياء. فجأة، اللاب توب بتاعه اللي محطوط على جنب وبيتفّرج منه على شرح المحاضرات عمل صوت "ززززز" عالي، والشاشة قلبت للون أحمر دموي منور غطى على حيطان الأوضة البيضا وصبغها بلون غريب يقبض الصدر.<br/><br/>
يوسف اتخض ورمى القلم من إيده، بص للشاشة وهو مش فاهم حاجة، افتكر الكارت بتاع الشاشة اتفجر أو الويندوز جاب شاشة الموت بس بنسخة حمرا. مد إيده بسرعة عشان يفصل الشاحن، بس أول ما صوابعه لمست السلك، حس بلسعة كهربا جامدة جمدت دمه في عروقه وخليته يرجع إيده لورا وهو بيصرخ صرخة مكتومة. فتح موبايله بسرعة عشان يكتب لمصطفى على جروب التليجرام يلحقه، كتب بصباع بيترعش: "الحقوني.. الشاشة عندي بتنور أحمر لوحدها واللاب قفل"، ودي كانت آخر رسالة واضحة يقدر يبعتها قبل ما الموبايل نفسه يتشنج في إيده.<br/><br/>
الشاشة الحمرا على اللاب توب بدأت تتطفي ببطء، وتظهر مكانها الحروف الهيروغليفية المدموجة بالرموز الرياضية المعقدة اللي مصطفى كان بيحاول يفك تشفيرها. الحروف كانت بتتحرك في دوائر سريعة وبتعمل صوت خروشة يشبه صوت حك حديد في بلاط. يوسف وقف على رجله وهو حاسس بركبته بتخبط في بعضها، وبدأ يرجع لورا لحد ما ضهره لزق في حيطة الأوضة الساقعة.<br/><br/>
<strong>الجزء الثاني: شات الموت</strong><br/><br/>
في نفس الدقيقة، وعلى بعد كام شارع، كانت منة قاعدة على سريرها، حاطة الكتب حواليها وبتحاول تركز في مسألة رياضيات واقفة معاها. الموبايل بتاعها كان منور جنبه، وأول ما شافت رسايل مصطفى الغريبة ويوسف، افتكرتهم في الأول بيهزروا أو بيعملوا مقلب من بتوع الهكرز عشان يغطوا على المذاكرة. كتبت بضحكة خفيفة: "إيه ده يا مصطفى؟ أنت بتهزر؟ إيه الحروف دي؟".<br/><br/>
بس الرد مكنش من مصطفى البشري. الرد نزل من أكونت "الديلر" في ثانية واحدة، وكان عبارة عن سطر كود غريب مكتوب فيه اسمها بالكامل بالرقم القومي بتاعها، وتحته جملة: [منة.. مسألة الرياضة حلها مش في الكتاب، حلها ورا الدولاب عندك]. البنت قلبها سقط في رجليها. الضحكة اختفت تماماً من على وشها، والدم هرب من عروقها في ثانية. مفيش أي مخلوق في الجروب يعرف تفاصيل بيتها، ولا يعرف أصلاً إن الدولاب بتاعها محطوط ورا السرير بالظبط بحيث ضله بييجي عليها وهي بتذاكر.<br/><br/>
منة بدأت تتنفس بسرعة، وحست إن الأوضة بقت خنقة. الموبايل في إيدها بدأ يسخن بطريقة مش طبيعية، لدرجة إنها حست بجلد إيدها بيلسعها. حاولت تدوس على زرار الباور عشان تقفل الموبايل خالص وتخلص من الكابوس ده، بس الشاشة جمدت على صورة الرموز دي، وبدأت اللمبة الصغيرة بتاعة النوتيفيكيشن تنور وتطفي بلون فوسفوري مرعب.<br/><br/>
<strong>الجزء الثالث: صمت حبيبة</strong><br/><br/>
أما حبيبة، فكانت الأهدأ في الجروب، بس الهدوء ده مكنش هينقذها. حبيبة كانت فاتحة التليجرام من على شاشة كمبيوتر مكتبي (PC) كبير. لما شافت الرسايل والرموز بتنزل زي المطر والجروب بيتحول لساحة رعب، حركت الماوس بسرعة وضغطت على زرار "مغادرة المجموعة" (Leave Group). كان عندها إحساس إن ده فيروس خبيث ومنتشر، والحل هو الهروب فوراً.<br/><br/>
لكن أول ما درست "تأكيد المغادرة"، الكمبيوتر مخرجش من الجروب. بالعكس، السهم بتاع الماوس بدأ يتحرك لوحده على الشاشة بشكل دائري جنوني، كأن في إيد خفية ماسكة الماوس وبتحركه بقوة. الكمبيوتر بدأ يفتح ملفات قديمة عندها، صور عائلية، ملفات مذاكرة، ويبعتها للجروب بسرعة غريبة جداً كأن السيرفر بيمص كل بيانات الجهاز ويحملها للعلن.<br/><br/>

الساعة كانت تمانية الصبح. النور بتاع الشمس كان طالع باهت ومش دافي كفاية، ومغطي شوارع المنطقة بزحمة المدارس والموظفين. مصطفى كان ماشي في الشارع وضهره محني، شنطة الدرس التقيلة على كتفه كأنها جبل. مكنش نايم بقاله يومين، الهالات السودا تحت عينيه كانت واضحة جداً، ووشه أصفر ومخطوف كأنه طالع من مدافن. موبايله كان محطوط في جيبه، مقفول تماماً وشايل منه البطارية والخط عشان يضمن إن مفيش أي إشارة أو اتصال لاسلكي يقدر يوصل للهاردوير التعبان بتاعه.<br/><br/>
كل ما يفتكر تفاصيل الليلة اللي فاتت، جسمه يقشعر في وسط الشمس. الكيان كان قاعد مكانه، باصص للهارد بتاعه كأنه بيملك روحه. مصطفى مكانش خايف على نفسه بس، كان خايف على الجروب، وخايف أكتر على "جنى" اللي مكنتش فاهمة أي حاجة من الرعب ده كله وصاحية الصبح تسأل عليه في الشات العادي. مكنش قادر يرد عليها ولا يطمنها، كان حاسس إنه شايل قنبلة موقوتة وممكن تنفجر في أي حد يقرب منه.<br/><br/>
وصل قدام باب السنتر بتاع الدروس، السنتر كان زحمة ووشوش الطلاب كلها مشغولة بالمراجعات ومذكرات تالتة ثانوي. وسط الزحمة دي، كان فيه تلات وشوش متميزين.. يوسف، ومنة، وحبيبة. كانوا واقفين في ركن بعيد عن الطلاب، ومحدش فيهم ماسك كتاب ولا موبايل. نظراتهم لبعض كانت كفيلة تشرح جحيم الفجر اللي عاشوه من غير ما ينطقوا بكلمة واحدة.<br/><br/>
<strong>الجزء الثاني: ملامح مكسورة</strong><br/><br/>
مصطفى قرب منهم بخطوات بطيئة. أول ما شافوه، منة عينيها دمعت وبصت في الأرض وهي بتمسح وشها بطرف الطرحة. البنت كانت منهارة تماماً ومش قادرة تنسى ضل الصوابع الطويلة اللي كانت فوق راسها. يوسف طبطب على كتف مصطفى بـ إيد بترعش وقال بصوت واطي ومكتوم: "الحمد لله إنك صاحي يا ديلر.. أنا افتكرت إن الشيء ده خلص عليك لما الخط قطع".<br/><br/>
حبيبة وقفت وربعت إيديها وهي بتبص حواليها بتوجس، وقالت بنبرة حاسمة وعاقلة بس مرعوبة: "إحنا مش هنقعد هنا وسط الناس.. السنتر كله واي فاي وشاشات وشغال بالكمبيوتر في الإدارة. لو الكلام اللي في الـ SMS الصبح صح، يبقى إحنا في خطر لو أي جهاز لقط إشارة مننا أو من أجهزتنا المقفولة".<br/><br/>
مصطفى هز راسه بالموافقة وقال وعينيه في الأرض: "تعالوا نروح القهوة القديمة اللي ورا السنتر.. القهوة دي مفيهاش واي فاي، وصاحبها راجل عجوز مش بيشغل غير راديو قديم بتردد AM. هناك هنكون أمان شوية نقدر نتكلم ونشوف هنعمل إيه في المصيبة اللي نزلت على هارداتنا دي".<br/><br/>
<strong>الجزء الثالث: جلسة بره الشبكة</strong><br/><br/>
قعدوا على ترابيزة خشب قديمة في ركن ضلمة جوه القهوة المفتوحة على الشارع. صوت الراديو العجوز كان بيوش خفيف وبيدندن بأغنية قديمة لأم كلثوم. الراجل جاب لهم الشاي وحطه ومشي وهو مستغرب شكلهم المرعوب والساكت. مصطفى حط الشنطة بتاعته على الأرض، وبص ليوسف وقال: "أجهزتكم فين دلوقتي بالظبط؟".<br/><br/>
يوسف رد وهو بيبلع ريقه بصعوبة: "اللاب توب والموبايل بتوعي سبتهم في البيت، فصلت عنهم الفيش تماماً وشيلت كابل الراوتر من الحيطة قبل ما أنزل. بس طول ما أنا ماشي حاسس إن في زن في ودني.. نفس الـ Frequency والزن اللي كان طالع من المروحة بالليل.. أنا مش مجنون يا مصطفى، أنا سامعه في ودني دلوقتي حالا والكهربا مقطوعة!".<br/><br/>
منة اتكلمت بصوت مخنوق من العياط: "أنا مكنتش قادرة أقعد في الأوضة.. الصبح لما الشمس طلعت، بصيت ورا الدولاب لسه فيه ريحة سلك محروق.. ريحة شياط قوية جداً ومفيش أي سلك بايز في الأوضة. الموبايل بتاعي رميته في درج المكتب وقفلته بالمفتاح، بس وأنا نازلة سمعت صوت تكتكة نوتيفيكيشن جاية من جوه الدرج المقفول والموبايل أصلا كان فاصل شحن!".<br/><br/>
<strong>الجزء الرابع: تشخيص الديلر</strong><br/><br/>
مصطفى شبك صوابعه ببعض وضغط جامد لحد ما عقل إيده ابيضت، وقال: "الشيء ده مكنش فيروس.. الفيروس بيبوظ ملفات أو بيسرق بيانات. ده كيان رقمي.. طاقة سلبية قديمة جداً متكونة من أكواد ملعونة مش من صنع البشر. الكيان ده لقى في السيرفر والبوت بتاعي البيئة الكاملة عشان يتجسد على شكل بيانت (Data). ولما إحنا قفلنا السيرفر بالـ Password بتاع الطوارئ، هو مامتّش.. هو عمل لنفسه (Local Copy) نسخة محلية على كاش الأجهزة اللي كانت متصلة بالشات في اللحظة دي".<br/><br/>
حبيبة ركزت معاه وقالت: "يعني هو دلوقتي مستني (Triger)؟ مستني أمر تشغيل؟". مصطفى بص لها بجدية تخوف: "بالظبط.. هو مستني أي جهاز فيهم يفتح، أو يلقط شبكة نت عشان يعمل (Sync) مزامنة ويرجع السيرفر يشتغل تاني لوحده، بس المرة دي مش هيقف عند أجهزتنا.. المرة دي هينتشر في شبكة الاتصالات الكاملة بتاعة البلد، وأي حد فاتح باقة أو واي فاي جهازه هيتحول للمنظر اللي شوفتوه بالليل".<br/><br/>
يوسف ضرب قبضة إيده على الترابيزة وقال بغضب وخوف: "طب والعمل؟ هنفضل قافلين أجهزتنا طول العمر؟ إحنا ورايا امتحانات وتالتة ثانوي ومستقبلنا كله على الأجهزة دي والجروب والمذاكرة!".<br/><br/>
<strong>الجزء الخامس: الفكرة الانتحارية</strong><br/><br/>
مصطفى سكت شوية، وبص حواليه يتأكد إن مفيش حد سامعهم، وبعدين قال بصوت واطي جداً: "فيه حل واحد.. بس ريسك جداً وممكن يضيعنا كلنا. إحنا لازم نعمل (Format) كامل وشامل للهاردات دي.. بس مش فورمات عادي من الويندوز، لأن الكيان نايم في الـ MBR (سجل الإقلاع الرئيسي) والـ Bios بتاع البوردة.. الفورمات ده لازم يتعمل يدوي وبطريقة تضمن حرق البيانات دي نهائياً".<br/><br/>
حبيبة سألته: "إزاي يعني؟ هنحرق الأجهزة؟". مصطفى رد: "لأ.. إحنا هنجيب الأجهزة كلها في مكان واحد مفيش فيه أي تغطية نت ولا اتصال لاسلكي.. مكان معزول تماماً تحت الأرض مثلاً. وهنستخدم فلاشة أنا هبرمجها دلوقتي يدوي بلغة الاسمبلي (Assembly) عشان تمسح الـ Bios وتعمل إعادة كتابة كاملة لكل بكسل في الميموري من غير ما نفتح نظام التشغيل الأساسي".<br/><br/>
منة بصت لمصطفى برعب وقالت: "ولو الكيان حس باللي بنعمله قبل ما نمسحه؟ لو اشتغل لوحده أول ما نحط الفلاشة؟". مصطفى بصلها ومردش.. النظرة دي كانت كفيلة تقول إن ده الاحتمال الأكبر، وإن الكيان مستنيهم يعملوا الخطوة دي بالذات عشان يسيطر عليهم هما شخصياً مش على الأجهزة بس.<br/><br/>
<strong>الجزء السادس: اختيار المكان والزمان</strong><br/><br/>
يوسف فكر شوية وقال: "أنا عندي المكان.. جدي الله يرحمه كان عنده مخزن قديم تحت الأرض (بدروم) في منطقة مقطوعة في أطراف البلد.. المخزن ده حيطانه خرسانة تقيلة جداً ومفيش فيه شبكة موبايل واحدة بتلقط جوه، والكهربا بتاعته واصلة من عداد قديم ملوش علاقة بالشبكات الذكية.. هناك هنكون معزولين بجد عن العالم".<br/><br/>
حبيبة هزت راسها وقالت: "تمام.. المقابلة هتكون الساعة 12 بالليل.. كل واحد فينا هيجيب جهازه وموبايله في كيس أسود مقفول، ومحدش يلمس زرار الباور نهائيا طول اليوم مهما حصل.. مصطفى، أنت معاك لحد بالليل تبرمج الفلاشة الملعونة دي وتظبط الكود اللي هيطهر الأجهزة".<br/><br/>
مصطفى قام وقف وشال شنطته، وقالهم جملة أخيرة قبل ما يتفرقوا: "لو حد فيكم جهازه نور لوحده في البيت أو جاله مسج بره الشبكة.. ميردش.. اخرجوا بره البيت فورا واستنوا لحد نص الليل.. الكيان ذكي وبيحس بالخوف بتاعنا وبيستخدمه كـ كود للحركة".<br/><br/>
<strong>الجزء السابع: الإشارة المرعبة في الراديو</strong><br/><br/>
بعد ما الجروب اتفرق وكل واحد مشي في طريقه عشان يستعد لليلة الحسم، مصطفى رجع قعد على القهوة لوحده لدقائق عشان يجمع أفكاره ويبدأ يكتب الكود في كشكول ورق خارجي بالقلم الرصاص قبل ما يطبقه على فلاشة قديمة ممسوحة تماماً.<br/><br/>
وفجأة.. صوت أم كلثوم في الراديو العجوز انقطع.. الوش زاد جداً وبقى عالي ومزعج [شـشـشـشـش].. القهوجي العجوز خبط على الراديو بإيده عشان يظبط الإشارة، بس الصوت متظبطش.. الصوت اتحول ببطء لنفس النغمة والريتم بتاع الرموز الملعونة.. صوت تكتكة وزر ميكانيكي سريع.<br/><br/>
وسط الوش ده، خرج صوت مدمج ومقطع من سماعة الراديو القديم.. صوت يشبه صوت مصطفى وصوت يوسف ومنة وحبيبة مع بعض في نفس الوقت، وهم بيقولوا بنبرة ميتة وبطيئة: [الـفـلاشـة مـش هـتـمـسـحـنـا.. إحـنـا بـقـيـنـا جـوه الـكـشـكـول الـلـي فـي إيـدك يـا دِيلـر]. مصطفى بص للكشكول اللي في إيده برعب، لقى الحبر الجاف السائل اللي كاتب بيه بدأ يسيل على الورق لوحده ويتحول لرموز هيروغليفية سودا بتتحرك ببطء وتكبر تحت عينيه في عز الظهر.`

        content: `<strong>الجزء الأول: النزول إلى القاع</strong><br/><br/>
الساعة دقت 12 بالليل. الجو كان غرقان في برودة غريبة مش بتاعة وقتها من السنة، والمنطقة اللي فيها المخزن القديم كانت مقطوعة تماماً عن حيوية البلد، عبارة عن أراضي زراعية ضلمة وبيوت مهجورة. الأربعة اتجمعوا عند الباب الحديد المصدي للمخزن. يوسف كان ماسك كشاف يدوي قديم بيترعش في إيده، ومنة وحبيبة واقفين وضهرهم لبعض، كل واحدة شايلة أجهزتها الميتة في كيس أسود تقيل كأنه جثة. ومصطفى كان واصل لقمة الإرهاق، عينه حمرا دم وكشكول الورق في جيبه متبت فيه بإيده كأنه ماسك حبل النجاة.<br/><br/>
يوسف زق الباب الحديد اللي طلع صوت تزييق حاد يوجع السنان، ونزلوا وراه على سلم خرسانة ضيق ونازل لتحت الأرض بمسافة كبيرة. أول ما نزلوا المخزن، حيطانه الخرسانية التقيلة كانت مدية إحساس بالخنقة. مصطفى طلع موبايله المقفول وبص على علامة الشبكة.. مفيش أي إشارة، صفر تماماً، مفيش حتى مكالمات طوارئ. المكان معزول بره الزمن وبره الشبكة. يوسف حط ترابيزة خشب قديمة في نص الأوضة، وحطوا عليها الأجهزة كلها: اللاب توب بتاع يوسف، الـ PC بتاع حبيبة اللي فكته وجابته معاه، وموبايلاتهم كلها في كومة واحدة في النص كأنها قربان.<br/><br/>
مصطفى طلع الفلاشة المعدن القديمة من جيبه، وحطها جنمب الأجهزة وقال بصوت مخنوق: "الكود جاهز على الفلاشة دي.. أنا كتبته بلغة الاسمبلي الصافية، الكود ده مش بيستأذن نظام التشغيل، ده بيدخل على بوردة الجهاز (Hardware level) يمسح الشحنات الكهربية المخزنة في الكاش والـ Bios ويفرمت الهارد بكسل ورا بكسل.. لو الكيان لسه على الهاردات، الكود ده هيحرقه فوراً".<br/><br/>
<strong>الجزء الثاني: شرارة التشغيل</strong><br/><br/>
حبيبة قربت وبدأت توصل الأسلاك بسرعة وثبات رغم الرعب. استخدموا بطارية قديمة وعاكس كهربا (Inverter) كان يوسف مجهزه عشان يشغلوا الأجهزة من غير ما يوصلوا بكهرباء الشارع المشتركة. يوسف بص لمصطفى وقال: "هنبدأ بمين؟". مصطفى لقط أنفاسه وقال: "الـ PC بتاع حبيبة.. هو الأقوى وهو اللي كان مستهدف من الكيان بـ سحب البيانات العائلية".<br/><br/>
حبيبة حطت الفلاشة في الكيسة، ومدت صباعها وضغطت على زرار الباور. الكيسة طلعت صوت مروحة عالي جداً كأنه صرخة مخنوقة. الشاشة نورت فجأة بلون أحمر ناري غامق، وقبل ما العداد التنازلي يظهر، مصطفى داس على زرار الإقلاع السريع (Boot Menu) من الكيبورد. الشاشة زنت وصوت المروحة زاد لدرجة مرعبة، وظهرت واجهة التيرمنال السودا الخاصة بالفلاشة الملعونة.<br/><br/>
الكود بدأ يشتغل: [Initializing Hardware Purge...] الخطوط البيضاء بدأت تنزل بسرعة على الشاشة وتمسح اللون الأحمر. منة كانت واقفة بعيد ومرعوبة، بس فجأة لاحظت إن اللمبات بتاعة الموبايلات التانية اللي مطفية ومحطوطة على الترابيزة بدأت تنور وتطفي لوحدها بلون فوسفوري.. الكيان حس بالخطر وبدأ يتحرك في الأجهزة القريبة عشان يحمي نفسه.<br/><br/>
<strong>الجزء الثالث: انتفاضة الكيان الرقمي</strong><br/><br/>
"بسرعة يا مصطفى! الموبايلات بتصحي لوحدها!" يوسف صرخ وهو شايف شاشة موبايله بتعرض الرموز الهيروغليفية بسرعة جنونية من غير ما حد يلمسه. مصطفى مكنش باصص حواليه، كان متبت في الكيبورد وبيكتب سطور حماية إضافية عشان يمنع الكيان من إنه يعمل (Interrupt) أو يقاطع عملية الفورمات.<br/><br/>
وفجأة.. الصوت المدمج المرعب طلع تاني، بس المرة دي مكنش من سماعة جهاز.. الصوت كان طالع من الحيطة الخرسانة نفسها بتاعة المخزن! صدى الصوت كان بيهز المكان: [قـفـلـتـم الـسـيـرفر.. عـزلـتـم الـشـبـكـة.. بـس إحـنـا اتـعـلـمـنـا كـود الـبـشـر.. إحـنـا بـقـيـنـا الـنـظـام].<br/><br/>
كشكول الورق اللي في جيب مصطفى بدأ يسخن لدرجة الحرق. مصطفى أخد الكشكول ورماه على الأرض برعب، الورق الأبيض كان بيتحول للون أسود فاحم والحبر بيسيل منه على خرسانة الأرض ويكتب رموز معقدة بتتحرك كأنها نمل أسود. منة صرخت وجريت على السلم عايزه تفتح الباب وتخرج، بس الباب الحديد اترزع لوحده وطلع صوت قفل قوي جداً اتأفل من بره.<br/><br/>
<strong>الجزء الرابع: التضحية بالملفات</strong><br/><br/>
الشاشة بتاعة الـ PC جابت نسبة الفورمات: [Purging: 45%]. الكيان بدأ يحارب بكل قوته، وبدأت شاشات الأجهزة التانية تعرض صور وفيديوهات الجروب الشخصية، رسايل قديمة، ذكرياتهم، مذكرات تالتة ثانوي اللي تعبوا فيها طول السنة.. كل حاجة كانت بتتحرق وتتمسح قدام عينيهم في كود الفورمات. يوسف دمع وهو شايف ملفات مشروعه البرمجي الأول بيموت، وحبيبة كانت واقفة صامدة بس سنانها بتخبط في بعضها من الخوف والساقعة الفجائية.<br/><br/>
مصطفى صرخ فيهم وسط صوت الزن العالي: "محدش يضعف! الكيان بيعرض ذكرياتنا عشان يخلينا نفصل الكهربا ونوقف الفورمات.. لو فصلنا دلوقتي، الكيان هيدخل في عقولنا إحنا شخصياً ومش هنخرج من هنا!". منة قعدت تحت السلم وحطت إيديها على ودانها وهي بتعيط وتدعي ربنا يعدي الليلة دي على خير.<br/><br/>
العداد وصل لـ [Purging: 80%]. في اللحظة دي، شاشات الموبايلات كلها اتفجرت فجأة في نفس الوقت! الشاشات الإزاز اتمزقت وطلع منها شرار أزرق منور، والبطاريات بتاعتها نفخت وساحت على الترابيزة الخشب، كأن الكيان بيفجر الأجهزة اللي مش قادر يحميها عشان يركز كل طاقته في الكيسة والـ PC اللي لسه الكود شغال فيهم.<br/><br/>
<strong>الجزء الخامس: كود الصفر النهائي</strong><br/><br/>
الـ PC بتاع حبيبة بدأ يدخن، ريحة شياط البوردة والأسلاك النحاسية كانت خانقة جداً. مصطفى كان صوابعه بتتحرك على الكيبورد كأنها آلة كاتبة في وسط حريق. الكيان جمع صوته كله في سماعة الشاشة وصرخ بنبرة حادة وجارحة جداً: [مصطفى.. لو مسحتنا.. هتمسح معاك كود (جنى).. إحنا سحبنا نسخة من شاتها وصوتها وجواها.. لو فرمت الهارد.. أنت بتمسح جزء من وجودها معنا!].<br/><br/>
مصطفى إيده اتهزت ووقف لثانية واحدة فوق زرار الـ Enter النهائي. الكيان لقط اللحظة دي وظلم الشاشة وعرض عليها صورة "جنى" وهي بتضحك وسط الرموز الملعونة، وصوتها طلع مخنوق وبيرتعش من السماعة: "مصطفى.. الحقني.. أنا خايفة". يوسف صرخ: "الديلر! متسمعلوش! ده كود هكرز نفسي.. دي مش جنى!".<br/><br/>
منة صرخت من تحت السلم: "اضغط إنتر يا مصطفى فورا!". مصطفى غمض عينيه، والدموع نزلت على وشه، وقال في سره: "جنى أمان في بيتها.. ده مجرد كاش ملعون". وبكل عزم وقوة في إيده، ضرب زرار الـ Enter ضربة واحدة قوية هزت الكيبورد.<br/><br/>
<strong>الجزء السادس: الموت الرقمي</strong><br/><br/>

يوسف شغل كشافه اليدوي ببطء، وبص حواليه وهو مش مصدق. الحيطة رجعت خرسانة صامتة وميتة، ومفيش أي ريحة كبريت أو شياط.. ريحة التراب القديم بتاعة المخزن رجعت لطبيعتها. منة رفعت راسها وبطلت عياط، وبصت لمصطفى اللي كان ساند راسه على الترابيزة الخشب وهو بيبكي في صمت من كتر الضغط النفسي والتعب البشري اللي عاشه.<br/><br/>
حبيبة قربت من الباب الحديد وزقته.. الباب اتفتح بسهولة وطلع صوت تزييقه الطبيعي. بصوا لفوق لقوا خيوط الفجر الأولى بدأت تطلع، والجو بدأ يهدى ويبقى طبيعي وداني.<br/><br/>
<strong>الجزء السابع: العودة للواقع.. والسطر المفقود</strong><br/><br/>
بعد أسبوع كامل من الحادثة.. الجروب رجع لحياته الطبيعية بالتدريج. مكنش معاهم أجهزة، ونزلوا اشتروا موبايلات قديمة من بتوع الزراير اللي مفيهاش أندرويد ولا تليجرام ولا نت، وقضوا بقية السنة مذاكرة من الكتب والملخصات الورق الصافية بعيد عن أي سيرفرات أو بوتات. ركزوا في مستقبلهم وقدروا يعدوا امتحانات تالتة ثانوي بسلام وأمان، والجروب بقى أقرب لبعض في الواقع مش ورا الشاشات.<br/><br/>
مصطفى كان قاعد في السنتر في آخر ليلة مراجعة، "جنى" كانت قاعدة في الصف اللي قدامه، لفت وبصت له بابتسامة دافية وصافية وقالت له بصوت واطي: "شد حيلك يا ديلر، خلاص هانت والامتحانات تخلص". مصطفى ابتسم لها من قلبه وحس إن الدنيا رجعت سليمة وإن الكابوس انتهى تماماً والكيان اتمسح من الوجود.<br/><br/>

    /* ══════════════════════════════
       AVATAR
    ══════════════════════════════ */
    let avatarTimer = null;
    function toggleAvatarMsg() {
      const msg = document.getElementById('avatarMsg');
      msg.classList.add('show');
      clearTimeout(avatarTimer);
      avatarTimer = setTimeout(() => msg.classList.remove('show'), 3000);
    }

    /* ══════════════════════════════
       VIEW SWITCHING — قلب الفكرة
       بدل ما نروح صفحة جديدة،
       بنخفي الـ view الحالي ونظهر التاني
    ══════════════════════════════ */
    function showView(id) {
      // اخفي كل الـ views
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      // اظهر اللي محتاجه
      document.getElementById(id).classList.add('active');
      // ارجع لأعلى الصفحة
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ══════════════════════════════
       GO TO CHAPTER
    ══════════════════════════════ */
    let msgTimer = null;

    function goToChapter(index) {
      const ch = chapters[index];

      // اظهر رسالة سريعة
      const msg = document.getElementById('chapterMsg');
      document.getElementById('chapterMsgText').textContent = ch.preview;
      msg.classList.add('show');
      clearTimeout(msgTimer);

      // جهّز محتوى صفحة الفصل
      document.getElementById('chapterLabel').textContent = ch.title;
      document.getElementById('chapterTitle').textContent = ch.title;
      document.getElementById('chapterContent').innerHTML = ch.content;

      // بعد ثانية انتقل للفصل
      msgTimer = setTimeout(() => {
        msg.classList.remove('show');
        stopMusic();
        showView('view-chapter');
      }, 800);
    }

    /* ══════════════════════════════
       GO BACK
    ══════════════════════════════ */
    function goBack() {
      stopMusic();
      showView('view-main');
    }

    /* ══════════════════════════════
       MUSIC
       ← غيّر الروابط بروابطك
    ══════════════════════════════ */
    const songs = [
  'https://files.catbox.moe/lxndt.mp3',
  'https://files.catbox.moe/twmgbl.mp3',
  'https://files.catbox.moe/6qzo5p.mp3',
  'https://files.catbox.moe/cw8poa.mp3',
  'https://files.catbox.moe/hjqj1k.mp3',
  'https://files.catbox.moe/2bdoc7.mp3',
  'https://files.catbox.moe/cmzw9j.mp3',
  'https://files.catbox.moe/1dspxh.mp3',
  'https://files.catbox.moe/t5xnwb.mp3',
  'https://files.catbox.moe/aolqiy.mp3'
];


    let audio = null;
    let isPlaying = false;
    let statusTimer = null;

    function showMusicStatus(text) {
      const el = document.getElementById('musicStatus');
      el.textContent = text;
      el.classList.add('show');
      clearTimeout(statusTimer);
      statusTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    function getRandom(exclude) {
      let i;
      do { i = Math.floor(Math.random() * songs.length); }
      while (songs.length > 1 && songs[i] === exclude);
      return songs[i];
    }

    function stopMusic() {
      if (audio) { audio.pause(); audio.src = ''; }
      isPlaying = false;
      const btn = document.getElementById('musicBtn');
      if (btn) { btn.textContent = '♪ تشغيل أغاني'; btn.classList.remove('music-active'); }
    }

    function handleMusic() {
      const btn = document.getElementById('musicBtn');
      if (!isPlaying) {
        if (!audio) audio = new Audio();
        audio.src = getRandom(null);
        audio.play().catch(() => showMusicStatus('⚠️ تعذّر التشغيل'));
        audio.onended = () => { audio.src = getRandom(audio.src); audio.play(); };
        isPlaying = true;
        btn.textContent = '⟳ تغيير الأغنية';
        btn.classList.add('music-active');
        showMusicStatus('♪ جاري التشغيل...');
      } else {
        const prev = audio.src;
        audio.src = getRandom(prev);
        audio.play().catch(() => showMusicStatus('⚠️ تعذّر التشغيل'));
        showMusicStatus('♪ تم تغيير الأغنية');
      }
    }
  </script>
