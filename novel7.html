<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قارئ الروايات — البوابة الزرقا</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon-pink: #ff2;
      --neon-pink-glow: #FFFB00;
      --neon-pink-light: #DAFF00;
    }

    html, body { min-height: 100vh; font-family: 'Tajawal', sans-serif; }

    body {
      background: #0a050a;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(120, 0, 80, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(60, 0, 100, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(80, 0, 60, 0.12) 0%, transparent 50%);
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("https://files.catbox.moe/pk72vz.jpg");
      pointer-events: none;
      z-index: 0;
    }

    .view { display: none; }
    .view.active { display: block; }

    /* ═══════════════════════════════════
       VIEW 1 — الصفحة الرئيسية
    ═══════════════════════════════════ */
    #view-main {
      min-height: 100vh;
      position: relative;
      z-index: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }
    #view-main.active { display: flex; }

    .profile-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
    }

    .avatar-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      cursor: pointer;
      margin-bottom: 14px;
    }

    .avatar-wrap img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 2;
      transition: transform 0.4s ease;
    }
    .avatar-wrap:hover img { transform: scale(1.06); }

    .avatar-ring {
      position: absolute; inset: -5px;
      border-radius: 50%;
      background: conic-gradient(
        var(--neon-pink) 0deg, transparent 80deg,
        var(--neon-pink-light) 160deg, transparent 240deg,
        var(--neon-pink) 360deg
      );
      animation: spin 3s linear infinite;
      z-index: 1;
    }
    .avatar-ring::after {
      content: '';
      position: absolute; inset: 4px;
      border-radius: 50%;
      background: #0a050a;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-glow {
      position: absolute; inset: -15px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--neon-pink-glow) 0%, transparent 70%);
      animation: pulse-glow 2s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes pulse-glow {
      from { opacity: 0.5; transform: scale(0.95); }
      to   { opacity: 1;   transform: scale(1.05); }
    }

    .avatar-msg {
      position: absolute;
      bottom: -52px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(10,5,25,0.92);
      border: 1px solid #000000;
      color: #000000;
      font-size: 13px;
      white-space: nowrap;
      padding: 7px 16px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      box-shadow: 0 0 14px #FFFB00;
      z-index: 10;
    }
    .avatar-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .novel-title-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .novel-main-title {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(26px, 6vw, 42px);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 30px var(--neon-pink-glow), 0 0 60px #FFFB00;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .novel-subtitle {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(13px, 2.5vw, 16px);
      color: #FFFB00;
      font-weight: 400;
      letter-spacing: 3px;
    }

    .main-card {
      background: rgba(10, 10, 15, 0.75);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border: 1px solid rgba(255, 45, 155, 0.22);
      border-radius: 20px;
      width: 100%; max-width: 640px;
      padding: 36px 28px 30px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .card-title {
      text-align: center;
      color: #f0e6ff;
      font-size: clamp(16px, 3.5vw, 20px);
      font-weight: 700;
      margin-bottom: 28px;
      text-shadow: 0 0 20px var(--neon-pink-glow);
    }

    .buttons-wrapper {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 24px;
    }

    .fall-btn {
      position: relative;
      padding: 0; border: none; background: none;
      cursor: pointer; outline: none;
      font-family: 'Tajawal', sans-serif;
      width: 100%;
    }

    .fall-btn .btn-top {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      padding: 14px 22px;
      font-size: clamp(13px, 2.5vw, 16px);
      font-weight: 700;
      color: #FFFB00;
      background: linear-gradient(135deg, #1a0a1e 0%, #0f0515 100%);
      border-radius: 12px;
      border: 1.5px solid #FFFB00;
      box-shadow: 0 0 8px #B8B611, inset 0 1px 0 #FFFB00;
      transform: translateY(-4px);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.2s;
      text-align: right;
    }
    .fall-btn .btn-num {
      font-size: 11px;
      color: #C3C118;
      font-weight: 400;
      margin-right: auto;
    }
    .fall-btn .btn-preview {
      display: block;
      font-size: 11px;
      color: #FFFB00;
      font-weight: 400;
      margin-top: 3px;
    }
    .fall-btn .btn-text-wrap { text-align: right; flex: 1; }
    .fall-btn::after {
      content: '';
      display: block;
      position: absolute;
      bottom: 0; left: 6px; right: 6px; height: 8px;
      background: #FFFB00;
      border-radius: 0 0 12px 12px;
      z-index: -1;
    }
    .fall-btn:hover .btn-top {
      transform: translateY(-2px);
      box-shadow: 0 0 20px #BDBA17, inset 0 1px 0 rgba(255,255,255,0.1);
      border-color: #E3DF11;
    }
    .fall-btn:active .btn-top {
      transform: translateY(0);
      box-shadow: 0 0 6px #FFFB00;
    }

    .chapter-msg {
      overflow: hidden; max-height: 0; opacity: 0;
      transition: max-height 0.5s ease, opacity 0.4s ease, padding 0.3s ease;
      text-align: center;
    }
    .chapter-msg.show { max-height: 80px; opacity: 1; padding: 12px 0 4px; }
    .chapter-msg span {
      display: inline-block;
      background: rgba(255,45,155,0.10);
      border: 1px solid #FFFB00;
      border-radius: 30px;
      padding: 6px 20px;
      color: #FFFB00;
      font-size: 13px;
    }

    /* ═══════════════════════════════════
       VIEW 2 — صفحة الفصل
    ═══════════════════════════════════ */
    #view-chapter {
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .top-bar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8, 3, 20, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid #FFFB00;
      padding: 13px 24px;
      text-align: center;
    }

    .chapter-label {
      color: #e8d8f8;
      font-size: clamp(14px, 3vw, 18px);
      font-weight: 700;
      text-shadow: 0 0 16px #FFFB00;
    }

    .chapter-body {
      display: flex;
      justify-content: center;
      padding: 40px 16px 120px;
    }

    .reading-card {
      width: 100%; max-width: 760px;
      background: #000000;
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border: 1px solid #FFFB00;
      border-radius: 16px;
      padding: clamp(28px, 5vw, 56px) clamp(22px, 5vw, 58px);
      box-shadow: 0 8px 60px #FFFB00, 0 0 0 1px #FFFB00 inset;
    }

    .reading-card h2 {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(20px, 4vw, 30px);
      font-weight: 900;
      color: #fff;
      text-align: center;
      margin-bottom: 36px;
      text-shadow: 0 0 24px var(--neon-pink-glow);
      padding-bottom: 20px;
      border-bottom: 1px solid #FFFB00;
    }

    #chapterContent {
      font-family: 'Lateef', serif;
      font-size: clamp(19px, 2.8vw, 24px);
      line-height: 2.2;
      color: rgba(235,225,245,0.93);
      text-align: justify;
    }

    #chapterContent strong {
      display: block;
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(16px, 2.5vw, 20px);
      font-weight: 800;
      color: #FFFB00;
      text-align: center;
      margin: 36px 0 20px;
      text-shadow: 0 0 16px var(--neon-pink-glow);
      letter-spacing: 1px;
    }

    .bottom-controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(5, 2, 15, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,45,155,0.15);
      padding: 14px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      background: rgba(20,10,30,0.9); color: #ccc;
      border: 1.5px solid #FFFB00; border-radius: 10px;
      padding: 10px 24px;
      font-family: 'Tajawal', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .ctrl-btn:hover { background: #FFFB00; border-color: #FFFB00; color: #fff; }
    .ctrl-btn:active { transform: scale(0.97); }
    .ctrl-btn.music-active { border-color: #FFFB00; color: #ADAB18; background: #FFFB00; }

    .music-status {
      position: fixed;
      bottom: 72px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(10,5,25,0.93);
      border: 1px solid #FFFB00;
      color: #FFFB00;
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      padding: 7px 20px;
      border-radius: 30px;
      white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      box-shadow: 0 0 16px #FFFB00;
      z-index: 300;
    }
    .music-status.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .reading-card { border-radius: 12px; }
      .bottom-controls { gap: 10px; padding: 10px 12px; }
      .ctrl-btn { padding: 8px 16px; font-size: 13px; }
    }
  </style>
</head>
<body>

  <div id="view-main" class="view active">

    <div class="profile-section">
      <div class="avatar-wrap" onclick="toggleAvatarMsg()">

        <div class="avatar-ring"></div>

    <div class="main-card">

      <div class="chapter-msg" id="chapterMsg">
        <span id="chapterMsgText"></span>
      </div>
    </div>

  </div>

  <div id="view-chapter" class="view">
    <div class="top-bar">
      <span class="chapter-label" id="chapterLabel"></span>
    </div>
    <div class="chapter-body">
      <div class="reading-card">

    <div class="music-status" id="musicStatus"></div>

        function renderChapters() {
      const container = document.getElementById('chaptersButtons');
      container.innerHTML = '';
      chapters.forEach((ch, idx) => {
        const btn = document.createElement('button');
        btn.className = 'fall-btn';
        btn.onclick = () => openChapter(idx);
        btn.innerHTML = `
          <div class="btn-top">
            <span class="btn-num">${idx + 1}</span>
            <div class="btn-text-wrap">
              <div>${ch.title}</div>
              <div class="btn-preview">${ch.preview}</div>
            </div>
          </div>
        `;
        container.appendChild(btn);
      }); // القفلة الصحيحة هنا لـ forEach
    } // قفلة الدالة renderChapters

    function openChapter(index) {
      currentChapterIndex = index;
      const ch = chapters[index];
      document.getElementById('chapterLabel').textContent = ch.title;
      document.getElementById('chapterTitle').textContent = ch.title;
      document.getElementById('chapterContent').innerHTML = ch.content;
      document.getElementById('view-main').classList.remove('active');
      document.getElementById('view-chapter').classList.add('active');
      window.scrollTo(0, 0);
    }
