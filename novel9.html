<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قارئ الروايات — أميرات في القاهرة</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon-pink: #ff2d9b;
      --neon-pink-glow: #ff2d9b88;
      --neon-pink-light: #ff6ec7;
    }

    html, body { min-height: 100vh; font-family: 'Tajawal', sans-serif; }

    body {
      background: #0a050a;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(120, 0, 80, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(60, 0, 100, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(80, 0, 60, 0.12) 0%, transparent 50%);
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("https://files.catbox.moe/qww5fc.jpg");
      pointer-events: none;
      z-index: 0;
    }

    .view { display: none; }
    .view.active { display: block; }

    #view-main {
      min-height: 100vh;
      position: relative;
      z-index: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }
    #view-main.active { display: flex; }

    .profile-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
    }

    .avatar-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      cursor: pointer;
      margin-bottom: 14px;
    }

    .avatar-wrap img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 2;
      transition: transform 0.4s ease;
    }
    .avatar-wrap:hover img { transform: scale(1.06); }

    .avatar-ring {
      position: absolute; inset: -5px;
      border-radius: 50%;
      background: conic-gradient(
        var(--neon-pink) 0deg, transparent 80deg,
        var(--neon-pink-light) 160deg, transparent 240deg,
        var(--neon-pink) 360deg
      );
      animation: spin 3s linear infinite;
      z-index: 1;
    }
    .avatar-ring::after {
      content: '';
      position: absolute; inset: 4px;
      border-radius: 50%;
      background: #0a050a;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-glow {
      position: absolute; inset: -15px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--neon-pink-glow) 0%, transparent 70%);
      animation: pulse-glow 2s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes pulse-glow {
      from { opacity: 0.5; transform: scale(0.95); }
      to   { opacity: 1;   transform: scale(1.05); }
    }

    .avatar-msg {
      position: absolute;
      bottom: -52px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(10,5,25,0.92);
      border: 1px solid var(--neon-pink);
      color: var(--neon-pink-light);
      font-size: 13px;
      white-space: nowrap;
      padding: 7px 16px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      box-shadow: 0 0 14px var(--neon-pink-glow);
      z-index: 10;
    }
    .avatar-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .novel-title-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .novel-main-title {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(26px, 6vw, 42px);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 30px var(--neon-pink-glow), 0 0 60px rgba(255,45,155,0.3);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .novel-subtitle {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(13px, 2.5vw, 16px);
      color: rgba(255,110,199,0.7);
      font-weight: 400;
      letter-spacing: 3px;
    }

    .main-card {
      background: rgba(10, 10, 15, 0.75);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border: 1px solid rgba(255, 45, 155, 0.22);
      border-radius: 20px;
      width: 100%; max-width: 640px;
      padding: 36px 28px 30px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .card-title {
      text-align: center;
      color: #f0e6ff;
      font-size: clamp(16px, 3.5vw, 20px);
      font-weight: 700;
      margin-bottom: 28px;
      text-shadow: 0 0 20px var(--neon-pink-glow);
    }

    .buttons-wrapper {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 24px;
    }

    .fall-btn {
      position: relative;
      padding: 0; border: none; background: none;
      cursor: pointer; outline: none;
      font-family: 'Tajawal', sans-serif;
      width: 100%;
    }

    .fall-btn .btn-top {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      padding: 14px 22px;
      font-size: clamp(13px, 2.5vw, 16px);
      font-weight: 700;
      color: var(--neon-pink-light);
      background: linear-gradient(135deg, #1a0a1e 0%, #0f0515 100%);
      border-radius: 12px;
      border: 1.5px solid rgba(255,45,155,0.4);
      box-shadow: 0 0 8px rgba(255,45,155,0.15), inset 0 1px 0 rgba(255,255,255,0.06);
      transform: translateY(-4px);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.2s;
      text-align: right;
    }
    .fall-btn .btn-num {
      font-size: 11px;
      color: rgba(255,110,199,0.5);
      font-weight: 400;
      margin-right: auto;
    }
    .fall-btn .btn-preview {
      display: block;
      font-size: 11px;
      color: rgba(200,160,220,0.6);
      font-weight: 400;
      margin-top: 3px;
    }
    .fall-btn .btn-text-wrap { text-align: right; flex: 1; }
    .fall-btn::after {
      content: '';
      display: block;
      position: absolute;
      bottom: 0; left: 6px; right: 6px; height: 8px;
      background: #5a0030;
      border-radius: 0 0 12px 12px;
      z-index: -1;
    }
    .fall-btn:hover .btn-top {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(255,45,155,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
      border-color: rgba(255,45,155,0.7);
    }
    .fall-btn:active .btn-top {
      transform: translateY(0);
      box-shadow: 0 0 6px var(--neon-pink-glow);
    }

    .chapter-msg {
      overflow: hidden; max-height: 0; opacity: 0;
      transition: max-height 0.5s ease, opacity 0.4s ease, padding 0.3s ease;
      text-align: center;
    }
    .chapter-msg.show { max-height: 80px; opacity: 1; padding: 12px 0 4px; }
    .chapter-msg span {
      display: inline-block;
      background: rgba(255,45,155,0.10);
      border: 1px solid rgba(255,45,155,0.3);
      border-radius: 30px;
      padding: 6px 20px;
      color: var(--neon-pink-light);
      font-size: 13px;
    }

    #view-chapter {
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .top-bar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8, 3, 20, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,45,155,0.20);
      padding: 13px 24px;
      text-align: center;
    }

    .chapter-label {
      color: #e8d8f8;
      font-size: clamp(14px, 3vw, 18px);
      font-weight: 700;
      text-shadow: 0 0 16px var(--neon-pink-glow);
    }

    .chapter-body {
      display: flex;
      justify-content: center;
      padding: 40px 16px 120px;
    }

    .reading-card {
      width: 100%; max-width: 760px;
      background: rgba(8, 5, 18, 0.82);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border: 1px solid rgba(255,45,155,0.15);
      border-radius: 16px;
      padding: clamp(28px, 5vw, 56px) clamp(22px, 5vw, 58px);
      box-shadow: 0 8px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .reading-card h2 {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(20px, 4vw, 30px);
      font-weight: 900;
      color: #fff;
      text-align: center;
      margin-bottom: 36px;
      text-shadow: 0 0 24px var(--neon-pink-glow);
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,45,155,0.2);
    }

    #chapterContent {
      font-family: 'Lateef', serif;
      font-size: clamp(19px, 2.8vw, 24px);
      line-height: 2.2;
      color: rgba(235,225,245,0.93);
      text-align: justify;
    }

    #chapterContent strong {
      display: block;
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(16px, 2.5vw, 20px);
      font-weight: 800;
      color: var(--neon-pink-light);
      text-align: center;
      margin: 36px 0 20px;
      text-shadow: 0 0 16px var(--neon-pink-glow);
      letter-spacing: 1px;
    }

    .bottom-controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(5, 2, 15, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,45,155,0.15);
      padding: 14px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      background: rgba(20,10,30,0.9); color: #ccc;
      border: 1.5px solid rgba(255,255,255,0.15); border-radius: 10px;
      padding: 10px 24px;
      font-family: 'Tajawal', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .ctrl-btn:hover { background: rgba(40,20,50,0.9); border-color: rgba(255,255,255,0.3); color: #fff; }
    .ctrl-btn:active { transform: scale(0.97); }
    .ctrl-btn.music-active { border-color: var(--neon-pink); color: var(--neon-pink-light); background: rgba(255,45,155,0.1); }

    .music-status {
      position: fixed;
      bottom: 72px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(10,5,25,0.93);
      border: 1px solid var(--neon-pink);
      color: #ff6ec7;
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      padding: 7px 20px;
      border-radius: 30px;
      white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      box-shadow: 0 0 16px var(--neon-pink-glow);
      z-index: 300;
    }
    .music-status.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .reading-card { border-radius: 12px; }
      .bottom-controls { gap: 10px; padding: 10px 12px; }
      .ctrl-btn { padding: 8px 16px; font-size: 13px; }
    }
  </style>
</head>
<body>

  <div id="view-main" class="view active">

    <div class="profile-section">
      <div class="avatar-wrap" onclick="toggleAvatarMsg()">
        <div class="avatar-glow"></div>
        <div class="avatar-ring"></div>
        <img
          src="https://files.catbox.moe/inbpcb.jpg"
          alt="صورة الرواية"
        />
        <div class="avatar-msg" id="avatarMsg">👑 أميرات في القاهرة — رومانسي كوميدي</div>
      </div>
    </div>

    <div class="novel-title-area" style="margin-top:60px;">
      <div class="novel-main-title">أميرات في القاهرة</div>
      <div class="novel-subtitle">رواية كوميديه    </div>
    </div>

    <div class="main-card">
      <div class="card-title">✦ اختري الفصل الى هتقرئيه ✦</div>
      <div class="buttons-wrapper" id="chaptersButtons"></div>
      <div class="chapter-msg" id="chapterMsg">
        <span id="chapterMsgText"></span>
      </div>
    </div>

  </div>

  <div id="view-chapter" class="view">
    <div class="top-bar">
      <span class="chapter-label" id="chapterLabel"></span>
    </div>
    <div class="chapter-body">
      <div class="reading-card">
        <h2 id="chapterTitle"></h2>
        <div id="chapterContent"></div>
      </div>
    </div>
    <div class="bottom-controls">
      <button class="ctrl-btn" id="musicBtn" onclick="handleMusic()">♪ تشغيل موسيقى</button>
      <button class="ctrl-btn" onclick="goBack()">← رجوع</button>
    </div>
    <div class="music-status" id="musicStatus"></div>
  </div>

  <script>
    const chapters = [
      {
        title: 'الفصل الأول — الفتيات اللي نزلوا من السما',
        preview: '👑 أربع بنات غريبات بيظهروا فجأة في وسط القاهرة...',
        content: `<strong>— جزء أول —</strong><br/><br/>
الساعة كانت حوالي الواحدة الضهر لما السما انبلجت فوق ميدان التحرير.<br/><br/>
مش انبلجت بالمعنى الشعري — انبلجت بالمعنى الحرفي. ضوء أبيض ناصع نزل زي لمبة كشاف كبيرة من وسط السحاب، والناس اللي كانت بتعدي في الميدان وقفت تبص. عربيات وقفت. مكرفون السواق الحنين انقطع في الهوا. حتى العربية الفارهة اللي ماشية في الشارع الجانبي بصّ سواقها من الشباك بتعجب.<br/><br/>
وبعدين، في أقل من ثانية — أربع بنات وقعوا من السما.<br/><br/>
مش وقعوا بالطريقة اللي بتخليهم يتأذوا — وقعوا بالطريقة الفيلمية، اللي بتخليهم يقفوا على أرجلهم كأن حاجة محدتش. بس كان واضح إنهم مش بيعرفوا إنهم في القاهرة. الأربعة وقفوا في النص، يبصوا لبعض، وبعدين يبصوا لكل حتة، وفي عيونهم دهشة خالصة.<br/><br/>
الميدان كان هادي نسبياً — مش وقت الزحمة الكبيرة — بس الناس اللي شافوا الموقف وقفوا بعيد شوية. غريب الشكل. أربع بنات في هدوم مش من النوع اللي شايفينه في أي محل قاهري.<br/><br/>
<strong>— جزء تاني —</strong><br/><br/>
الأولى كانت بنت بيضا، شعرها أصفر طويل لحد خصرها، لابسة فستان أزرق فاتح لامع بأكمام كبيرة وتطريز. الفستان كان نظيف وملوكي بشكل مش طبيعي — كأنه لسه مصنوع من ساعتين.<br/><br/>
التانية كانت بنت سمرا، شعرها أسود طويل، بس فيه تعديلات — بعض الشعر متربوط بفيونكة حمرا كبيرة. لابسة فستان أحمر وأصفر واسع من تحت، بكورساج مصنوع بحرفية. وفي وسطها حزام ضيق. وجهها فيه ملامح شرقية واضحة.<br/><br/>
التالتة كانت بنت بيضا تانية، بشرتها أبيض مائل للوردي، شعرها بني قصير ومجعد، لابسة فستان بيج وذهبي — أبسط من الأوليتين بس لسه فيه شخصية. وفي وشها علامة صغيرة زي ندبة خفيفة.<br/><br/>
الرابعة — وده اللي لفت النظر أكتر — كانت بنت بشرتها سمرا غامق جداً، شعرها في جديلة واحدة طويلة، لابسة فستان أخضر من نوع الحرير، مطرز بأوراق شجر ذهبية. وفي عيونها — زي كحلة طبيعية بتعملها أعمق.<br/><br/>
<strong>— جزء تالت —</strong><br/><br/>
أول حد اقترب منهم كان بائع كلينكس. راجل ستيني، بيشيل كراسة الكلينكس على رقبته، نظر ليهم بفضول مدروس.<br/><br/>
"إيه ده، يا بنات؟ جايين منين؟"<br/><br/>
الأربعة بصوله. بعدين بصوا لبعض. البنت بالشعر الأصفر — اللي اتضح إنها الأكتر جرأة — قالت بلهجة غريبة بس مفهومة:<br/><br/>
"نحن... لسنا من هنا."<br/><br/>
"ده واضح يا بنتي. من فين؟"<br/><br/>
"من... أماكن بعيدة."<br/><br/>
بائع الكلينكس هزّ دماغه. "أوكيه. تحتاجوا حاجة؟"<br/><br/>
البنت الأخضر فستانها — اللي إسمها تبيّن بعدين إنه تيانا — بصت لكل حاجة حواليها ببطء. المباني، العربيات، الناس، الدخان، الأعلام. عيونها كانت بتحاول تستوعب.<br/><br/>
"هذا المكان... كبير."<br/><br/>
"ده ميدان التحرير يا بنتي. وسط البلد. القاهرة."<br/><br/>
الكلمة دي — القاهرة — مرّت في الهوا من غير ما حد منهم يفهمها بالكامل.<br/><br/>
<strong>— جزء رابع —</strong><br/><br/>
في نفس الوقت، كانت في واحدة شايفة كل ده من بعيد.<br/><br/>
نهى — اتنين وعشرين سنة، طالبة دكتوراه في علم النفس بجامعة القاهرة — كانت واقفة على الرصيف بتاكل فول من طبق ورق. كانت رايحة المكتبة، بس الضوء الأبيض اللي نزل من السما خلاها تقف.<br/><br/>
بصّت للبنات الأربعة. بصّت للبائع. بصّت للناس اللي بتتجمع ببطء.<br/><br/>
نهى كانت بنت ملاحظة — كانت دايما تلاحظ التفاصيل اللي ناس تانية بتعدي عليها. وده كان جزء من سبب إنها بتدرس علم النفس. اللي لاحظته دلوقتي إن البنات الأربع دول مش بس هدومهم غريبة — طريقة وقفتهم، طريقة مشيتهم، الطريقة اللي بيبصوا بيها — كل حاجة بتقول إنهم مش مألوفين البيئة دي.<br/><br/>
فكّرت ثانية. بعدين اتحركت ناحيتهم.<br/><br/>
<strong>— جزء خامس —</strong><br/><br/>
"أهلاً."<br/><br/>
البنات الأربعة اتحولوا ناحيتها. نهى ابتسمت — ابتسامة مريحة، مش مبالغ فيها.<br/><br/>
"اسمي نهى. أنا شايفاكوا بتتهتوا. محتاجين مساعدة؟"<br/><br/>
البنت الشعر الأصفر بصّتلها. "أنت... لطيف."<br/><br/>
"لطيفة — أنا بنت. وإنتي؟"<br/><br/>
"أنا... سيندريلا."<br/><br/>
نهى وقفت. "سيندريلا؟"<br/><br/>
"آه."<br/><br/>
نهى بصّت للباقيين. "وإنتوا؟"<br/><br/>
البنت الشعر الأسود قالت بثقة: "جاسمين."<br/><br/>
البنت البني المجعد: "أنا بيل. بيلا."<br/><br/>
والرابعة، بهدوء: "تيانا."<br/><br/>
نهى وقفت في مكانها. دماغها — اللي كانت بتدرّبه على التحليل المنطقي بقالها ست سنين — كان بيقولها إن الإجابات دي مش منطقية. بس عيونها — اللي كانت بتبص في وجوه البنات دول — كانت بتقولها إن البنات دول مش بتعملوا مسرحية.<br/><br/>
خدت نفس عميق. "تعالوا معايا."<br/><br/>
<strong>— جزء سادس —</strong><br/><br/>
شقة نهى كانت في عمارة قديمة في وسط البلد، دور تالت، سلّم ضيق بيلف على نفسه. الشقة كانت صغيرة بس مرتبة — كتب في كل حتة، أوراق بحث، ملصقات نفسية على الحيطة، وتابلوه واحد لوحه جده بإيده معلق في الصالة.<br/><br/>

"إيه الحاجات دي؟"<br/><br/>
نهى فكرت. "إن مساعدة الناس مش ضعف. إن الانتماء مش لازم يكون دم أو جذور. إن ممكن تبني بيت في مكان غريب — لو إنت قررت إنه بيتك."<br/><br/>
<strong>— الجزء الأخير —</strong><br/><br/>
في الليلة دي، بعد الفيلم، قعدوا كلهم — نهى وكريم وتيانا وبيلا وسيندريلا — في مطعم "لون الذهب".<br/><br/>
الأكل كان ممتاز. الضحك كان حقيقي. والشارع برّا كان بيمشي — القاهرة بليلها المعتاد، بضوضاءها وهدوءها اللي موجودين مع بعض.<br/><br/>
تيانا رفعت كوباية شاي. "لجاسمين."<br/><br/>
"لجاسمين." الكل رفعوا.<br/><br/>
بيلا قالت: "ولكل اللي بتدور على مكانها."<br/><br/>
سيندريلا قالت: "وللي اتعلموا إن مكانهم مش بيجيلهم — هم اللي بيبنوه."<br/><br/>
نهى بصّت في الكوباية. في صورتها فيها — بنت في الاتنين وعشرين عاملة دكتوراه في علم النفس، ساكنة لوحدها في شقة صغيرة في وسط البلد، اعتقدت يوم ما إنها بتقدم مساعدة عابرة.<br/><br/>
وإنتهت بثلاث بنات عشوا معاها شهر بعد شهر وخلوا القاهرة أحلى في عيونها.<br/><br/>
كريم بص فيها من جنبه. "بتفكري في إيه؟"<br/><br/>
"بفكر في إن القصص الكويسة — مش بتنتهي. بتتحول."<br/><br/>
"وده قصتنا بتتحول لإيه؟"<br/><br/>
نهى ابتسمت. "هنشوف."<br/><br/>
وبرّا، القاهرة كانت لسه بتتنفس — بصخبها وجمالها ومليون قصة بتحصل في وقت واحد. ومنهم — قصة أربع أميرات جم من السما، وقرروا يبنوا حياتهم بإيديهم.<br/><br/>
<strong>— النهاية —</strong>`
      }
    ];

    let currentChapterIndex = null;

    function toggleAvatarMsg() {
      const msg = document.getElementById('avatarMsg');
      msg.classList.toggle('show');
      setTimeout(() => msg.classList.remove('show'), 3000);
    }

    function renderChapters() {
      const container = document.getElementById('chaptersButtons');
      container.innerHTML = '';
      chapters.forEach((ch, idx) => {
        const btn = document.createElement('button');
        btn.className = 'fall-btn';
        btn.onclick = () => openChapter(idx);
        btn.innerHTML = `
          <div class="btn-top">
            <span class="btn-num">${idx + 1}</span>
            <div class="btn-text-wrap">
              <div>${ch.title}</div>
              <div class="btn-preview">${ch.preview}</div>
            </div>
          </div>
        `;
        container.appendChild(btn);
      });
    }

    function openChapter(index) {
      currentChapterIndex = index;
      const ch = chapters[index];
      document.getElementById('chapterLabel').textContent = ch.title;
      document.getElementById('chapterTitle').textContent = ch.title;
      document.getElementById('chapterContent').innerHTML = ch.content;
      document.getElementById('view-main').classList.remove('active');
      document.getElementById('view-chapter').classList.add('active');
      window.scrollTo(0, 0);
    }

    function goBack() {
      document.getElementById('view-chapter').classList.remove('active');
      document.getElementById('view-main').classList.add('active');
      window.scrollTo(0, 0);
    }

    let musicPlaying = false;
    let audio = null;
    let currentTrack = 0;

    const songs = [
  'https://files.catbox.moe/lxndt.mp3',
  'https://files.catbox.moe/twmgbl.mp3',
  'https://files.catbox.moe/6qzo5p.mp3',
  'https://files.catbox.moe/cw8poa.mp3',
  'https://files.catbox.moe/hjqj1k.mp3',
  'https://files.catbox.moe/2bdoc7.mp3',
  'https://files.catbox.moe/cmzw9j.mp3',
  'https://files.catbox.moe/1dspxh.mp3',
  'https://files.catbox.moe/t5xnwb.mp3',
  'https://files.catbox.moe/aolqiy.mp3'
];


    function handleMusic() {
      const btn = document.getElementById('musicBtn');
      const status = document.getElementById('musicStatus');

      if (!musicPlaying) {
        audio = new Audio(tracks[currentTrack]);
        audio.loop = true;
        audio.volume = 0.5;
        audio.play();
        musicPlaying = true;
        btn.classList.add('music-active');
        btn.textContent = '♪ إيقاف الموسيقى';
        status.textContent = '🎵 موسيقى ' + (currentTrack + 1);
      } else {
        audio.pause();
        currentTrack++;
        if (currentTrack < tracks.length) {
          audio = new Audio(tracks[currentTrack]);
          audio.loop = true;
          audio.volume = 0.5;
          audio.play();
          btn.textContent = '♪ إيقاف الموسيقى';
          status.textContent = '🎵 موسيقى ' + (currentTrack + 1);
        } else {
          musicPlaying = false;
          currentTrack = 0;
          audio = null;
          btn.classList.remove('music-active');
          btn.textContent = '♪ تشغيل موسيقى';
          status.textContent = '🎵 الموسيقى متوقفة';
        }
      }
      status.classList.add('show');
      setTimeout(() => status.classList.remove('show'), 2000);
    }

    renderChapters();
  </script>
