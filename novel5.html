<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قارئ الروايات — البوابة الزرقا</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Lateef:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon-pink: #242599;
      --neon-pink-glow: #0010FF;
      --neon-pink-light: #1D27B3;
    }

    html, body { min-height: 100vh; font-family: 'Tajawal', sans-serif; }

    body {
      background: #0a050a;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(120, 0, 80, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(60, 0, 100, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(80, 0, 60, 0.12) 0%, transparent 50%);
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('https://files.catbox.moe/9d74ey.jpg');
      pointer-events: none;
      z-index: 0;
      background-size: cover;
    }

    .view { display: none; }
    .view.active { display: block; }

    /* ═══════════════════════════════════
       VIEW 1 — الصفحة الرئيسية
    ═══════════════════════════════════ */
    #view-main {
      min-height: 100vh;
      position: relative;
      z-index: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }
    #view-main.active { display: flex; }

    .profile-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
    }

    .avatar-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      cursor: pointer;
      margin-bottom: 14px;
    }

    .avatar-wrap img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 2;
      transition: transform 0.4s ease;
    }
    .avatar-wrap:hover img { transform: scale(1.06); }

    .avatar-ring {
      position: absolute; inset: -5px;
      border-radius: 50%;
      background: conic-gradient(
        var(--neon-pink) 0deg, transparent 80deg,
        var(--neon-pink-light) 160deg, transparent 240deg,
        var(--neon-pink) 360deg
      );
      animation: spin 3s linear infinite;
      z-index: 1;
    }
    .avatar-ring::after {
      content: '';
      position: absolute; inset: 4px;
      border-radius: 50%;
      background: #0a050a;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-glow {
      position: absolute; inset: -15px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--neon-pink-glow) 0%, transparent 70%);
      animation: pulse-glow 2s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes pulse-glow {
      from { opacity: 0.5; transform: scale(0.95); }
      to   { opacity: 1;   transform: scale(1.05); }
    }

    .avatar-msg {
      position: absolute;
      bottom: -52px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(10,5,25,0.92);
      border: 1px solid var(--neon-pink);
      color: var(--neon-pink-light);
      font-size: 13px;
      white-space: nowrap;
      padding: 7px 16px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      box-shadow: 0 0 14px var(--neon-pink-glow);
      z-index: 10;
    }
    .avatar-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .novel-title-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .novel-main-title {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(26px, 6vw, 42px);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 30px var(--neon-pink-glow), 0 0 60px rgba(255,45,155,0.3);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .novel-subtitle {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(13px, 2.5vw, 16px);
      color: #1719D6;
      font-weight: 400;
      letter-spacing: 3px;
    }

    .main-card {
      background: rgba(10, 10, 15, 0.75);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border: 1px solid rgba(255, 45, 155, 0.22);
      border-radius: 20px;
      width: 100%; max-width: 640px;
      padding: 36px 28px 30px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .card-title {
      text-align: center;
      color: #f0e6ff;
      font-size: clamp(16px, 3.5vw, 20px);
      font-weight: 700;
      margin-bottom: 28px;
      text-shadow: 0 0 20px var(--neon-pink-glow);
    }

    .buttons-wrapper {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 24px;
    }

    .fall-btn {
      position: relative;
      padding: 0; border: none; background: none;
      cursor: pointer; outline: none;
      font-family: 'Tajawal', sans-serif;
      width: 100%;
    }

    .fall-btn .btn-top {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      padding: 14px 22px;
      font-size: clamp(13px, 2.5vw, 16px);
      font-weight: 700;
      color: #0003FF;
      background: linear-gradient(135deg, #1a0a1e 0%, #0f0515 100%);
      border-radius: 12px;
      border: 1.5px solid #0003FF;
      box-shadow: 0 0 8px #00028F, inset 0 1px 0 #FFFFFF;
      transform: translateY(-4px);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.2s;
      text-align: right;
    }
    .fall-btn .btn-num {
      font-size: 11px;
      color: rgba(255,110,199,0.5);
      font-weight: 400;
      margin-right: auto;
    }
    .fall-btn .btn-preview {
      display: block;
      font-size: 11px;
      color: rgba(200,160,220,0.6);
      font-weight: 400;
      margin-top: 3px;
    }
    .fall-btn .btn-text-wrap { text-align: right; flex: 1; }
    .fall-btn::after {
      content: '';
      display: block;
      position: absolute;
      bottom: 0; left: 6px; right: 6px; height: 8px;
      background: #5a0030;
      border-radius: 0 0 12px 12px;
      z-index: -1;
    }
    .fall-btn:hover .btn-top {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(255,45,155,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
      border-color: rgba(255,45,155,0.7);
    }
    .fall-btn:active .btn-top {
      transform: translateY(0);
      box-shadow: 0 0 6px var(--neon-pink-glow);
    }

    .chapter-msg {
      overflow: hidden; max-height: 0; opacity: 0;
      transition: max-height 0.5s ease, opacity 0.4s ease, padding 0.3s ease;
      text-align: center;
    }
    .chapter-msg.show { max-height: 80px; opacity: 1; padding: 12px 0 4px; }
    .chapter-msg span {
      display: inline-block;
      background: rgba(255,45,155,0.10);
      border: 1px solid rgba(255,45,155,0.3);
      border-radius: 30px;
      padding: 6px 20px;
      color: var(--neon-pink-light);
      font-size: 13px;
    }

    /* ═══════════════════════════════════
       VIEW 2 — صفحة الفصل
    ═══════════════════════════════════ */
    #view-chapter {
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .top-bar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8, 3, 20, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,45,155,0.20);
      padding: 13px 24px;
      text-align: center;
    }

    .chapter-label {
      color: #e8d8f8;
      font-size: clamp(14px, 3vw, 18px);
      font-weight: 700;
      text-shadow: 0 0 16px var(--neon-pink-glow);
    }

    .chapter-body {
      display: flex;
      justify-content: center;
      padding: 40px 16px 120px;
    }

    .reading-card {
      width: 100%; max-width: 760px;
      background: rgba(8, 5, 18, 0.82);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border: 1px solid rgba(255,45,155,0.15);
      border-radius: 16px;
      padding: clamp(28px, 5vw, 56px) clamp(22px, 5vw, 58px);
      box-shadow: 0 8px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .reading-card h2 {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(20px, 4vw, 30px);
      font-weight: 900;
      color: #fff;
      text-align: center;
      margin-bottom: 36px;
      text-shadow: 0 0 24px var(--neon-pink-glow);
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,45,155,0.2);
    }

    #chapterContent {
      font-family: 'Lateef', serif;
      font-size: clamp(19px, 2.8vw, 24px);
      line-height: 2.2;
      color: rgba(235,225,245,0.93);
      text-align: justify;
    }

    #chapterContent strong {
      display: block;
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(16px, 2.5vw, 20px);
      font-weight: 800;
      color: var(--neon-pink-light);
      text-align: center;
      margin: 36px 0 20px;
      text-shadow: 0 0 16px var(--neon-pink-glow);
      letter-spacing: 1px;
    }

    .bottom-controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(5, 2, 15, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,45,155,0.15);
      padding: 14px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      background: rgba(20,10,30,0.9); color: #ccc;
      border: 1.5px solid rgba(255,255,255,0.15); border-radius: 10px;
      padding: 10px 24px;
      font-family: 'Tajawal', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .ctrl-btn:hover { background: rgba(40,20,50,0.9); border-color: rgba(255,255,255,0.3); color: #fff; }
    .ctrl-btn:active { transform: scale(0.97); }
    .ctrl-btn.music-active { border-color: var(--neon-pink); color: var(--neon-pink-light); background: rgba(255,45,155,0.1); }

    .music-status {
      position: fixed;
      bottom: 72px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(10,5,25,0.93);
      border: 1px solid var(--neon-pink);
      color: #0003FF;
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      padding: 7px 20px;
      border-radius: 30px;
      white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      box-shadow: 0 0 16px var(--neon-pink-glow);
      z-index: 300;
    }
    .music-status.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .reading-card { border-radius: 12px; }
      .bottom-controls { gap: 10px; padding: 10px 12px; }
      .ctrl-btn { padding: 8px 16px; font-size: 13px; }
    }
  </style>
</head>
<body>

  <div id="view-main" class="view active">

    <div class="profile-section">
      <div class="avatar-wrap" onclick="toggleAvatarMsg()">
        <div class="avatar-glow"></div>
        <div class="avatar-ring"></div>
        <img
          src="https://files.catbox.moe/inbpcb.jpg"
          alt="صورة الرواية"
          onerror="this.src='https://ui-avatars.com/api/?name=رواية&background=1a0a1e&color=ff6ec7&size=200'"
        />
        <div class="avatar-msg" id="avatarMsg">✨ البوابة الزرقا — خيال علمي</div>
      </div>
    </div>

    <div class="novel-title-area" style="margin-top:60px;">
      <div class="novel-main-title">البوابة الزرقا</div>
      <div class="novel-subtitle">رواية خيال علمي </div>
    </div>

    <div class="main-card">
      <div class="card-title">✦ اختري.الفصل الي.عايزه تقرأيه  ✦<br>رعب 👽👻</div>
      <div class="buttons-wrapper" id="chaptersButtons"></div>
      <div class="chapter-msg" id="chapterMsg">
        <span id="chapterMsgText"></span>
      </div>
    </div>

  </div>

  <div id="view-chapter" class="view">
    <div class="top-bar">
      <span class="chapter-label" id="chapterLabel"></span>
    </div>
    <div class="chapter-body">
      <div class="reading-card">
        <h2 id="chapterTitle"></h2>
        <div id="chapterContent"></div>
      </div>
    </div>
    <div class="bottom-controls">
      <button class="ctrl-btn" id="musicBtn" onclick="handleMusic()">♪ تشغيل موسيقى</button>
      <button class="ctrl-btn" onclick="goBack()">← رجوع</button>
    </div>
    <div class="music-status" id="musicStatus"></div>
  </div>

  <script>
    const chapters = [
      {
        title: 'الفصل الأول — المعمل في الدور السادس',
        preview: '🔬 باسم يكتشف حاجة في معمل جده المتوفي...',
        content: `<strong>— جزء أول —</strong><br/><br/>
الساعة كانت قربت على العشرة بالليل لما باسم فتح باب المعمل القديم. المعمل ده في عمارة في المهندسين، دور سادس، أوضة كان جده بيستأجرها من عشرين سنة وفاضل فيها لحد ما مات الشهر اللي فات. جده، الدكتور فاروق حامد، كان فيزيائي متقاعد، قضى حياته كلها بيدرّس في جامعة القاهرة وبيعمل أبحاث مالهاش أي علاقة بالمنهج الرسمي.<br/><br/>
باسم — خمسة وعشرين سنة، مهندس كهربا بيشتغل في شركة صغيرة في مدينة نصر — كان دايماً بيحس إن جده ليه عالم خاص. عالم ما حدش داخله غيره. حتى الأسرة كانت بتحترم ده — ما حدش كان بيسأل الدكتور فاروق بيعمل إيه في "المعمل" بتاعه.<br/><br/>
دلوقتي المعمل بقى ملك باسم، بحكم الوصية. جده كتب ورقة واضحة قبل ما يموت: "كل اللي في المعمل لحفيدي باسم. هو الوحيد اللي ممكن يفهم."<br/><br/>
<strong>— جزء تاني —</strong><br/><br/>
الأوضة كانت واسعة بس مليانة. رفوف من الأرض للسقف، كتب فيزيا ورياضيات وفلسفة علم، أوراق مكتوب عليها معادلات، جهاز كمبيوتر قديم لسه شغال، وفي النص — حاجة غريبة.<br/><br/>
حلقة معدنية قطرها حوالي مترين، واقفة على قاعدة حديد تقيل. الحلقة دي كانت بتلمع بلمعة خفيفة، مش طبيعية. حواليها كابلات موصولة بصناديق سودا فيها دواير كهربية معقدة. على الحيطة ورق مرسوم عليه تصميمات ومخططات — شكلها زي لوحات هندسية بس أعقد.<br/><br/>
باسم وقف قدام الحلقة. حط إيده عليها. المعدن كان بارد وناعم. حس بحاجة خفيفة — اهتزاز؟ أو يمكن تخيّل.<br/><br/>
على الترابيزة جنب الكمبيوتر، لاقى دفتر. دفتر أسود بغلاف جلد. فتحه.<br/><br/>
<strong>— جزء تالت —</strong><br/><br/>
الدفتر كان مليان ملاحظات بخط جده الدقيق. تواريخ، معادلات، رسومات، وملاحظات شخصية:<br/><br/>
"١٥ يناير ٢٠٢٣ — الاختبار السابع فشل. الطاقة المطلوبة أكبر مما توقعت. المشكلة ليست في التصميم، المشكلة في الاستقرار. المجال يتذبذب بعد ٣.٧ ثانية."<br/><br/>
"٣ مارس ٢٠٢٣ — نجاح جزئي! الحلقة اشتغلت لمدة ١٢ ثانية. شفت الضوء الأزرق. شفت حاجة من الناحية التانية — بس مش واضحة."<br/><br/>
"١٠ سبتمبر ٢٠٢٤ — أنا متأكد دلوقتي. ده مش مجرد نظرية. البوابة حقيقية. لكن أنا مش عارف لفين بتودي."<br/><br/>
باسم قعد على الكرسي. قلبه بدأ يدق بسرعة. "بوابة"؟ جده كان بيبني بوابة؟ بوابة لإيه؟<br/><br/>
<strong>— جزء رابع —</strong><br/><br/>
كمّل يقرأ. الملاحظات كانت بتزيد تفصيلاً:<br/><br/>
"النظرية بسيطة: لو قدرنا نطوي الزمكان باستخدام مجال كهرومغناطيسي فائق القوة، نقدر نعمل 'ثقب' — فتحة — توصّل بين نقطتين في الكون. مش بالضرورة في المكان بس، ممكن في الزمن كمان."<br/><br/>
باسم وقف. ده كلام مش معقول. ده كلام أفلام. بس جده ما كانش بيكتب خيال — جده كان عالم حقيقي.<br/><br/>
راح للكمبيوتر وفتحه. الكمبيوتر كان قديم بس شغال. على الشاشة، برنامج مفتوح — برنامج simulation فيزيائي. فيه رسمة تلاتية الأبعاد للحلقة المعدنية، وحواليها أرقام وإعدادات.<br/><br/>
تحت، في ملف نصي مكتوب فيه:<br/><br/>
"إلى باسم: لو إنت بتقرأ ده، يبقى أنا مت. والبوابة لسه مش اشتغلت بشكل كامل. أنا عارف إنك مهندس كهربا، إنت تقدر تكمّل. الإعدادات كلها موجودة. بس خلّي بالك — البوابة دي مش لعبة. لما تشتغل، هتفتح باب على حاجة مش عارفينها. ممكن تبقى حاجة جميلة. وممكن تبقى حاجة تانية خالص."<br/><br/>
<strong>— جزء خامس —</strong><br/><br/>
باسم قعد قدام الكمبيوتر ساعة كاملة. بيقرأ الملفات. بيدرس الإعدادات. الموضوع كان أعقد مما توقع، بس مش مستحيل. جده كان عبقري — صمم نظام كامل لتوليد مجال كهرومغناطيسي نبضي عالي التردد باستخدام capacitors ضخمة ودواير موصولة بدقة.<br/><br/>
المشكلة الوحيدة كانت الطاقة. الكهربا المطلوبة هائلة — أكتر من اللي الشقة تقدر تتحمله. جده كان حلّ ده جزئياً بإنه وصّل النظام بخط كهربا خاص من المبنى كله، بس لسه مش كفاية.<br/><br/>
على ورقة جانبية، جده كتب:<br/><br/>
"الحل: استخدام بطاريات ليثيوم ضخمة لتخزين الطاقة، ثم تفريغها دفعة واحدة. بس ده خطر — لو حصل short circuit، الانفجار هيدمر المعمل."<br/><br/>
باسم بصّ على الحلقة المعدنية. هل هو فعلاً هيحاول يشغّلها؟<br/><br/>
<strong>— جزء سادس —</strong><br/><br/>
رجع البيت الساعة اتنين الفجر. أمه كانت نايمة، أبوه برضو. هو ساكن مع أهله في شقة في المهندسين، مش بعيد عن المعمل. حياته كانت بسيطة — شغل، بيت، أصحاب قليلين، وهواية إصلاح الأجهزة الإلكترونية.<br/><br/>
بس دلوقتي، في حاجة اتغيرت. في سر — سر كبير — وهو بقى المسؤول عنه.<br/><br/>
قعد على السرير وفتح موبايله. بدأ يدوّر على أبحاث علمية عن "wormholes"، "زمكان"، "electromagnetic fields". قرأ لحد الساعة أربعة الصبح. كل اللي قراه كان بيأكد نفس الحاجة: نظرياً ممكن، بس عملياً مستحيل — أو على الأقل ده اللي العلماء بيقولوه.<br/><br/>

الأرض "محظورة". البشر متصنفين كـ"خطر". ولو العوالم التانية عرفت إن في بوابة مفتوحة من الأرض، ممكن — بحسب كلام زيلان — يعزلوا الكوكب كله. يحطوا حاجز حواليه. يمنعوا أي اتصال.<br/><br/>
وده هيبقى نهاية أي أمل إن البشرية تنضم للمجتمع الكوني.<br/><br/>
بس في نفس الوقت، المعرفة اللي عنده — المعرفة في المكعب، في الكتاب — ممكن تنقذ البشرية. ممكن تحل مشاكل الطاقة، الجوع، الأمراض. ممكن تغير كل حاجة.<br/><br/>
السؤال كان: يعمل إيه؟<br/><br/>
<strong>— جزء تاني —</strong><br/><br/>
في الشغل، مديره — مهندس اسمه هشام — لاحظ إن باسم مشتت.<br/><br/>
"إنت تعبان؟"<br/><br/>
"لا، أنا كويس."<br/><br/>
"إنت بقالك أسبوعين مش مركز. في مشكلة؟"<br/><br/>
باسم فكّر يقول. بس قال: "مشكلة شخصية. هتتحل."<br/><br/>
هشام ربّت على كتفه. "لو احتجت حاجة، أنا موجود."<br/><br/>
باسم شكره. بس عارف إن مافيش حد يقدر يساعده في المشكلة دي.<br/><br/>
<strong>— جزء تالت —</strong><br/><br/>
في البيت، أمه سألته: "إنت رايح فين كل يوم؟"<br/><br/>
"شغل."<br/><br/>
"شغل لحد الساعة عشرة بالليل؟"<br/><br/>
"مشروع."<br/><br/>
أمه بصتله بقلق. "باسم، إنت متغير. مش عارفة إيه اللي حصلك، بس حاسة إنك بعدت."<br/><br/>
باسم حضنها. "أنا هنا يا ماما. مش رايح حتة."<br/><br/>
بس في دماغه، كان عارف إن ده مش صحيح. هو فعلاً بعد — بعد بطريقة مش ممكن يشرحها لحد.<br/><br/>
<strong>— جزء رابع —</strong><br/><br/>
الأسبوع اللي بعده، السوار اهتز تاني. رسالة من زيلان:<br/><br/>
"باسم. لازم نتقابل. في تطورات خطيرة."<br/><br/>
باسم سافر للصحرا فوراً. فتح البوابة. زيلان عدى — بس المرة دي، كان معاه كائن تاني. كائن أقصر، لونه رمادي، وعنده ستة عيون.<br/><br/>
زيلان قدّمه: "ده 'مراقب'. من الحكومة."<br/><br/>
قلب باسم وقف. مراقب؟ من الحكومة؟<br/><br/>
المراقب بصّ فيه بعيونه الستة. اتكلم — صوت عميق، بطيء:<br/><br/>
"إنت باسم؟"<br/><br/>
"آه."<br/><br/>
"إنت اللي فتحت البوابة من عالم الأرض؟"<br/><br/>
"آه."<br/><br/>
"ده مخالفة. بموجب القانون الكوني رقم ٣٤٧، فتح بوابة من عالم محظور بدون تصريح جريمة."<br/><br/>
<strong>— جزء خامس —</strong><br/><br/>
باسم بصّ لزيلان. زيلان كان ساكت، وشه مش واضح — بس باسم حس إنه آسف.<br/><br/>
المراقب كمّل: "العقوبة المعتادة: إغلاق البوابة، ومحو ذاكرة الفاعل."<br/><br/>
"محو ذاكرتي؟"<br/><br/>
"آه. عشان ما تفتكرش حاجة عن العوالم التانية."<br/><br/>
باسم حس بخوف حقيقي. يمحوا ذاكرته؟ يخلوه ينسى كل ده؟<br/><br/>
"بس — في استثناء."<br/><br/>
باسم نظر للمراقب. "استثناء إيه؟"<br/><br/>
"لو إنت — بإرادتك — وافقت تقفل البوابة نهائياً، وتتعهد إنك ما تفتحهاش تاني، ممكن نسيبك. من غير محو ذاكرة."<br/><br/>
<strong>— جزء سادس —</strong><br/><br/>
باسم سكت. الاختيار كان واضح وقاسي:<br/><br/>
يا يقفل البوابة ويخسر الاتصال بالعوالم التانية — بس يفضل فاكر كل حاجة.<br/><br/>
يا يرفض — ويتمحي ذاكرته، ويرجع لحياته العادية من غير ما يعرف إن ده كله حصل.<br/><br/>
بصّ لزيلان. "إنت موافق على ده؟"<br/><br/>
زيلان بصّله بحزن. "أنا مش مسيطر على القرار. المراقب جه بأوامر رسمية."<br/><br/>
المراقب قال: "عندك دقيقة تقرر."<br/><br/>
<strong>— جزء سابع —</strong><br/><br/>
باسم بصّ للبوابة. البوابة اللي جده بناها. البوابة اللي فتحت له عوالم كاملة. البوابة اللي — لو استمرت — ممكن تجيب مشاكل للأرض كلها.<br/><br/>
فكّر في المعرفة اللي عنده. المكعب، الكتاب. لو قفل البوابة، هيفضل عنده المعرفة دي. يقدر يستخدمها، ببطء، بحذر. يقدر يفيد البشرية — من غير ما يعرّضها للخطر.<br/><br/>
ولو رفض — هيتمحي كل حاجة. المعرفة، الذكريات، الأمل.<br/><br/>
أخد نفس عميق.<br/><br/>
"هقفلها."<br/><br/>
<strong>— جزء تامن —</strong><br/><br/>
المراقب حرّك واحدة من أذرعه — وجهاز صغير ظهر في إيده. ضغط عليه — وفجأة، الحلقة المعدنية بدأت تهتز بعنف.<br/><br/>
"إيه اللي بيحصل؟"<br/><br/>
المراقب قال بهدوء: "بنفكّك البوابة. من الداخل. عشان ما تتبنيش تاني."<br/><br/>
الحلقة بدأت تتفكك — الدواير بتنفجر، الكابلات بتتقطع، المعدن بيتشقق. في دقايق — البوابة بقت خردة.<br/><br/>
باسم بصّ بحزن. كل ده — راح.<br/><br/>
المراقب قال: "تمام. البوابة اتقفلت. الاتفاق نافذ."<br/><br/>
بعدين — المراقب وزيلان اختفوا. من غير بوابة — اختفوا في الهوا، زي ما كانوا ما كانوش موجودين.<br/><br/>
<strong>— جزء تاسع —</strong><br/><br/>
باسم فضل واقف في المغارة. الحلقة المحطمة قدامه. الصمت حواليه.<br/><br/>
بصّ في السوار في إيده. لسه موجود. يعني — لو زيلان عايز يتصل بيه، لسه يقدر.<br/><br/>
طلع المكعب من جيبه. المكعب الشفاف. فيه المعرفة. فيه الأمل.<br/><br/>
قرر: هيستخدم المعرفة دي. هيبني حاجة — مش بوابة، حاجة تانية. حاجة تفيد الناس. حاجة تخلّي البشرية تتقدم — ببطء، بأمان.<br/><br/>
وفي يوم — لما البشرية تبقى جاهزة — يمكن العوالم التانية تفتح الباب تاني.<br/><br/>
<strong>— جزء عاشر —</strong><br/><br/>
رجع القاهرة. رجع لحياته — الشغل، البيت، الأصحاب. بس دلوقتي — عنده سر. سر كبير.<br/><br/>
وفي الليل، لما يقعد على البلكونة ويبص للسما، يبص للنجوم بطريقة مختلفة.<br/><br/>
لأنه عارف — هناك، في مكان بعيد — في عوالم تانية. في كائنات تانية. في حياة تانية.<br/><br/>
والبشرية — يوم ما ييجي — هتوصل.<br/><br/>
<strong>— جزء حداشر —</strong><br/><br/>
بعد سنة، باسم أسس شركة صغيرة. الشركة بتصنّع خلايا طاقة متقدمة — مبنية على التصميم اللي أخده من المكعب. الخلايا دي بدأت تنتشر — الأول في مصر، بعدين في بلاد تانية.<br/><br/>
الناس كانت بتتسائل: منين جه التصميم ده؟ باسم كان بيقول: "بحث وتطوير".<br/><br/>
ومع الوقت، الشركة كبرت. وباسم بقى معروف — كمهندس عبقري، رائد في مجال الطاقة المتجددة.<br/><br/>
بس هو — في قلبه — عارف الحقيقة.<br/><br/>
<strong>— جزء اتناشر —</strong><br/><br/>
وفي ليلة — بعد خمس سنين من يوم ما قفل البوابة — السوار اهتز.<br/><br/>
رسالة من زيلان:<br/><br/>
"باسم. عملت حاجة عظيمة. البشرية بتتقدم. وإحنا — بنراقب. استمر. وفي يوم — هنتقابل تاني."<br/><br/>
باسم ابتسم. بصّ للسما.<br/><br/>
همس: "مستني اليوم ده."<br/><br/>
<strong>— النهاية —</strong>`

    let currentChapterIndex = null;

    function renderChapters() {
      const container = document.getElementById('chaptersButtons');
      container.innerHTML = '';
      chapters.forEach((ch, idx) => {
        const btn = document.createElement('button');
        btn.className = 'fall-btn';
        btn.onclick = () => openChapter(idx);
        btn.innerHTML = `
          <div class="btn-top">
            <span class="btn-num">${idx + 1}</span>
            <div class="btn-text-wrap">
              <div>${ch.title}</div>
              <div class="btn-preview">${ch.preview}</div>
            </div>
          </div>
        `;
        container.appendChild(btn);
      });
    }

    function openChapter(index) {
      currentChapterIndex = index;
      const ch = chapters[index];
      document.getElementById('chapterLabel').textContent = ch.title;
      document.getElementById('chapterTitle').textContent = ch.title;
      document.getElementById('chapterContent').innerHTML = ch.content;
      document.getElementById('view-main').classList.remove('active');
      document.getElementById('view-chapter').classList.add('active');
      window.scrollTo(0, 0);
    }

    function goBack() {
      document.getElementById('view-chapter').classList.remove('active');
      document.getElementById('view-main').classList.add('active');
      window.scrollTo(0, 0);
    }
