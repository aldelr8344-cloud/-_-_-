<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قارئ الروايات — البيت اللي في آخر الشارع</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Lateef:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon-pink: #000000;
      --neon-pink-glow: #FFFFFF;
      --neon-pink-light: #FFFFFF;
    }

    html, body { min-height: 100vh; font-family: 'Tajawal', sans-serif; }

    body {
      background: #0a050a;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(120, 0, 80, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(60, 0, 100, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(80, 0, 60, 0.12) 0%, transparent 50%);
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('https://files.catbox.moe/samff4.jpg');
      pointer-events: none;
      z-index: 0;
    }

    .view { display: none; }
    .view.active { display: block; }

    #view-main {
      min-height: 100vh;
      position: relative;
      z-index: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }
    #view-main.active { display: flex; }

    .profile-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
    }

    .avatar-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      cursor: pointer;
      margin-bottom: 14px;
    }

    .avatar-wrap img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 2;
      transition: transform 0.4s ease;
    }
    .avatar-wrap:hover img { transform: scale(1.06); }

    .avatar-ring {
      position: absolute; inset: -5px;
      border-radius: 50%;
      background: conic-gradient(
        var(--neon-pink) 0deg, transparent 80deg,
        var(--neon-pink-light) 160deg, transparent 240deg,
        var(--neon-pink) 360deg
      );
      animation: spin 3s linear infinite;
      z-index: 1;
    }
    .avatar-ring::after {
      content: '';
      position: absolute; inset: 4px;
      border-radius: 50%;
      background: #0a050a;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-glow {
      position: absolute; inset: -15px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--neon-pink-glow) 0%, transparent 70%);
      animation: pulse-glow 2s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes pulse-glow {
      from { opacity: 0.5; transform: scale(0.95); }
      to   { opacity: 1;   transform: scale(1.05); }
    }

    .avatar-msg {
      position: absolute;
      bottom: -52px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(10,5,25,0.92);
      border: 1px solid #000000;
      color: var(--neon-pink-light);
      font-size: 13px;
      white-space: nowrap;
      padding: 7px 16px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      box-shadow: 0 0 14px var(--neon-pink-glow);
      z-index: 10;
    }
    .avatar-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .novel-title-area { text-align: center; margin-bottom: 32px; }
    .novel-main-title {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(26px, 6vw, 42px);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 30px var(--neon-pink-glow), 0 0 60px rgba(255,45,155,0.3);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .novel-subtitle {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(13px, 2.5vw, 16px);
      color: #E5E5E5;
      font-weight: 400;
      letter-spacing: 3px;
    }

    .main-card {
      background: rgba(10, 10, 15, 0.75);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border: 1px solid #FFFFFF;
      border-radius: 20px;
      width: 100%; max-width: 640px;
      padding: 36px 28px 30px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .card-title {
      text-align: center;
      color: #FFFFFF;
      font-size: clamp(16px, 3.5vw, 20px);
      font-weight: 700;
      margin-bottom: 28px;
      text-shadow: 0 0 20px var(--neon-pink-glow);
    }

    .buttons-wrapper {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 24px;
    }

    .fall-btn {
      position: relative;
      padding: 0; border: none; background: none;
      cursor: pointer; outline: none;
      font-family: 'Tajawal', sans-serif;
      width: 100%;
    }

    .fall-btn .btn-top {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      padding: 14px 22px;
      font-size: clamp(13px, 2.5vw, 16px);
      font-weight: 700;
      color: var(--neon-pink-light);
      background: linear-gradient(135deg, #1a0a1e 0%, #0f0515 100%);
      border-radius: 12px;
      border: 1.5px solid #FFFFFF;
      box-shadow: 0 0 8px #000000, inset 0 1px 0 #FFFFFF;
      transform: translateY(-4px);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.2s;
      text-align: right;
    }
    .fall-btn .btn-num {
      font-size: 11px;
      color: #FFFFFF;
      font-weight: 400;
      margin-right: auto;
    }
    .fall-btn .btn-preview {
      display: block;
      font-size: 11px;
      color: #FFFFFF;
      font-weight: 400;
      margin-top: 3px;
    }
    .fall-btn .btn-text-wrap { text-align: right; flex: 1; }
    .fall-btn::after {
      content: '';
      display: block;
      position: absolute;
      bottom: 0; left: 6px; right: 6px; height: 8px;
      background: #000000;
      border-radius: 0 0 12px 12px;
      z-index: -1;
    }
    .fall-btn:hover .btn-top {
      transform: translateY(-2px);
      box-shadow: 0 0 20px #000000;
      border-color: #000000;
    }
    .fall-btn:active .btn-top {
      transform: translateY(0);
      box-shadow: 0 0 6px var(--neon-pink-glow);
    }

    .chapter-msg {
      overflow: hidden; max-height: 0; opacity: 0;
      transition: max-height 0.5s ease, opacity 0.4s ease, padding 0.3s ease;
      text-align: center;
    }
    .chapter-msg.show { max-height: 80px; opacity: 1; padding: 12px 0 4px; }
    .chapter-msg span {
      display: inline-block;
      background: rgba(255,45,155,0.10);
      border: 1px solid #FFFFFF;
      border-radius: 30px;
      padding: 6px 20px;
      color: var(--neon-pink-light);
      font-size: 13px;
    }

    #view-chapter {
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .top-bar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8, 3, 20, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,45,155,0.20);
      padding: 13px 24px;
      text-align: center;
    }

    .chapter-label {
      color: #e8d8f8;
      font-size: clamp(14px, 3vw, 18px);
      font-weight: 700;
      text-shadow: 0 0 16px var(--neon-pink-glow);
    }

    .chapter-body {
      display: flex;
      justify-content: center;
      padding: 40px 16px 120px;
    }

    .reading-card {
      width: 100%; max-width: 760px;
      background: rgba(8, 5, 18, 0.82);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border: 1px #FFFFFF;
      border-radius: 16px;
      padding: clamp(28px, 5vw, 56px) clamp(22px, 5vw, 58px);
      box-shadow: 0 8px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .reading-card h2 {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(20px, 4vw, 30px);
      font-weight: 900;
      color: #fff;
      text-align: center;
      margin-bottom: 36px;
      text-shadow: 0 0 24px var(--neon-pink-glow);
      padding-bottom: 20px;
      border-bottom: 1px solid #000000;
    }

    #chapterContent {
      font-family: 'Lateef', serif;
      font-size: clamp(19px, 2.8vw, 24px);
      line-height: 2.2;
      color: rgba(235,225,245,0.93);
      text-align: justify;
    }

    #chapterContent strong {
      display: block;
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(16px, 2.5vw, 20px);
      font-weight: 800;
      color: var(--neon-pink-light);
      text-align: center;
      margin: 36px 0 20px;
      text-shadow: 0 0 16px var(--neon-pink-glow);
      letter-spacing: 1px;
    }

    .bottom-controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(5, 2, 15, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid #FFFBFB;
      padding: 14px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      background: rgba(20,10,30,0.9); color: #ccc;
      border: 1.5px solid rgba(255,255,255,0.15); border-radius: 10px;
      padding: 10px 24px;
      font-family: 'Tajawal', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .ctrl-btn:hover { background: rgba(40,20,50,0.9); border-color: rgba(255,255,255,0.3); color: #fff; }
    .ctrl-btn:active { transform: scale(0.97); }
    .ctrl-btn.music-active { border-color: var(--neon-pink); color: var(--neon-pink-light); background: rgba(255,45,155,0.1); }

    .music-status {
      position: fixed;
      bottom: 72px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(10,5,25,0.93);
      border: 1px solid var(--neon-pink);
      color: #FFFBFB;
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      padding: 7px 20px;
      border-radius: 30px;
      white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      box-shadow: 0 0 16px var(--neon-pink-glow);
      z-index: 300;
    }
    .music-status.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .reading-card { border-radius: 12px; }
      .bottom-controls { gap: 10px; padding: 10px 12px; }
      .ctrl-btn { padding: 8px 16px; font-size: 13px; }
    }
  </style>
</head>
<body>

  <div id="view-main" class="view active">
    <div class="profile-section">
      <div class="avatar-wrap" onclick="toggleAvatarMsg()">
        <div class="avatar-glow"></div>
        <div class="avatar-ring"></div>
        <img
          src="https://files.catbox.moe/inbpcb.jpg"
          alt="صورة الرواية"
          onerror="this.src='https://ui-avatars.com/api/?name=رواية&background=1a0a1e&color=ff6ec7&size=200'"
        />
        <div class="avatar-msg" id="avatarMsg">👁️ البيت اللي في آخر الشارع — رعب</div>
      </div>
    </div>

    <div class="novel-title-area" style="margin-top:60px;">
      <div class="novel-main-title">البيت اللي في آخر الشارع</div>
      <div class="novel-subtitle">رواية رعب  </div>
    </div>

    <div class="main-card">
      <div class="card-title">اختاري الفصل الى هتقرئيه ي قزحتي </div>
      <div class="buttons-wrapper" id="chaptersButtons"></div>
      <div class="chapter-msg" id="chapterMsg">
        <span id="chapterMsgText"></span>
      </div>
    </div>
  </div>

  <div id="view-chapter" class="view">
    <div class="top-bar">
      <span class="chapter-label" id="chapterLabel"></span>
    </div>
    <div class="chapter-body">
      <div class="reading-card">
        <h2 id="chapterTitle"></h2>
        <div id="chapterContent"></div>
      </div>
    </div>
    <div class="bottom-controls">
      <button class="ctrl-btn" id="musicBtn" onclick="handleMusic()">♪ تشغيل موسيقى</button>
      <button class="ctrl-btn" onclick="goBack()">← رجوع</button>
    </div>
    <div class="music-status" id="musicStatus"></div>
  </div>

  <script>
    const chapters = [
  {
    title: 'الفصل الأول — الجيران الجدد',
    preview: '🏚️ نور تنتقل للشقة الجديدة... والبيت المهجور في آخر الشارع بيفضل يسحبها',
    content: `<strong>— جزء أول —</strong><br/><br/>
الشقة كانت في الدور الثالث في عمارة قديمة في شارع ضيق في منطقة شبرا. الشارع ده اسمه شارع الورد — اسم حلو بس ما فيهوش ورد، ما فيهوش حاجة حلوة أصلاً. فيه عربيات قديمة متروكة على الرصيف، وبلاط متكسر، وأعمدة إنارة نصها واقف ونصها بايظ.<br/><br/>
نور — ثمنية وعشرين سنة، مدرسة لغة عربية في مدرسة ابتدائية — انتقلت للشقة دي في أول أكتوبر. سببت ترك الشقة القديمة ظروف — الإيجار اتضاعف، وهي مش قادرة. الشقة الجديدة رخيصة بشكل غريب. صاحب الشقة — الحاج صالح، راجل في السبعينات، هادي بس وشه فيه قلق خفي — أجّرها بدون ما يسأل كتير. بس قبل ما يديها المفاتيح، قالها جملة غريبة:<br/><br/>
"يا بنتي، الجيران هنا كويسين. بس البيت اللي في آخر الشارع — ابعدي عنه."<br/><br/>
"أي بيت؟"<br/><br/>
"هتعرفيه. البيت الكبير اللي بوابته حديد صدي."<br/><br/>
نور ابتسمت وأخدت المفاتيح. قالت لنفسها: راجل كبير، بيخاف من حاجات عادية.<br/><br/>
<strong>— جزء تاني —</strong><br/><br/>
الشقة كانت واسعة بمعايير شبرا — أوضتين ومطبخ وحمام. الحيطان لونها بيج قديم مايل للأصفر، فيها بقع رطوبة في الزوايا. الأرضية بلاط تقيل بارد حتى في الصيف. الشبابيك حديد وعليها دهان قشر.<br/><br/>
نور فتحت الشباك الكبير اللي بيطل على الشارع. الشارع ضيق — ممكن تمد إيدك وتلمس العمارة اللي قدامك. في الأسفل، أطفال بيلعبوا كرة، وست عجوزة قاعدة على كرسي قدام بيتها بتشرب شاي.<br/><br/>
بصّت لآخر الشارع. الشارع كان بيتضيق كمان وكمان لحد ما يوصل لنهاية مسدودة. وفي النهاية دي — بيت.<br/><br/>
البيت كان مختلف. مش عمارة — فيلا قديمة، بيت من دورين، بني من طوب أحمر غامق. البوابة حديد صدي عليها خيوط صدأ بنية. الشبابيك كانت مغلقة بكلتيها — بعضها فيه ستاير متسخة، وبعضها فيه خشب مسمور. الجنينة جوا السور كانت فيها أشجار كبيرة، أغصانها بتطلع فوق السور زي أصابع.<br/><br/>
حاجة في البيت ده كانت بتجذب عينيها من غير ما هي تعرف ليه.<br/><br/>
<strong>— جزء تالت —</strong><br/><br/>
في اليوم الأول، نور تعرفت على الجيران. في الشقة اللي تحتها: أم محمد، ست خمسينية طيبة، بعتلها طبق كشري. في الشقة على نفس الدور: أستاذ رمضان، معلم متقاعد، عنده مكتبة كبيرة وبيحب الهدوء.<br/><br/>
لما ذكرت البيت في آخر الشارع، وشوش الاتنين اتغيروا.<br/><br/>
أم محمد قالت وهي بتمشي: "ما تحوشيش في الكلام ده يا بنتي."<br/><br/>
وأستاذ رمضان — اللي كان بيبان مش بيتأثر بحاجة — وقف شوية وقال: "البيت ده مقفول من زمان. ما تقربيش منه."<br/><br/>
"ليه؟ فيه حاجة؟"<br/><br/>
أستاذ رمضان بصّ من وراء النضارة. "في ناس اتقالت عنه. بس الكلام ده ممكن يكون خرافات." ومشي وقفل الباب.<br/><br/>
<strong>— جزء رابع —</strong><br/><br/>
الأسبوع الأول مر بسلام نسبياً. نور اتعودت على الشارع والجيران والشقة. بس في حاجة واحدة كانت بتلاحظها كل يوم:<br/><br/>
البيت في آخر الشارع — مافيش حد بيقرب منه. الأطفال اللي بيلعبوا في الشارع، لما كانوا بيجروا لآخره، كانوا بيوقفوا على بعد عشر متر منه. زي لو في خط مرسوم على الأرض مش شايفاه بس حاسينه.<br/><br/>
نور قعدت في الشقة يوم جمعة وكانت بتقرأ. ساعتها، سمعت صوت. صوت خفيف، زي حد بيدق باب. بصّت الساعة — اتنين ونص الفجر.<br/><br/>
فضلت في سريرها. الصوت وقف. نامت.<br/><br/>
<strong>— جزء خامس —</strong><br/><br/>
الجمعة اللي بعدها، نور كانت بترجع من السوبرماركت. الشنط كانت تقيلة — حملت أكل أسبوع كامل. في وسط الشارع، حستها بتتعب. وقفت لحظة تاخد نفس.<br/><br/>
وبدون ما تقصد، بصّت لآخر الشارع.<br/><br/>
في ولد. ولد صغير، ممكن سبع سنين، واقف قدام بوابة البيت الحديد. كان لابس هدوم قديمة — جلابية بيضا، حافي القدمين. كان بيبص فيها بعيون هادية.<br/><br/>
نور حملت الشنط وكملت طريقها. لما وصلت للعمارة واتحولت تبص تاني — الولد اتخفى.<br/><br/>
دخلت الشقة وحطت الشنط. حستها بضيق في صدرها. قالت لنفسها: ولد حي بيلعب. عادي.<br/><br/>
بس الولد ده — ما كانش لابس أي حاجة في رجليه، والأرض كانت باردة جداً في أكتوبر.<br/><br/>
<strong>— جزء سادس —</strong><br/><br/>
في الشغل، نور اتكلمت مع زميلتها سها — مدرسة رياضة، صاحبتها من أيام الجامعة. حكتلها عن البيت والولد.<br/><br/>
سها ضحكت. "إنتِ بدأتِ تتخيلي يا نور."<br/><br/>
"بحلف شفته."<br/><br/>
"حتى لو. ولد في الشارع. مش حاجة غريبة."<br/><br/>
"بس عيونه كانوا..."<br/><br/>
"كانوا إيه؟"<br/><br/>
نور فكرت. "فارغين."<br/><br/>
سها ما ردتش. الكلمة دي — "فارغين" — خلّت الجو بينهم يبرد شوية.<br/><br/>
<strong>— جزء سابع —</strong><br/><br/>
في الليلة دي، الساعة تلاتة الفجر، صوت الدق رجع. المرة دي أوضح. مش دق — صوت تقيل، إيقاعي، زي حد بيمشي ببطء على أرضية خشب قديم.<br/><br/>
الصوت كان جاي من الشقة اللي فوقيها. الشقة دي كانت فاضية — صاحب الشقة قالها ده لما أجّرها. ما فيش ساكن فيها.<br/><br/>
نور قعدت في سريرها. الصوت كمّل — قدم، قدم، قدم. بطيء ومنتظم. وبعدين توقف.<br/><br/>
وبعد الصمت بثواني، سمعت حاجة تانية — زي نفس حد بينام. نفس عميق طويل، جاي من السقف فوقيها.<br/><br/>

الأطفال نزلوا يلعبوا. وللمرة الأولى من وقت ما بدأت تلاحظ — ركضوا لآخر الشارع. ووصلوا للبوابة. ووقفوا هناك يضحكوا ويلعبوا، زي لو الخط المرسوم على الأرض مش موجود بعد كده.<br/><br/>
<strong>— خاتمة —</strong><br/><br/>
بعد أسابيع، عادل خرج من البيت للمرة الأولى من سنين. نور صاحبته — مشوا في الشارع مع بعض. الجيران بصوله ببعض غرابة. أم محمد كادت تسقط من الدهشة.<br/><br/>
مشيوا لأستاذ رمضان. نور قدّمته. أستاذ رمضان ما تعجبش كتير — بس قال: "الكراسة عملت مفعولها."<br/><br/>
جلسوا تلاتتهم وشربوا شاي. عادل ما كانش بيعرف يتكلم كتير — سبعين سنة من الصمت ما بتتعوض في يوم. بس كان موجود. وكان بيسمع. وفي عيونه الكبيرة التعبانة — لأول مرة — كان فيه حاجة غابت من زمان.<br/><br/>
كان فيه سلام.<br/><br/>
ونور — في شقتها في الليل، وهي بتبص للنجوم من الشباك — فكّرت في سامي. الولد الصغير اللي عاش في خوف وكتب خوفه في كراسة صفرا. اللي انتظر من ورا الباب لحد ما حد قرر يسمعه.<br/><br/>
أحياناً، الروح المحبوسة ما بتكونش وحش. أحياناً بتكون حد ضاع وما لاقاش طريق الرجوع.<br/><br/>
والحل — أحياناً — مش بالهرب ولا بالقتال. بالجلوس، والسماع، والقراءة بصوت عالي في أوضة مظلمة، في منتصف الليل.<br/><br/>
<strong>— النهاية —</strong>`

    let currentChapterIndex = null;

    function toggleAvatarMsg() {
      const msg = document.getElementById('avatarMsg');
      msg.classList.toggle('show');
      setTimeout(() => msg.classList.remove('show'), 3000);
    }

    function renderChapters() {
      const container = document.getElementById('chaptersButtons');
      container.innerHTML = '';
      chapters.forEach((ch, idx) => {
        const btn = document.createElement('button');
        btn.className = 'fall-btn';
        btn.onclick = () => openChapter(idx);
        btn.innerHTML = `
          <div class="btn-top">
            <span class="btn-num">${idx + 1}</span>
            <div class="btn-text-wrap">
              <div>${ch.title}</div>
              <div class="btn-preview">${ch.preview}</div>
            </div>
          </div>
        `;
        container.appendChild(btn);
      });
    }

    function openChapter(index) {
      currentChapterIndex = index;
      const ch = chapters[index];
      document.getElementById('chapterLabel').textContent = ch.title;
      document.getElementById('chapterTitle').textContent = ch.title;
      document.getElementById('chapterContent').innerHTML = ch.content;
      document.getElementById('view-main').classList.remove('active');
      document.getElementById('view-chapter').classList.add('active');
      window.scrollTo(0, 0);
    }

    function goBack() {
      document.getElementById('view-chapter').classList.remove('active');
      document.getElementById('view-main').classList.add('active');
      window.scrollTo(0, 0);
    }

    let musicPlaying = false;
    let audio = null;
    let currentTrack = 0;

    const songs = [
  'https://files.catbox.moe/lxndt.mp3',
  'https://files.catbox.moe/twmgbl.mp3',
  'https://files.catbox.moe/6qzo5p.mp3',
  'https://files.catbox.moe/cw8poa.mp3',
  'https://files.catbox.moe/hjqj1k.mp3',
  'https://files.catbox.moe/2bdoc7.mp3',
  'https://files.catbox.moe/cmzw9j.mp3',
  'https://files.catbox.moe/1dspxh.mp3',
  'https://files.catbox.moe/t5xnwb.mp3',
  'https://files.catbox.moe/aolqiy.mp3'
];

    function handleMusic() {
      const btn = document.getElementById('musicBtn');
      const status = document.getElementById('musicStatus');

      if (!musicPlaying) {
        audio = new Audio(tracks[currentTrack]);
        audio.loop = true;
        audio.volume = 0.5;
        audio.play();
        musicPlaying = true;
        btn.classList.add('music-active');
        btn.textContent = '♪ إيقاف الموسيقى';
        status.textContent = '🎵 موسيقى ' + (currentTrack + 1);
      } else {
        audio.pause();
        currentTrack++;
        if (currentTrack < tracks.length) {
          audio = new Audio(tracks[currentTrack]);
          audio.loop = true;
          audio.volume = 0.5;
          audio.play();
          btn.textContent = '♪ إيقاف الموسيقى';
          status.textContent = '🎵 موسيقى ' + (currentTrack + 1);
        } else {
          musicPlaying = false;
          currentTrack = 0;
          audio = null;
          btn.classList.remove('music-active');
          btn.textContent = '♪ تشغيل موسيقى';
          status.textContent = '🎵 الموسيقى متوقفة';
        }
      }
      status.classList.add('show');
      setTimeout(() => status.classList.remove('show'), 2000);
    }

    renderChapters();
  </script>
