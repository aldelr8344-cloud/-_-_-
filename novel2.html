<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قارئ الروايات</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon-pink: #ff2d9b;
      --neon-pink-glow: #ff2d9b88;
      --neon-pink-light: #ff6ec7;
    }

    html, body { min-height: 100vh; font-family: 'Cairo', sans-serif; }

    body {
      background: url('https://files.catbox.moe/gm8a25.jpg') no-repeat center center fixed;
      background-size: cover;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, rgba(10,5,30,0.45) 0%, rgba(5,0,20,0.55) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .view { display: none; }
    .view.active { display: block; }

    #view-main {
      min-height: 100vh;
      position: relative;
      z-index: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }
    #view-main.active { display: flex; }

    .profile-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
    }

    .avatar-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      cursor: pointer;
      margin-bottom: 14px;
    }

    .avatar-wrap img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 2;
      transition: transform 0.4s ease;
    }
    .avatar-wrap:hover img { transform: scale(1.06); }

    .avatar-ring {
      position: absolute; inset: -5px;
      border-radius: 50%;
      background: conic-gradient(
        var(--neon-pink) 0deg, transparent 80deg,
        var(--neon-pink-light) 160deg, transparent 240deg,
        var(--neon-pink) 360deg
      );
      animation: spin 3s linear infinite;
      z-index: 1;
    }
    .avatar-ring::after {
      content: '';
      position: absolute; inset: 4px;
      border-radius: 50%;
      background: #0a050a;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-glow {
      position: absolute; inset: -15px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--neon-pink-glow) 0%, transparent 70%);
      animation: pulse-glow 2s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes pulse-glow {
      from { opacity: 0.5; transform: scale(0.95); }
      to   { opacity: 1;   transform: scale(1.05); }
    }

    .avatar-msg {
      position: absolute;
      bottom: -52px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(10,5,25,0.92);
      border: 1px solid var(--neon-pink);
      color: var(--neon-pink-light);
      font-size: 13px;
      white-space: nowrap;
      padding: 7px 16px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      box-shadow: 0 0 14px var(--neon-pink-glow);
      z-index: 10;
    }
    .avatar-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .main-card {
      background: rgba(10, 10, 15, 0.70);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border: 1px solid rgba(255, 45, 155, 0.22);
      border-radius: 20px;
      width: 100%; max-width: 620px;
      padding: 36px 28px 30px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .card-title {
      text-align: center;
      color: #f0e6ff;
      font-size: clamp(18px, 4vw, 24px);
      font-weight: 700;
      margin-bottom: 28px;
      text-shadow: 0 0 20px var(--neon-pink-glow);
    }

    .buttons-wrapper {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .fall-btn {
      position: relative;
      padding: 0; border: none; background: none;
      cursor: pointer; outline: none;
      font-family: 'Cairo', sans-serif;
    }

    .fall-btn .btn-top {
      display: block;
      position: relative;
      padding: 10px 20px;
      font-size: clamp(13px, 2.5vw, 15px);
      font-weight: 700;
      color: var(--neon-pink-light);
      background: #1a0a1e;
      border-radius: 10px;
      border: 1.5px solid var(--neon-pink);
      box-shadow: 0 0 8px var(--neon-pink-glow), inset 0 1px 0 rgba(255,255,255,0.08);
      transform: translateY(-4px);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      white-space: nowrap;
    }
    .fall-btn::after {
      content: '';
      display: block;
      position: absolute;
      bottom: 0; left: 4px; right: 4px; height: 8px;
      background: #7a0040;
      border-radius: 0 0 10px 10px;
      z-index: -1;
    }
    .fall-btn:hover .btn-top {
      transform: translateY(-2px);
      box-shadow: 0 0 16px var(--neon-pink), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .fall-btn:active .btn-top {
      transform: translateY(0);
      box-shadow: 0 0 6px var(--neon-pink-glow);
    }

    .chapter-msg {
      overflow: hidden; max-height: 0; opacity: 0;
      transition: max-height 0.5s ease, opacity 0.4s ease, padding 0.3s ease;
      text-align: center;
    }
    .chapter-msg.show { max-height: 80px; opacity: 1; padding: 12px 0 4px; }
    .chapter-msg span {
      display: inline-block;
      background: rgba(255,45,155,0.10);
      border: 1px solid rgba(255,45,155,0.3);
      border-radius: 30px;
      padding: 6px 20px;
      color: var(--neon-pink-light);
      font-size: 13px;
    }

    #view-chapter {
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .top-bar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8, 3, 20, 0.80);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,45,155,0.20);
      padding: 13px 24px;
      text-align: center;
    }

    .chapter-label {
      color: #e8d8f8;
      font-size: clamp(14px, 3vw, 18px);
      font-weight: 700;
      text-shadow: 0 0 16px var(--neon-pink-glow);
    }

    .chapter-body {
      display: flex;
      justify-content: center;
      padding: 40px 16px 120px;
    }

    .reading-card {
      width: 100%; max-width: 720px;
      background: rgba(255, 252, 255, 0.18);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 16px;
      padding: clamp(24px, 5vw, 48px) clamp(20px, 5vw, 52px);
      box-shadow: 0 8px 50px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.06) inset;
    }

    .reading-card h2 {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 900;
      color: #fff;
      text-align: center;
      margin-bottom: 28px;
      text-shadow: 0 0 24px var(--neon-pink-glow);
    }

    .reading-card p {
      font-family: 'Amiri', serif;
      font-size: clamp(16px, 2.5vw, 20px);
      line-height: 2.1;
      color: rgba(255,255,255,0.92);
      text-align: justify;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }

    .bottom-controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(5, 2, 15, 0.90);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,0.10);
      padding: 14px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      background: #111; color: #ddd;
      border: 1.5px solid #333; border-radius: 8px;
      padding: 9px 22px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .ctrl-btn:hover { background: #1e1e1e; border-color: #555; color: #fff; }
    .ctrl-btn:active { background: #0a0a0a; transform: scale(0.97); }
    .ctrl-btn.music-active { border-color: var(--neon-pink); color: var(--neon-pink-light); }

    .music-status {
      position: fixed;
      bottom: 72px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(10,5,25,0.93);
      border: 1px solid var(--neon-pink);
      color: #ff6ec7;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      padding: 7px 20px;
      border-radius: 30px;
      white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      box-shadow: 0 0 16px var(--neon-pink-glow);
      z-index: 300;
    }
    .music-status.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .reading-card { border-radius: 12px; }
      .bottom-controls { gap: 10px; padding: 10px 12px; }
      .ctrl-btn { padding: 8px 16px; font-size: 13px; }
      .avatar-msg { font-size: 11px; white-space: normal; text-align: center; width: 200px; bottom: -66px; }
    }
  </style>
</head>
<body>

  <div id="view-main" class="view active">

    <div class="profile-section">
      <div class="avatar-wrap" onclick="toggleAvatarMsg()">
        <div class="avatar-glow"></div>
        <div class="avatar-ring"></div>
        <img
          src="https://files.catbox.moe/inbpcb.jpg"
          alt="صورة الكاتب"
          onerror="this.src='https://ui-avatars.com/api/?name=رواية&background=1a0a1e&color=ff6ec7&size=200'"
        />
        <div class="avatar-msg" id="avatarMsg">
      انتي تدوسي على اي حاجه وخلاص 😂
        </div>
      </div>
    </div>

    <div class="main-card">
      <div class="card-title">✨اختاري الفصا الى هتقرأيه ي مزه ✨
      <br>متشتميش في سرك😒<br>روايه رومنسيه😉 </div>
      
      <div class="buttons-wrapper">
        <button class="fall-btn" onclick="goToChapter(0, this)"><span class="btn-top">الفصل الأول</span></button>
        <button class="fall-btn" onclick="goToChapter(1, this)"><span class="btn-top">الفصل الثاني</span></button>
        <button class="fall-btn" onclick="goToChapter(2, this)"><span class="btn-top">الفصل الثالث</span></button>
        <button class="fall-btn" onclick="goToChapter(3, this)"><span class="btn-top">الفصل الرابع</span></button>
        <button class="fall-btn" onclick="goToChapter(4, this)"><span class="btn-top">الفصل الخامس</span></button>
      </div>
      <div class="chapter-msg" id="chapterMsg">
        <span id="chapterMsgText"></span>
      </div>
    </div>

  </div>

  <div id="view-chapter" class="view">

    <div class="top-bar">
      <span class="chapter-label" id="chapterLabel"></span>
    </div>

    <div class="chapter-body">
      <div class="reading-card">
        <h2 id="chapterTitle"></h2>
        <p id="chapterContent"></p>
      </div>
    </div>

    <div class="bottom-controls">
      <button class="ctrl-btn" id="musicBtn" onclick="handleMusic()">♪ تشغيل أغاني</button>
      <button class="ctrl-btn" onclick="goBack()">← رجوع</button>
    </div>
    <div class="music-status" id="musicStatus"></div>

  </div>

  <script>

    const chapters = [
      {
        title: 'الفصل الأول — أول ما شوفته',
        preview: '💫 لقاء مش متوقع بيغير كل حاجة...',
        content: `
<strong>الجزء الأول — يوم زي أي يوم</strong><br/><br/>
الساعة كانت تقريباً سبعة وربع الصبح لما فريدة فتحت عينيها على صوت المنبه. مدّت إيدها من تحت الغطا وضربت الموبايل على الطاولة الجانبية بدون ما تفتح عنيها بالظبط. وقع الموبايل على الأرض، وهي قامت قاعدة وشعرها على وشها زي عشة العصفور.<br/><br/>
"يا رب..." همهمت وهي بتحرك أصابع رجليها على السجادة الصغيرة جنب السرير. السجادة دي كانت لها من أيام الجامعة، زرقاء بيضاء ومهترية من الأطراف، بس هي مش بتقدر ترميها. فيها ذكريات مش بس ذكريات ناعمة — فيها أيام امتحانات وساعات مذاكرة ودموع بكتها من غير ما حد يشوفها.<br/><br/>
قامت مشيت على الحمام. الكهرباء اتقطعت مرتين من أمبارح، وساعتها لقت الوش بارد من غير ما تحمي المية. غسلت وشها بسرعة، وبصّت في المراية. وشها المستدير، عنيها البنية اللي فيها شبح من الذهب لو الشمس لقتها بالظبط، أنفها اللي هي دايماً بتقول عليه "أنف مصرية أصيلة" وهي ساعتها بتضحك لحالها.<br/><br/>
لبست وسرّحت شعرها اللي وصل كتفيها، وعملت قهوتها على نار هادية وهي بتبص من الشباك على الشارع اللي تحت. الجيران فتحوا الدكان، والعربيات بدأت تعدي، والفول بتاع الحاج صالح بان دخانه من بعيد. حاجة عادية. يوم عادي. فريدة بتشتغل في دار نشر في وسط البلد، بتراجع مخطوطات وبتعمل بروفريدينج ومبيلفتش منها حد كتير. مرتبها يكفيها وزيادة كمان بالحسبة دي أو دي.<br/><br/>
خدت الشنطة، قفّلت الباب ونزلت الدرج. الدرج بتاع العمارة فيه ثمانية وعشرين درجة — هي عارفاهم عن ظهر قلب من زمان. كانت بتعدهم وهي صغيرة وأمها بتجيبها من المدرسة. دلوقتي بتعدهم لما بتيجي زعلانة أو بتفكر في حاجة.<br/><br/>
<br/>
<strong>الجزء التاني — الأوتوبيس ورقم خمسة</strong><br/><br/>
محطة الأوتوبيس كانت على بعد خمس دقايق مشي. فريدة بتمشي بخطوات منتظمة، شنطتها على كتفها، سماعة واحدة في ودانها والتانية متدلية، وهي بتسمع بودكاست عن الأدب المصري في التمانينات. موضوع بتعشقه هي من وقت ما اتخرجت من آداب اللغة العربية قسم الدراسات الأدبية.<br/><br/>
لقت الأوتوبيس واقف وناس بتطلع. اتدفشت مع الزحمة ووقفت جنب الشباك من الجوا. الجو كان لطيف نسبياً للنسبة لشهر مارس في القاهرة — ريح خفيفة وشمس لسه مش قاسية. الناس في الأوتوبيس: ست معاها عيلين، واحد بيتكلم في التليفون بصوت عالي، وبنت صغيرة نايمة على كتف امها بعدين صحّت وفضلت تبص بعنيين وسعين زي القطط.<br/><br/>
في المحطة التالتة ركب ناس تانيين. فريدة حولت بصرها للشباك وفضلت تبص على الشارع. وبعدين سمعت صوت: "معلش، فيه مكان؟"<br/><br/>
اتلفّت. واحد واقف جنبها بيتكلم مش معاها — بيتكلم مع الست اللي كانت واقفة قدامها. الست حولت كتفها وقاله ما فيش. هو شدّ كتفيه وقال "تمام" بهدوء، وبعدين قبض على الحديدة فوقيه وفضل واقف.<br/><br/>
فريدة بصّت فيه لثانية. طويل، بشرته حنطية، لابس قميص كحلي مطوّي الأكمام لنص الساعد. فيه حاجة في وشه مش قادرة تحددها — مش وسيم على طول الخط، بس فيه حاجة ماشية فيه. عنيه بتتحرك كتير، زي ما هو بيلاحظ كل حاجة من حواليه بدون ما يبان عليه.<br/><br/>
بعد كام محطة، وقعت الشنطة بتاعتها من على كتفها. انحنت تشيلها وفي نفس اللحظة قدمه كانت قريبة. ماشت عليها بالغلط.<br/><br/>
"آه!" قالها هو بصوت خافت ومش جامد خالص.<br/><br/>
هي وقفت في الحال. "أنا آسفة جداً! أنا ما شوفتكش."<br/><br/>
"لا لا، مش مشكلة." ابتسم. ابتسامة خفيفة من ناحية واحدة بس.<br/><br/>
وانتهى الأمر. نزلت في محطتها وهو فضل في الأوتوبيس.<br/><br/>
<br/>
<strong>الجزء التالت — شغل زي الشغل</strong><br/><br/>
دار النشر كانت في شارع جانبي من شارع قصر العيني، في عمارة قديمة من الستينات بها مصعد خشبي بيتكلم وأنت شايله. مكتب فريدة كان في الدور التاني، أوضة وسطها كبيرة فيها تلات مكاتب. مكتبها كان قصاد الشباك اللي بيطل على شجرة كافور ضخمة أوراقها بتخضّر دايماً.<br/><br/>
جلست وفتحت اللابتوب وبدأت شغل. عندها مخطوطة من كاتب شاب اسمه بهاء — قصص قصيرة بتدور في أحياء القاهرة. الكتابة فيها طاقة بس فيها أغلاط كتير في الإيقاع. هي بتحب الشغل ده — إنها تاخد حاجة خام وتعمل فيها بيديها لحد ما تبقى صورة أوضح.<br/><br/>
الساعة اتناشر جه مصطفى، زميلها، ووقف على باب أوضتها. مصطفى كان تقريباً في الأربعين، نضّارات مستديرة وشعر رمادي من عند الصدغين. "فريدة، الأستاذ وليد عايزك في مكتبه."<br/><br/>
"خلاص، جاي."<br/><br/>
الأستاذ وليد كان صاحب دار النشر. رجل في الستين، ضهره منتصب وكلامه قليل بس مضبوط. "فريدة، عندي مخطوطة جديدة وصلتني امبارح. كاتب اسمه آدم نصر. محتاجة تاخديها وتشوفي إيه اللي فيها."<br/><br/>
ناولها ملف. هي خدته ورجعت لمكتبها. فتحت الملف. الصفحة الأولى فيها اسم المخطوطة: "ما قبل النسيان — قصص من المدينة."<br/><br/>
قرأت الأسطر الأولى. وقفت.<br/><br/>
الكتابة كانت مختلفة. مش الاختلاف اللي بتقوله عشان توصفه، ده الاختلاف اللي بتحس بيه قبل ما توصفه. في جملة قرأتها تلاتة مرات في بعض من غير ما تاخد بالها.<br/><br/>
<br/>
<strong>الجزء الرابع — المخطوطة</strong><br/><br/>
"في كل حارة قديمة في القاهرة، في واحد بيفضّل يتذكر. مش عشان بيحب التاريخ، بس عشان التاريخ بيسكن جوّاه زي إيجار مش قادر يطلعه."<br/><br/>
ده كان الأول سطر.<br/><br/>
فريدة فضلت تقرأ لحد ما الساعة بقت تلاتة وربع ولقت إنها ما أكلتش الأكل اللي جابته من البيت. وقفت، مدّت ضهرها، ومسحت عنيها. المخطوطة كانت في حوالي مية وعشرين صفحة، وهي عدت خمسة وستين فيهم.<br/><br/>
قامت وعملت شاي وبعدين بقت تقرأ تاني. الكتابة فيها وصف أماكن بيخليك تحس إنك قاعد فيها. الشخصيات مش بطولية ولا ضعيفة — بس موجودة بكل ثقلها البشري. واللغة — اللغة دي ولاّعة فريدة من أول سطر.<br/><br/>
مين آدم نصر ده؟<br/><br/>
بحثت عنه على النت. لقت اسمه على صفحة موقع أدبي صغير، في كتاب مجموعة من خمس سنين فات. الصورة كانت صغيرة وباهتة — واحد واقف قدام رف كتب، مش بيبص في الكاميرا. وجهه نص واضح ونص في ضل.<br/><br/>

<strong>الجزء التالت — مطعم صغير في الجيزة</strong><br/><br/>
كان مطعم شعبي صغير في شارع جانبي في الجيزة، آدم بيعرفه من زمان. طاولات خشبية وكراسي متنوعة ومكتوب على الحيطة "أكل بيتي" بخط إيد. الأكل كان حقيقي — ملوخية بالأرانب وخبز بلدي.<br/><br/>
قعدوا. وأكلوا. وتكلموا بشكل عادي وعميق في نفس الوقت — عن الأحياء القاهرية وعن أسباب إن الناس بتتعلق بأماكن مش بتتعلق بغيرها، وعن إن السيدة زينب عند آدم مش مجرد حي ده جزء من هويته.<br/><br/>
"إنتِ لو قولتيلي السيدة زينب في جملة واحدة؟" سألها.<br/><br/>
"دفا غير متوقع في وسط الزحمة."<br/><br/>
هو بص فيها. "ده الوصف الأدق اللي سمعته."<br/><br/>
"لأني حسيته لما زرته مرة."<br/><br/>
"امتى؟"<br/><br/>
"سنة أولى جامعة. كانت زيارة ميدانية مع أساتذة قسم التراث."<br/><br/>
"وحسيتي بإيه؟"<br/><br/>
فكرت. "إن في ناس هنا بتشيل التاريخ بجسمها وهي ماشية. مش بيفكروا فيه، بس هم مصنوعين منه."<br/><br/>
آدم ما قالش حاجة. بس عنيه كانت بتبان فيهم حاجة — مش إعجاب بالضرورة، بس إنه شايف حاجة بتعبر عنه هو برضو.<br/><br/>
<br/>
<strong>الجزء الرابع — في الشارع بعد الأكل</strong><br/><br/>
طلعوا بره وشمس المساء كانت برتقالية جداً. الشارع ده هادي وفيه بائع فاكهة واقف على العربية بتاعته. آدم اشترى برتقالتين، ناول فريدة واحدة.<br/><br/>
مشيا وأيديهم متشابكة هالمرة — من غير قرار، بس بهدوء وطبيعية. أصابعها بين أصابعه، وهو ماشي بخطوة تناسب خطوتها.<br/><br/>
"إنت بتفكر في إيه؟" سألته.<br/><br/>
"في إننا لو رجعنا تاني لمحطة الأوتوبيس دي يوم ما وقفتِ على رجلي."<br/><br/>
"أيوه؟"<br/><br/>
"كنت هشيل إيدي من الحديدة وأقف في أي حتة تانية عشان تلاقي مكان تقفي فيه."<br/><br/>
فريدة ضحكت. "وماعملتش."<br/><br/>
"وماعملتش." قالها ببساطة وفيها قبول.<br/><br/>
<br/>
<strong>الجزء الخامس — الأستاذة سلوى</strong><br/><br/>
الجمعة الجاية، فريدة كانت بتنزل من البيت لما الأستاذة سلوى بتطلع من أوضتها وهي شايلة وعاء فيه بانسيه أحمر.<br/><br/>
"إزيك يا فريدة؟"<br/><br/>
"تمام يا أستاذة، والحمد لله."<br/><br/>
الأستاذة سلوى بصّت فيها لثانية. "في حاجة اتغيرت فيكي."<br/><br/>
فريدة استغربت. "إيه؟"<br/><br/>
"بصوا بعنيهم اللي بيبصوا." قالتها الأستاذة سلوى ومشت.<br/><br/>
فريدة فضلت قايمة على الدرج لثانية واحدة وبعدين ضحكت.<br/><br/>
<br/>
<strong>الجزء السادس — الكتاب والاسم</strong><br/><br/>
لما الكتاب طبع بعد شهرين ونص، آدم جاب نسخة لفريدة. الغلاف كان تصميمه هو — رسمة بسيطة لحارة ضيقة من زاوية من فوق، والألوان داكنة غير الضو الصفراني من شباك واحد في الأعلى.<br/><br/>
"التصميم ده جميل." قالت هي وهي بتمسكه.<br/><br/>
"عملته وأنا بفكر في اللقاء الأول."<br/><br/>
"مين اللي قابل مين؟"<br/><br/>
"اللي كنت بكتبه مع اللي بتقراه."<br/><br/>
فتحت الغلاف. الصفحة الأولى فيها الإهداء:<br/><br/>
"لكل من يعرف اسم الشيء قبل ما يقوله."<br/><br/>
بصّت فيه. "ده عني."<br/><br/>
"ده عنا."<br/><br/>
وهي مسكت الكتاب في إيديها وحست بثقله — مش ثقل الورق بس، ثقل الوقت اللي فيه.<br/><br/>
<br/>
<strong>الجزء السابع — يوم عادي بعدين</strong><br/><br/>
الحياة ما بتوقفش بعد اللحظات الكبيرة. بعد الكتاب والإهداء والشعور الكبير ده، الأيام رجعت زي ما هي — شغل وأوتوبيس وزحمة قاهرة وأكل وسهر وصحيان.<br/><br/>
بس في تفاصيل الأيام دي، في حاجات جديدة.<br/><br/>
رسالة الصبح من آدم تسأل على فريدة. مكالمة في المساء لما واحد منهم يلاقي حاجة ظريفة ويحس إن الثاني لازم يعرفها. جمعة في نقطة بس المرة دي هما الاتنين بيقروا من كتابين مختلفين وأحياناً حدهم يقرأ لوح جمل للثاني.<br/><br/>
وأحياناً في صمت ما فيهوش أي حاجة ناقصة.<br/><br/>
فريدة اكتشفت إن الحب مش حاجة واحدة كبيرة بتحصل. هو حاجات صغيرة كتير بتتراكم — ابتسامة ناحية واحدة، وسؤال بيسألك بجد، ومطر في وسط البلد، وجملة تكتبها عنك وانت ما كلمتوش عنها. ودفا خفيف ما قلتوش اسمه بالظبط لحد ما إيدين اتشابكوا في شارع برتقالي المساء.<br/><br/>
<br/>
<strong>الجزء التامن — الأستاذة سلوى والبانسيه</strong><br/><br/>
في يوم من الأيام، فريدة أخدت واحدة من نباتات البانسيه من الأستاذة سلوى — مش هدية، دفعت فيها. حطتها على أوضة السرير قصاد الشباك. البانسيه الأحمر في الشمس بيبان بنفسجي شوية.<br/><br/>
آدم لما شافه في أول مرة جه الشقة، وقف قصاده وقال: "ده جميل."<br/><br/>
"من جارتي."<br/><br/>
"اللي بتزرع وتبيع."<br/><br/>
"نفسها."<br/><br/>
هو مد إيده ولمسه بإصبع واحدة. "بنكتب عنها؟"<br/><br/>
"انت قولت إنك هتكتب عنها."<br/><br/>
"أيوه." ابتسم. "وقتها جه."<br/><br/>
<br/>
<strong>الجزء التاسع — الخاتمة اللي مش نهاية</strong><br/><br/>
مفيش خاتمة درامية في القصة دي. مفيش لحظة واحدة كبيرة بتحسم كل حاجة. الحياة مش شغالة كده وهما الاتنين عارفين ده.<br/><br/>
في يوم من الأيام، فريدة قاعدة في مكتبها والشمس على الشجرة الكافور من بره الشباك. عندها مخطوطة جديدة من كاتبة شابة عن علاقة أم وبنت. الكلام فيها طاقة بس محتاجة وقت وتعديل.<br/><br/>
موبايلها ورا بعتله رسالة: "عامل إيه؟"<br/><br/>
ردّها جه بعد دقيقة: "تمام. بكتب. انتِ؟"<br/><br/>
"بشتغل. في مخطوطة جديدة."<br/><br/>
"حلوة؟"<br/><br/>
"محتاجة شغل."<br/><br/>
"زي الكل في الأول."<br/><br/>
هي ابتسمت في الشاشة وبعتتله: "بالظبط."<br/><br/>
وفضلت تقرأ.<br/><br/>
بره الشباك، الشجرة الكافور كانت بتتحرك في نسمة خفيفة. والقاهرة كانت بتشتغل كعادتها — صوت وعربيات وحياة. وفريدة في الوسط ده كانت حاسة بحاجة ما كانتش حاساها بنفس القوة من وقت — إنها في مكانها بالظبط.<br/><br/>
مش لأن كل حاجة اتحلت. بس لأن في حد بيسمعها لما بتتكلم. وفي حد بيبص فيها بعنيه كلها من غير ما يخبي جزء منه. وفي حد كتب عنها من غير ما هي تطلب.<br/><br/>
وده كان كافي. كان أكتر من كافي.
        `
      }
    ];

    let avatarTimer = null;
    function toggleAvatarMsg() {
      const msg = document.getElementById('avatarMsg');
      msg.classList.add('show');
      clearTimeout(avatarTimer);
      avatarTimer = setTimeout(() => msg.classList.remove('show'), 3000);
    }

    function showView(id) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    let msgTimer = null;

    function goToChapter(index) {
      const ch = chapters[index];
      const msg = document.getElementById('chapterMsg');
      document.getElementById('chapterMsgText').textContent = ch.preview;
      msg.classList.add('show');
      clearTimeout(msgTimer);
      document.getElementById('chapterLabel').textContent = ch.title;
      document.getElementById('chapterTitle').textContent = ch.title;
      document.getElementById('chapterContent').innerHTML = ch.content;
      msgTimer = setTimeout(() => {
        msg.classList.remove('show');
        stopMusic();
        showView('view-chapter');
      }, 800);
    }

    function goBack() {
      stopMusic();
      showView('view-main');
    }

    const songs = [
  'https://files.catbox.moe/lxndt.mp3',
  'https://files.catbox.moe/twmgbl.mp3',
  'https://files.catbox.moe/6qzo5p.mp3',
  'https://files.catbox.moe/cw8poa.mp3',
  'https://files.catbox.moe/hjqj1k.mp3',
  'https://files.catbox.moe/2bdoc7.mp3',
  'https://files.catbox.moe/cmzw9j.mp3',
  'https://files.catbox.moe/1dspxh.mp3',
  'https://files.catbox.moe/t5xnwb.mp3',
  'https://files.catbox.moe/aolqiy.mp3'
];

    let audio = null;
    let isPlaying = false;
    let statusTimer = null;

    function showMusicStatus(text) {
      const el = document.getElementById('musicStatus');
      el.textContent = text;
      el.classList.add('show');
      clearTimeout(statusTimer);
      statusTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    function getRandom(exclude) {
      let i;
      do { i = Math.floor(Math.random() * songs.length); }
      while (songs.length > 1 && songs[i] === exclude);
      return songs[i];
    }

    function stopMusic() {
      if (audio) { audio.pause(); audio.src = ''; }
      isPlaying = false;
      const btn = document.getElementById('musicBtn');
      if (btn) { btn.textContent = '♪ تشغيل أغاني'; btn.classList.remove('music-active'); }
    }

    function handleMusic() {
      const btn = document.getElementById('musicBtn');
      if (!isPlaying) {
        if (!audio) audio = new Audio();
        audio.src = getRandom(null);
        audio.play().catch(() => showMusicStatus('⚠️ تعذّر التشغيل'));
        audio.onended = () => { audio.src = getRandom(audio.src); audio.play(); };
        isPlaying = true;
        btn.textContent = '⟳ تغيير الأغنية';
        btn.classList.add('music-active');
        showMusicStatus('♪ جاري التشغيل...');
      } else {
        const prev = audio.src;
        audio.src = getRandom(prev);
        audio.play().catch(() => showMusicStatus('⚠️ تعذّر التشغيل'));
        showMusicStatus('♪ تم تغيير الأغنية');
      }
    }
  </script>
