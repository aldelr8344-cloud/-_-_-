<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قارئ الروايات — بين الخلاف والحب</title>
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon-pink: #ff2d9b;
      --neon-pink-glow: #ff2d9b88;
      --neon-pink-light: #ff6ec7;
    }

    html, body { min-height: 100vh; font-family: 'Tajawal', sans-serif; }

    body {
      background: #0a050a;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(120, 0, 80, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(60, 0, 100, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(80, 0, 60, 0.12) 0%, transparent 50%);
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("https://files.catbox.moe/fxl81r.jpg");
      
      z-index: 0;
      background-position: center;
      background-size: center;
      background-repeat: repeat;
    }

    .view { display: none; }
    .view.active { display: block; }

    #view-main {
      min-height: 100vh;
      position: relative;
      z-index: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }
    #view-main.active { display: flex; }

    .profile-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
    }

    .avatar-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      cursor: pointer;
      margin-bottom: 14px;
    }

    .avatar-wrap img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 2;
      transition: transform 0.4s ease;
    }
    .avatar-wrap:hover img { transform: scale(1.06); }

    .avatar-ring {
      position: absolute; inset: -5px;
      border-radius: 50%;
      background: conic-gradient(
        var(--neon-pink) 0deg, transparent 80deg,
        var(--neon-pink-light) 160deg, transparent 240deg,
        var(--neon-pink) 360deg
      );
      animation: spin 3s linear infinite;
      z-index: 1;
    }
    .avatar-ring::after {
      content: '';
      position: absolute; inset: 4px;
      border-radius: 50%;
      background: #0a050a;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-glow {
      position: absolute; inset: -15px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--neon-pink-glow) 0%, transparent 70%);
      animation: pulse-glow 2s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes pulse-glow {
      from { opacity: 0.5; transform: scale(0.95); }
      to   { opacity: 1;   transform: scale(1.05); }
    }

    .avatar-msg {
      position: absolute;
      bottom: -52px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(10,5,25,0.92);
      border: 1px solid var(--neon-pink);
      color: var(--neon-pink-light);
      font-size: 13px;
      white-space: nowrap;
      padding: 7px 16px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      box-shadow: 0 0 14px var(--neon-pink-glow);
      z-index: 10;
    }
    .avatar-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .novel-title-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .novel-main-title {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(26px, 6vw, 42px);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 30px var(--neon-pink-glow), 0 0 60px rgba(255,45,155,0.3);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .novel-subtitle {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(13px, 2.5vw, 16px);
      color: rgba(255,110,199,0.7);
      font-weight: 400;
      letter-spacing: 3px;
    }

    .main-card {
      background: rgba(10, 10, 15, 0.75);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border: 1px solid rgba(255, 45, 155, 0.22);
      border-radius: 20px;
      width: 100%; max-width: 640px;
      padding: 36px 28px 30px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .card-title {
      text-align: center;
      color: #f0e6ff;
      font-size: clamp(16px, 3.5vw, 20px);
      font-weight: 700;
      margin-bottom: 28px;
      text-shadow: 0 0 20px var(--neon-pink-glow);
    }

    .buttons-wrapper {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 24px;
    }

    .fall-btn {
      position: relative;
      padding: 0; border: none; background: none;
      cursor: pointer; outline: none;
      font-family: 'Tajawal', sans-serif;
      width: 100%;
    }

    .fall-btn .btn-top {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      padding: 14px 22px;
      font-size: clamp(13px, 2.5vw, 16px);
      font-weight: 700;
      color: var(--neon-pink-light);
      background: linear-gradient(135deg, #1a0a1e 0%, #0f0515 100%);
      border-radius: 12px;
      border: 1.5px solid rgba(255,45,155,0.4);
      box-shadow: 0 0 8px rgba(255,45,155,0.15), inset 0 1px 0 rgba(255,255,255,0.06);
      transform: translateY(-4px);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.2s;
      text-align: right;
    }
    .fall-btn .btn-num {
      font-size: 11px;
      color: rgba(255,110,199,0.5);
      font-weight: 400;
      margin-right: auto;
    }
    .fall-btn .btn-preview {
      display: block;
      font-size: 11px;
      color: rgba(200,160,220,0.6);
      font-weight: 400;
      margin-top: 3px;
    }
    .fall-btn .btn-text-wrap { text-align: right; flex: 1; }
    .fall-btn::after {
      content: '';
      display: block;
      position: absolute;
      bottom: 0; left: 6px; right: 6px; height: 8px;
      background: #5a0030;
      border-radius: 0 0 12px 12px;
      z-index: -1;
    }
    .fall-btn:hover .btn-top {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(255,45,155,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
      border-color: rgba(255,45,155,0.7);
    }
    .fall-btn:active .btn-top {
      transform: translateY(0);
      box-shadow: 0 0 6px var(--neon-pink-glow);
    }

    .chapter-msg {
      overflow: hidden; max-height: 0; opacity: 0;
      transition: max-height 0.5s ease, opacity 0.4s ease, padding 0.3s ease;
      text-align: center;
    }
    .chapter-msg.show { max-height: 80px; opacity: 1; padding: 12px 0 4px; }
    .chapter-msg span {
      display: inline-block;
      background: rgba(255,45,155,0.10);
      border: 1px solid rgba(255,45,155,0.3);
      border-radius: 30px;
      padding: 6px 20px;
      color: var(--neon-pink-light);
      font-size: 13px;
    }

    #view-chapter {
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .top-bar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8, 3, 20, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,45,155,0.20);
      padding: 13px 24px;
      text-align: center;
    }

    .chapter-label {
      color: #e8d8f8;
      font-size: clamp(14px, 3vw, 18px);
      font-weight: 700;
      text-shadow: 0 0 16px var(--neon-pink-glow);
    }

    .chapter-body {
      display: flex;
      justify-content: center;
      padding: 40px 16px 120px;
    }

    .reading-card {
      width: 100%; max-width: 760px;
      background: rgba(8, 5, 18, 0.82);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border: 1px solid rgba(255,45,155,0.15);
      border-radius: 16px;
      padding: clamp(28px, 5vw, 56px) clamp(22px, 5vw, 58px);
      box-shadow: 0 8px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .reading-card h2 {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(20px, 4vw, 30px);
      font-weight: 900;
      color: #fff;
      text-align: center;
      margin-bottom: 36px;
      text-shadow: 0 0 24px var(--neon-pink-glow);
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,45,155,0.2);
    }

    #chapterContent {
      font-family: 'Lateef', serif;
      font-size: clamp(19px, 2.8vw, 24px);
      line-height: 2.2;
      color: rgba(235,225,245,0.93);
      text-align: justify;
    }

    #chapterContent strong {
      display: block;
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(16px, 2.5vw, 20px);
      font-weight: 800;
      color: var(--neon-pink-light);
      text-align: center;
      margin: 36px 0 20px;
      text-shadow: 0 0 16px var(--neon-pink-glow);
      letter-spacing: 1px;
    }

    .bottom-controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(5, 2, 15, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,45,155,0.15);
      padding: 14px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      background: rgba(20,10,30,0.9); color: #ccc;
      border: 1.5px solid rgba(255,255,255,0.15); border-radius: 10px;
      padding: 10px 24px;
      font-family: 'Tajawal', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .ctrl-btn:hover { background: rgba(40,20,50,0.9); border-color: rgba(255,255,255,0.3); color: #fff; }
    .ctrl-btn:active { transform: scale(0.97); }
    .ctrl-btn.music-active { border-color: var(--neon-pink); color: var(--neon-pink-light); background: rgba(255,45,155,0.1); }

    .music-status {
      position: fixed;
      bottom: 72px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(10,5,25,0.93);
      border: 1px solid var(--neon-pink);
      color: #ff6ec7;
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      padding: 7px 20px;
      border-radius: 30px;
      white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      box-shadow: 0 0 16px var(--neon-pink-glow);
      z-index: 300;
    }
    .music-status.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .reading-card { border-radius: 12px; }
      .bottom-controls { gap: 10px; padding: 10px 12px; }
      .ctrl-btn { padding: 8px 16px; font-size: 13px; }
    }
  </style>
</head>
<body>

  <div id="view-main" class="view active">
    <div class="profile-section">
      <div class="avatar-wrap" onclick="toggleAvatarMsg()">
        <div class="avatar-glow"></div>
        <div class="avatar-ring"></div>
        <img
          src="https://files.catbox.moe/inbpcb.jpg"
          alt="صورة الرواية"
          onerror="this.src='https://ui-avatars.com/api/?name=رواية&background=1a0a1e&color=ff6ec7&size=200'"
        />
        <div class="avatar-msg" id="avatarMsg">✨ ليان وآدم — رومانسية جامعية</div>
      </div>
    </div>

    <div class="novel-title-area" style="margin-top:60px;">
      <div class="novel-main-title">بين الخلاف والحب</div>
      <div class="novel-subtitle">رواية رومانسية جامعية  🫠💘</div>
    </div>

    <div class="main-card">
      <div class="card-title">✦اختاري الفصل الى هتقرئيه ي قزحتي ✦</div>
      <div class="buttons-wrapper" id="chaptersButtons"></div>
      <div class="chapter-msg" id="chapterMsg">
        <span id="chapterMsgText"></span>
      </div>
    </div>
  </div>

  <div id="view-chapter" class="view">
    <div class="top-bar">
      <span class="chapter-label" id="chapterLabel"></span>
    </div>
    <div class="chapter-body">
      <div class="reading-card">
        <h2 id="chapterTitle"></h2>
        <div id="chapterContent"></div>
      </div>
    </div>
    <div class="bottom-controls">
      <button class="ctrl-btn" id="musicBtn" onclick="handleMusic()">♪ تشغيل موسيقى</button>
      <button class="ctrl-btn" onclick="goBack()">← رجوع</button>
    </div>
    <div class="music-status" id="musicStatus"></div>
  </div>

  <script>
    const chapters = [
      {
        title: 'الفصل الأول — مشروع التعذيب',
        preview: '📚 ليان وآدم... أسوأ ثنائي ممكن في أسوأ مشروع ممكن',
        content: `<strong>— جزء أول —</strong><br/><br/>
الساعة كانت اتناشر وربع الظهر لما دكتور وليد رفع ورقة من على منضدته وبدأ يقرأ.<br/><br/>
"المشروع النهائي هيكون بالأزواج. وأنا اللي هحدد الأزواج — مفيش اختيار."<br/><br/>
ليان حسن جلست مستقيمة في كرسيها، زي ما بتعمل دايماً. دفترها مفتوح، قلمها في إيدها، وفي دماغها قايمة كاملة بأسماء الطلاب اللي تتمنى تشتغل معاهم. سارة — صديقتها، الأولى على القايمة. نور — متفوقة ومنظمة. حتى محمد، اللي بيتأخر أحياناً، كان مقبول.<br/><br/>
"ليان حسن..."<br/><br/>
رفعت إيدها برفق. "آه يا دكتور."<br/><br/>
"مع آدم سامي."<br/><br/>
القلم وقع من إيدها.<br/><br/>
<strong>— جزء تاني —</strong><br/><br/>
آدم سامي — اللي كان قاعد في آخر الفصل وبيحط قدمه على الكرسي اللي قدامه — رفع نظره من الموبايل لأول مرة من ساعة ما بدأت المحاضرة.<br/><br/>
"أنا؟" قال بنبرة زهقان.<br/><br/>
"إنت." دكتور وليد ما بصلوش. "ومشروعكم عن تحليل سوق العمل المصري في قطاع التكنولوجيا. المدة: شهر. التسليم: أول ديسمبر."<br/><br/>
ليان التقطت قلمها من الأرض وبدأت تكتب. كتبت: "آدم سامي — مشكلة". بعدين شطبت الكلام. بعدين كتبته تاني.<br/><br/>
من آخر الفصل، صوت آدم وصلها: "يا دكتور، مش ممكن أغير الشريك؟"<br/><br/>
"لأ."<br/><br/>
"حتى لو..."<br/><br/>
"لأ."<br/><br/>
ليان ابتسمت بضيق. على الأقل ده — مش بس هي اللي زهقانة من الموضوع.<br/><br/>
<strong>— جزء تالت —</strong><br/><br/>
ليان حسن — عشرين سنة، طالبة إدارة أعمال سنة تالتة في الجامعة الأمريكية — كانت تعرف نفسها كويس. متفوقة. منظمة. بتعمل جداول للجداول. عندها فايل لكل مادة، وفايل للفايلات، وملاحظة في التليفون بكل حاجة محتاجة تعمله النهارده وبكره والأسبوع الجاي.<br/><br/>
أهلها — أبوها دكتور جراحة وأمها محاضرة في كلية الحقوق — كانوا دايماً بيقولوا إنها "عاقلة أكتر من عمرها". الجملة دي كانت مدح بالنسبة للناس وإجهاد بالنسبة لليان. لأن "عاقلة أكتر من عمرها" معناها: ما تغلطيش. ما تفشليش. ما تبقيش إنسانة عادية.<br/><br/>
وهي — بصدق — خايفة. خايفة طول الوقت. خايفة من الامتحانات، من التقييمات، من إن حد يعرف إنها مش متأكدة من نفسها بالقدر اللي بتبدو عليه.<br/><br/>
<strong>— جزء رابع —</strong><br/><br/>
آدم سامي كان نقيض ليان الكامل.<br/><br/>
مش بيجي المحاضرات بانتظام. لما بييجي بيتأخر. لما بييجي في الميعاد بيقعد في الآخر. لما بيشتغل بيعمل حاجة ممتازة — كل الدكاترة بيعرفوا ده — بس "لما بيشتغل" دي كانت النادرة.<br/><br/>
ليان ما كانتش تعرف عنه غير ده. وغير إنه ساخر. وإنه تعليقاته في الفصل بتضحك الكل حتى لما بتيجي في وقت غلط. وإنه بيبص للناس بطريقة زي ما هو بيحاول يشوف إيه اللي ورا الكلام.<br/><br/>
بعد المحاضرة، وقفت قدامه في الكوريدور.<br/><br/>
"آدم. لازم نتكلم في المشروع."<br/><br/>
رفع نظره من الموبايل. "دلوقتي؟"<br/><br/>
"لأ. بس قريب."<br/><br/>
"حددي ميعاد وإبعتيلي."<br/><br/>
"ما عنديش رقمك."<br/><br/>
"خدي." قالها وهو ماشي، من غير ما يوقف أو يبص فيها.<br/><br/>
<strong>— جزء خامس —</strong><br/><br/>
في الليل، ليان بعتتله رسالة:<br/><br/>
"الأربعاء الساعة أربعة في مكتبة الجامعة؟"<br/><br/>
الرد جه بعد ساعتين وتلت دقايق: "ماشي."<br/><br/>
بس.<br/><br/>
ليان بصت في الرسالة. "ماشي." من غير نقطة. من غير أي حاجة تانية. حتى مش "تمام" — "ماشي."<br/><br/>
ده هيكون شهر صعب.<br/><br/>
<strong>— جزء سادس —</strong><br/><br/>
الأربعاء، ليان وصلت المكتبة الساعة اتناشر وخمسة وخمسين دقيقة. يعني خمس دقايق قبل الميعاد — ده معناه في قاموسها إنها وصلت "بالظبط".<br/><br/>
آدم مجاش الساعة أربعة.<br/><br/>
ولا الساعة أربعة وعشرة.<br/><br/>
الساعة أربعة وتلتاشر، ظهر من باب المكتبة. بنطلون جينز، تيشرت أبيض، شنطة على كتفه الواحدة. شعره كان محتاج قصة. بصّ حواليه، لقاها، مشي ناحيتها بخطى مش مستعجلة.<br/><br/>
"اتأخرت." قالتها قبل ما يقعد.<br/><br/>
"بتلاحظي." قعد قدامها وفتح اللاب توب.<br/><br/>
"ده مش تعليق، ده ملاحظة. المشروع محتاج التزام."<br/><br/>
رفع نظره. عيونه بنية غامقة، فيها حاجة بتشوفك بجدية أكتر مما تتوقع. "خلصتي؟"<br/><br/>
"آه."<br/><br/>
"كويس. خليني أشوف المطلوب."<br/><br/>
<strong>— جزء سابع —</strong><br/><br/>
قضوا ساعة في تقسيم المشروع. آدم كان شغال — ليان لازم تعترف بده. بيقترح، بيحلل، بيشوف الفراغات في الخطة بسرعة. بس كل تلت دقايق كان بيعمل تعليق.<br/><br/>
"ليان، ده section مش محتاجينه."<br/><br/>
"محتاجينه، هو في المطلوبات."<br/><br/>
"المطلوبات بتقول 'يفضل'. مش 'لازم'."<br/><br/>
"'يفضل' يعني خليه."<br/><br/>
"'يفضل' يعني لو عندك وقت."<br/><br/>
"إحنا عندنا وقت."<br/><br/>
"إنتي عندك وقت. أنا عندي حاجات تانية."<br/><br/>
ليان بصتله. "المشروع ده نص من درجتي النهائية."<br/><br/>

آدم لسه بيشتغل بالليل. ليان لسه خايفة من الفشل. هو لسه ما بيبوحش بسهولة. هي لسه بتعمل جداول لكل حاجة.<br/><br/>
بس في فرق صغير — دلوقتي في حد بيعرف.<br/><br/>
آدم لما بيبقى تعبان بيبعتلها: "تعبان." من غير تفاصيل. وهي ما بتسألش. بس بتبعتله: "موجودة."<br/><br/>
وده كان كفاية.<br/><br/>
ليان لما بيجيها الخوف قبل الامتحانات، بيتصل بيها وبيقعد معاها في المذاكرة من غير ما يتكلم. وده برضو كان كفاية.<br/><br/>
<strong>— جزء تامن —</strong><br/><br/>
في يوم من الأيام — بعد أسابيع — قعدوا على الدرج بره الكلية والشمس كانت بتغرب.<br/><br/>
آدم قال: "إنتي بتخافي كتير."<br/><br/>
"عارف."<br/><br/>
"من إيه بالظبط؟"<br/><br/>
فكّرت. "من إني أبان أضعف مما يتوقعوا."<br/><br/>
"مين 'يتوقعوا'؟"<br/><br/>
"أهلي. الناس. أنا."<br/><br/>
"إنتي مش ضعيفة."<br/><br/>
"بس بحس إني..."<br/><br/>
"ليان." قالها بهدوء. "إنتي بتشيلي كتير وبتبقي شاطرة وبتفضلي. ده مش ضعف. ده شيء تاني."<br/><br/>
"إيه؟"<br/><br/>
"ده قوة بتتعب منها بس ما بتوقفش."<br/><br/>
ابتلعت ريقها. "إنت بتقول الكلام ده ليه دلوقتي؟"<br/><br/>
"لأني شايفه منذ أول يوم." قال ببساطة. "وحسيت إن في حد لازم يقوله."<br/><br/>
<strong>— جزء تاسع —</strong><br/><br/>
الشمس غابت والشارع اتضوّى. ليان حست بدفا مش بس من الكلام — من اللحظة كلها. من القعدة دي، من الهواء، من الصوت القريب منها.<br/><br/>
"آدم."<br/><br/>
"إيه."<br/><br/>
"أنا سعيدة إني عرفتك."<br/><br/>
صمت. بعدين: "أنا كمان." وصوته كان مختلف — ذلك الدفء النادر اللي بتسمعه لما بيكون حقيقياً.<br/><br/>
إيده تحركت — ببطء — ولمست إيدها. ما مسكهاش. بس لمسها.<br/><br/>
وهي ما سحبتش.<br/><br/>
<strong>— جزء عاشر —</strong><br/><br/>
بعدين بيوم، ليان كتبت في نوتتها الخاصة تاني:<br/><br/>
"آدم سامي — حكمت عليه غلط في البداية. بس الحكم الغلط ده جابلي فرصة أعرفه صح."<br/><br/>
"هو مش سهل. وأنا مش سهلة. وده مش مشكلة."<br/><br/>
"في أوقات الناس مش محتاجة سهولة. محتاجة حقيقية."<br/><br/>
"وهو حقيقي."<br/><br/>
أقفلت النوتة.<br/><br/>
وفي موبايلها، جت رسالة:<br/><br/>
"القهوة بكره؟"<br/><br/>
ابتسمت. كتبت: "بالأكيد."<br/><br/>
<strong>— الخاتمة —</strong><br/><br/>
الحكاية دي مش انتهت — هي بس بدأت بشكل صح. بدأت بعد ما الاتنين أوعوا إن بين الخلاف والاستفزاز والتعب والخوف — في حاجة تانية. حاجة أهدى وأعمق وأحق بالانتباه.<br/><br/>
ليان فضلت خايفة — بس بقت أقل خوفاً من إنها تكون نفسها.<br/><br/>
وآدم فضل صامداً — بس بقى أقل وحدة في صموده.<br/><br/>
وفي القهوايه في شبرا، على كراسي الخشب، وأم كلثوم في الخلفية — كانوا كل جمعة. منتظمين زي ما ليان بتحب. وعارفين إن اللي بينهم حقيقي زي ما آدم يحتاج.<br/><br/>
وده كان كفاية.<br/><br/>
<strong>— النهاية —</strong>`

    let currentChapterIndex = null;

    function renderChapters() {
      const container = document.getElementById('chaptersButtons');
      container.innerHTML = '';
      chapters.forEach((ch, idx) => {
        const btn = document.createElement('button');
        btn.className = 'fall-btn';
        btn.onclick = () => openChapter(idx);
        btn.innerHTML = `
          <div class="btn-top">
            <span class="btn-num">${idx + 1}</span>
            <div class="btn-text-wrap">
              <div>${ch.title}</div>
              <div class="btn-preview">${ch.preview}</div>
            </div>
          </div>
        `;
        container.appendChild(btn);
      });
    }

    function openChapter(index) {
      currentChapterIndex = index;
      const ch = chapters[index];
      document.getElementById('chapterLabel').textContent = ch.title;
      document.getElementById('chapterTitle').textContent = ch.title;
      document.getElementById('chapterContent').innerHTML = ch.content;
      document.getElementById('view-main').classList.remove('active');
      document.getElementById('view-chapter').classList.add('active');
      window.scrollTo(0, 0);
    }

    function goBack() {
      document.getElementById('view-chapter').classList.remove('active');
      document.getElementById('view-main').classList.add('active');
      window.scrollTo(0, 0);
    }

    function toggleAvatarMsg() {
      const msg = document.getElementById('avatarMsg');
      msg.classList.toggle('show');
      setTimeout(() => msg.classList.remove('show'), 2500);
    }

    let musicPlaying = false;
    let audio = null;
    let currentTrack = 0;

];


    function handleMusic() {
      const btn = document.getElementById('musicBtn');
      const status = document.getElementById('musicStatus');
      if (!musicPlaying) {
        audio = new Audio(tracks[currentTrack]);
        audio.loop = true;
        audio.volume = 0.5;
        audio.play();
        musicPlaying = true;
        btn.classList.add('music-active');
        btn.textContent = '♪ إيقاف الموسيقى';
        status.textContent = '🎵 موسيقى ' + (currentTrack + 1);
      } else {
        audio.pause();
        currentTrack++;
        if (currentTrack < tracks.length) {
          audio = new Audio(tracks[currentTrack]);
          audio.loop = true;
          audio.volume = 0.5;
          audio.play();
          btn.textContent = '♪ إيقاف الموسيقى';
          status.textContent = '🎵 موسيقى ' + (currentTrack + 1);
        } else {
          musicPlaying = false;
          currentTrack = 0;
          audio = null;
          btn.classList.remove('music-active');
          btn.textContent = '♪ تشغيل موسيقى';
          status.textContent = '🎵 الموسيقى متوقفة';
        }
      }
      status.classList.add('show');
      setTimeout(() => status.classList.remove('show'), 2000);
    }

    renderChapters();
