<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قارئ الروايات</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon-pink: #ff2d9b;
      --neon-pink-glow: #ff2d9b88;
      --neon-pink-light: #ff6ec7;
    }

    html, body { min-height: 100vh; font-family: 'Cairo', sans-serif; }

    body {
      background: url('https://files.catbox.moe/jkcmc4.jpg') no-repeat center center fixed;
      background-size: cover;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, rgba(10,5,30,0.45) 0%, rgba(5,0,20,0.55) 100%);
      pointer-events: none;
      z-index: 0;
    }

    .view { display: none; }
    .view.active { display: block; }

    #view-main {
      min-height: 100vh;
      position: relative;
      z-index: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }
    #view-main.active { display: flex; }

    .profile-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
    }

    .avatar-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      cursor: pointer;
      margin-bottom: 14px;
    }

    .avatar-wrap img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 2;
      transition: transform 0.4s ease;
    }
    .avatar-wrap:hover img { transform: scale(1.06); }

    .avatar-ring {
      position: absolute; inset: -5px;
      border-radius: 50%;
      background: conic-gradient(
        var(--neon-pink) 0deg, transparent 80deg,
        var(--neon-pink-light) 160deg, transparent 240deg,
        var(--neon-pink) 360deg
      );
      animation: spin 3s linear infinite;
      z-index: 1;
    }
    .avatar-ring::after {
      content: '';
      position: absolute; inset: 4px;
      border-radius: 50%;
      background: #0a050a;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-glow {
      position: absolute; inset: -15px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--neon-pink-glow) 0%, transparent 70%);
      animation: pulse-glow 2s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes pulse-glow {
      from { opacity: 0.5; transform: scale(0.95); }
      to   { opacity: 1;   transform: scale(1.05); }
    }

    .avatar-msg {
      position: absolute;
      bottom: -52px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(10,5,25,0.92);
      border: 1px solid var(--neon-pink);
      color: var(--neon-pink-light);
      font-size: 13px;
      white-space: nowrap;
      padding: 7px 16px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      box-shadow: 0 0 14px var(--neon-pink-glow);
      z-index: 10;
    }
    .avatar-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .main-card {
      background: rgba(10, 10, 15, 0.70);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border: 1px solid rgba(255, 45, 155, 0.22);
      border-radius: 20px;
      width: 100%; max-width: 620px;
      padding: 36px 28px 30px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .card-title {
      text-align: center;
      color: #f0e6ff;
      font-size: clamp(18px, 4vw, 24px);
      font-weight: 700;
      margin-bottom: 28px;
      text-shadow: 0 0 20px var(--neon-pink-glow);
    }

    .buttons-wrapper {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .fall-btn {
      position: relative;
      padding: 0; border: none; background: none;
      cursor: pointer; outline: none;
      font-family: 'Cairo', sans-serif;
    }

    .fall-btn .btn-top {
      display: block;
      position: relative;
      padding: 10px 20px;
      font-size: clamp(13px, 2.5vw, 15px);
      font-weight: 700;
      color: var(--neon-pink-light);
      background: #1a0a1e;
      border-radius: 10px;
      border: 1.5px solid var(--neon-pink);
      box-shadow: 0 0 8px var(--neon-pink-glow), inset 0 1px 0 rgba(255,255,255,0.08);
      transform: translateY(-4px);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      white-space: nowrap;
    }
    .fall-btn::after {
      content: '';
      display: block;
      position: absolute;
      bottom: 0; left: 4px; right: 4px; height: 8px;
      background: #7a0040;
      border-radius: 0 0 10px 10px;
      z-index: -1;
    }
    .fall-btn:hover .btn-top {
      transform: translateY(-2px);
      box-shadow: 0 0 16px var(--neon-pink), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .fall-btn:active .btn-top {
      transform: translateY(0);
      box-shadow: 0 0 6px var(--neon-pink-glow);
    }

    .chapter-msg {
      overflow: hidden; max-height: 0; opacity: 0;
      transition: max-height 0.5s ease, opacity 0.4s ease, padding 0.3s ease;
      text-align: center;
    }
    .chapter-msg.show { max-height: 80px; opacity: 1; padding: 12px 0 4px; }
    .chapter-msg span {
      display: inline-block;
      background: rgba(255,45,155,0.10);
      border: 1px solid rgba(255,45,155,0.3);
      border-radius: 30px;
      padding: 6px 20px;
      color: var(--neon-pink-light);
      font-size: 13px;
    }

    #view-chapter {
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .top-bar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8, 3, 20, 0.80);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,45,155,0.20);
      padding: 13px 24px;
      text-align: center;
    }

    .chapter-label {
      color: #e8d8f8;
      font-size: clamp(14px, 3vw, 18px);
      font-weight: 700;
      text-shadow: 0 0 16px var(--neon-pink-glow);
    }

    .chapter-body {
      display: flex;
      justify-content: center;
      padding: 40px 16px 120px;
    }

    .reading-card {
      width: 100%; max-width: 720px;
      background: rgba(255, 252, 255, 0.18);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 16px;
      padding: clamp(24px, 5vw, 48px) clamp(20px, 5vw, 52px);
      box-shadow: 0 8px 50px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.06) inset;
    }

    .reading-card h2 {
      font-family: 'Cairo', sans-serif;
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 900;
      color: #fff;
      text-align: center;
      margin-bottom: 28px;
      text-shadow: 0 0 24px var(--neon-pink-glow);
    }

    .reading-card p {
      font-family: 'Amiri', serif;
      font-size: clamp(16px, 2.5vw, 20px);
      line-height: 2.1;
      color: rgba(255,255,255,0.92);
      text-align: justify;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }

    .bottom-controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(5, 2, 15, 0.90);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,255,255,0.10);
      padding: 14px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      background: #111; color: #ddd;
      border: 1.5px solid #333; border-radius: 8px;
      padding: 9px 22px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .ctrl-btn:hover { background: #1e1e1e; border-color: #555; color: #fff; }
    .ctrl-btn:active { background: #0a0a0a; transform: scale(0.97); }
    .ctrl-btn.music-active { border-color: var(--neon-pink); color: var(--neon-pink-light); }

    .music-status {
      position: fixed;
      bottom: 72px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(10,5,25,0.93);
      border: 1px solid var(--neon-pink);
      color: #ff6ec7;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      padding: 7px 20px;
      border-radius: 30px;
      white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      box-shadow: 0 0 16px var(--neon-pink-glow);
      z-index: 300;
    }
    .music-status.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .reading-card { border-radius: 12px; }
      .bottom-controls { gap: 10px; padding: 10px 12px; }
      .ctrl-btn { padding: 8px 16px; font-size: 13px; }
      .avatar-msg { font-size: 11px; white-space: normal; text-align: center; width: 200px; bottom: -66px; }
    }
  </style>
</head>
<body>

  <div id="view-main" class="view active">

    <div class="profile-section">
      <div class="avatar-wrap" onclick="toggleAvatarMsg()">
        <div class="avatar-glow"></div>
        <div class="avatar-ring"></div>
        <img
          src="https://files.catbox.moe/inbpcb.jpg"
          alt="صورة الكاتب"
          onerror="this.src='https://ui-avatars.com/api/?name=رواية&background=1a0a1e&color=ff6ec7&size=200'"
        />
        <div class="avatar-msg" id="avatarMsg">
          ✨ أهلاً بك — اختر فصلك وابدأ الرحلة!
        </div>
      </div>
    </div>

    <div class="main-card">
      <div class="card-title">🌺اختاري الفصل الى هتقرأيه ي مزه 🌺<br>تشتميش في سرك😒<br>روايه رومنسيه🫣</div>
      <div class="buttons-wrapper">
        <button class="fall-btn" onclick="goToChapter(0, this)"><span class="btn-top">✨ الفصل الأول</span></button>
        <button class="fall-btn" onclick="goToChapter(1, this)"><span class="btn-top">✨ الفصل الثاني</span></button>
        <button class="fall-btn" onclick="goToChapter(2, this)"><span class="btn-top">✨ الفصل الثالث</span></button>
        <button class="fall-btn" onclick="goToChapter(3, this)"><span class="btn-top">✨ الفصل الرابع</span></button>
        <button class="fall-btn" onclick="goToChapter(4, this)"><span class="btn-top">✨الفصل الخامس</span></button>
      </div>
      <div class="chapter-msg" id="chapterMsg">
        <span id="chapterMsgText"></span>
      </div>
    </div>

  </div>

  <div id="view-chapter" class="view">

    <div class="top-bar">
      <span class="chapter-label" id="chapterLabel"></span>
    </div>

    <div class="chapter-body">
      <div class="reading-card">
        <h2 id="chapterTitle"></h2>
        <p id="chapterContent"></p>
      </div>
    </div>

    <div class="bottom-controls">
      <button class="ctrl-btn" id="musicBtn" onclick="handleMusic()">♪ تشغيل أغاني</button>
      <button class="ctrl-btn" onclick="goBack()">← رجوع</button>
    </div>
    <div class="music-status" id="musicStatus"></div>

  </div>

  <script>
    const chapters = [
      {
        title: 'الفصل الأول — اللقاء',
        preview: '💫 لما القدر بيقرر يجمع ناس مش متوقعين بعض...',
        content: `
<strong>— الجزء الأول —</strong>
<br/><br/>
الساعة كانت تقريباً السابعة والنص بالليل، والقاعة مليانة ضحك وكلام وعيال بتجري من هنا لهنا. فرح خطوبة مها — بنت خالة نور — كان من النوع اللي بيحسسك إن الدنيا لسه فيها ناس بتحب بعض وبتتجوز على حبها. الأكل كتير، والموسيقى حلوة، والستات كلهن لابسين أحسن هدومهن وعينيهن على البنت العروسة وهي بتشرب عصير برتقان وخدودها حمرا من الخجل.

نور كانت واقفة جنب التورتة الكبيرة، بتتفرج على المشهد من بعيد. هي مش بتحب الزحمة الزيادة، بس مش كانت تقدر ترفض، مها ابنة خالتها وبتحبها من صغرها. لابسة فستان أخضر غامق بسيط، شعرها عاملاه ضفيرة جانبية، ومش متبهدلة وفي نفس الوقت مش متزيّنة زيادة. واقفة وفي إيدها كوباية عصير ما بتتحرك من مكانها.

— "نور.. نوووور!"

التفتت تلاقي ابنة خالتها التانية، سلمى، بتجري ناحيتها وهي شايلة طبق حلوى في إيدها.

— "ايه يا سلمى؟ خففي شوية، هتوقعي التورتة!"

سلمى وقفت قدامها وهي بتلهث: "روحي اعملي جميل وقفي جنب باب الدخول تاني، خالتك قالت حد كتير مهم هييجي وعايزة حد من البنات يستقبله صح."

— "وأنا ليه أنا بالذات؟"

— "عشان إنتِ الأكبر والأحسن كلاماً. يلا متزعليش، ربع ساعة وخلاص."

نور اتنهدت بس مشيت. وقفت جنب الباب الكبير، تتفرج على الناس الداخلين وتحيي من تعرفهم. الجو كان دافي رغم إن الأوضة كانت فيها تكييف، زحمة الناس بتخلي الهواء دافي وثقيل شوية.

وفي لحظة، انفتح الباب.

دخل راجل، لأ — شاب. مش صغير أوي بس مش كبير كمان. لابس قميص كحلي وبنطلون رمادي، شعره متربي بسيط ومش متصنع. مشيته كانت واثقة من غير ما يكون بيتقل. بيدور بعينيه على الحتة وحواليه بهدوء، زي حد مش بيفرق معاه يكون في فرح ولا في أي حتة تانية. وجهه فيه ملامح لطيفة بس فيها شيء حادّ، نوع من التركيز اللي بيحسسك إن الشخص ده بيلاحظ كل حاجة من حواليه.

نور حيّته بشكل تلقائي: "أهلاً وسهلاً!"

نظر إليها وقال بهدوء: "أهلاً، شكراً. أنا كريم، ابن عم مصطفى العريس."

— "آه أهلاً، تشرفنا. أنا نور، ابنة خالة مها."

صافحها بإيد ثابتة وابتسامة مؤدبة. لا زيادة ولا نقصان. نظر حواليه: "فرحة حلوة."

— "إيه رأيك. اتفضل، الأكل ناحية اليمين والجلوس اللي إنت عاوزه."

— "شكراً." ومشى.

نور تفرجت عليه وهو بيمشي بين الناس بهدوء. مش كان في الشكل ده أي حاجة غير عادية، بس في اللي حصل — لحظة تقابلهم الأولى — حاجة حصلت. حاجة صغيرة، زي شعلة كبريت بتتولع في مكان مظلم. مش شعلة كبيرة، بس بتنوّر الحتة اللي حواليها بالظبط.

نور ابتسمت من تلقاء نفسها وهي بتتفرج على المدخل تاني. وزق نفسها: "مش وقته يا نور، وقفي في شغلك."

<br/><br/>
<strong>— الجزء الثاني —</strong>
<br/><br/>

طاولة العشا كانت طويلة وعليها كل الأكل اللي تتخيله. كريم اتجه ناحية الطاولة وإيده في جيبه، بيدور على ابن عمه مصطفى عشان يسلّم عليه. لقاه واقف مع شوية أصحاب وضحك وسلّم وجلس معاه شوية.

بعد ما خلصوا كلامهم، لف كريم في القاعة وأخد له كرسي في الجانب اللي فيه شوية هدوء. مش كان بيحب يكون في وسط الزحمة وقت الأكل.

خد طبق وبدأ ياكل بسكوت.

وفجأة — جنبه حد وقف بسرعة تقريباً وجه منه مش واقفة عنده بالذات.

التفت. كانت نور. هي كانت بتحاول توصل لطبق في الطاولة من ورا كتفه، ومش شايفاه كويس عشان كانت بتكلم حد على تليفونها وبتحاول تمد إيدها في نفس الوقت.

— "لو سمحتِ—"

لف كريم وناولها الطبق قبل ما تتعب. وقفت هي وبصت فيه.

— "أه.. آسفة، مكنتش شايفاك، شكراً!"

— "معلش." قالها ببساطة وابتسم.

قالت في التليفون: "ثانية يا ماما." وبعدين قالتله: "إنت بتاكل لوحدك هنا؟"

— "آه، بكره الزحمة الزيادة وقت الأكل."

— "بالظبط زيي!" قالتها ومشى عليها الكلام وهي مش قاصدة.

هو ابتسم: "يعني إنتِ كمان مش بتحبي الزحمة؟"

— "أنا جيت عشان مها، بس لو كنت جيت لنفسي كنت قاعدة في البيت بشرب شاي."

ضحك. ضحكة صغيرة بس حقيقية. "أنا جيت عشان مصطفى. لو كان بإيدي كنت بعتله واتس وهنيته وخلاص."

— "والله إنت فاهم."

التليفون في إيدها اتنبّه تاني. نظرت فيه: "آسف، ماما." قالتله بعين سريعة: "هشوفك."

— "يسعدك."

ومشت.

كريم اتفرج على مكانها اللي فضت منه، وبعدين اتفرج في طبقه. في إيده شوكة بيحركها من غير ما يأكل. حاجة في الكلام اللي اتقال كان فيها شيء مريح. مش دراما، مش كلام فاضي — بس حوار بسيط بين اتنين بيفهموا بعض من أول لقاء.

كمّل أكله وهو مبسوط بشكل مش كان متوقعه.

<br/><br/>
<strong>— الجزء الثالث —</strong>
<br/><br/>

قرب آخر الليل، الحفلة بدأت تخف شوية. العيال اللي كانوا بيجروا خدوهم أهاليهم، والكبار في السن بدأوا يودّعوا. الجو اتخف وبقى أحسن.

نور كانت واقفة في البلكونة الصغيرة اللي على جنب القاعة. كانت بتاخد نفس من الزحمة. الجو برة كان لطيف، في نسمة خفيفة وأضواء الشارع تحت.

سمعت صوت خطوات خلفيها. التفتت. كريم.

— "آه، إنت كمان هربت."

— "نعم." وقف جنبيها وبص للشارع. "بلكونة حلوة."

— "أنا بشيل منها من أول الليل. كنت بتدور عليها؟"

— "لا. صادفتها بالغلط."

فضلوا صامتين لثانية. مش صمت محرج — صمت مريح. النوع اللي بيكون بين ناس مش لازم يكملوا الكلام عشان يحسوا بالأمان.

قالت من غير مقدمة: "إنت بتشتغل إيه؟"

— "مهندس. في شركة مقاولات."

— "ومبسوط؟"

نظر إليها: "سؤال غريب."

— "ليه؟"

— "عادةً الناس بتسأل 'بتشتغل فين' مش 'مبسوط'."

— "وأنا مش عادي." قالتها ببراءة ومن غير قصد تبقى ظريفة، بس طلعت ظريفة.

ابتسم: "مبسوط. الشغل كويس، التعامل أحياناً صعب، بس الشغل نفسه بحبه."

— "كويس. إللي بيكره شغله ومستمر فيه بيبقى زهقان طول الوقت."

— "وإنتِ؟"

— "محاسبة."

— "ومبسوطة؟"

      statusTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    function getRandom(exclude) {
      let i;
      do { i = Math.floor(Math.random() * songs.length); }
      while (songs.length > 1 && songs[i] === exclude);
      return songs[i];
    }

    function stopMusic() {
      if (audio) { audio.pause(); audio.src = ''; }
      isPlaying = false;
      const btn = document.getElementById('musicBtn');
      if (btn) { btn.textContent = '♪ تشغيل أغاني'; btn.classList.remove('music-active'); }
    }

    function handleMusic() {
      const btn = document.getElementById('musicBtn');
      if (!isPlaying) {
        if (!audio) audio = new Audio();
        audio.src = getRandom(null);
        audio.play().catch(() => showMusicStatus('⚠️ تعذّر التشغيل'));
        audio.onended = () => { audio.src = getRandom(audio.src); audio.play(); };
        isPlaying = true;
        btn.textContent = '⟳ تغيير الأغنية';
        btn.classList.add('music-active');
        showMusicStatus('♪ جاري التشغيل...');
      } else {
        const prev = audio.src;
        audio.src = getRandom(prev);
        audio.play().catch(() => showMusicStatus('⚠️ تعذّر التشغيل'));
        showMusicStatus('♪ تم تغيير الأغنية');
      }
    }
  </script>
</body>
</html>
