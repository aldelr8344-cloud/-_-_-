<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قارئ الروايات — الورقة الأخيرة</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Lateef:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon-pink: #ff2d9b;
      --neon-pink-glow: #ff2d9b88;
      --neon-pink-light: #ff6ec7;
    }

    html, body { min-height: 100vh; font-family: 'Tajawal', sans-serif; }

    body {
      background: #0a050a;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(120, 0, 80, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(60, 0, 100, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 80%, rgba(80, 0, 60, 0.12) 0%, transparent 50%);
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('https://files.catbox.moe/jiabr3.jpg');
     pointer-events: none;
      z-index: 0;
    }

    .view { display: none; }
    .view.active { display: block; }

    /* ═══════════════════════════════════
       VIEW 1 — الصفحة الرئيسية
    ═══════════════════════════════════ */
    #view-main {
      min-height: 100vh;
      position: relative;
      z-index: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }
    #view-main.active { display: flex; }

    .profile-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
    }

    .avatar-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      cursor: pointer;
      margin-bottom: 14px;
    }

    .avatar-wrap img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 2;
      transition: transform 0.4s ease;
    }
    .avatar-wrap:hover img { transform: scale(1.06); }

    .avatar-ring {
      position: absolute; inset: -5px;
      border-radius: 50%;
      background: conic-gradient(
        var(--neon-pink) 0deg, transparent 80deg,
        var(--neon-pink-light) 160deg, transparent 240deg,
        var(--neon-pink) 360deg
      );
      animation: spin 3s linear infinite;
      z-index: 1;
    }
    .avatar-ring::after {
      content: '';
      position: absolute; inset: 4px;
      border-radius: 50%;
      background: #0a050a;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .avatar-glow {
      position: absolute; inset: -15px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--neon-pink-glow) 0%, transparent 70%);
      animation: pulse-glow 2s ease-in-out infinite alternate;
      z-index: 0;
    }
    @keyframes pulse-glow {
      from { opacity: 0.5; transform: scale(0.95); }
      to   { opacity: 1;   transform: scale(1.05); }
    }

    .avatar-msg {
      position: absolute;
      bottom: -52px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(10,5,25,0.92);
      border: 1px solid var(--neon-pink);
      color: var(--neon-pink-light);
      font-size: 13px;
      white-space: nowrap;
      padding: 7px 16px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease;
      box-shadow: 0 0 14px var(--neon-pink-glow);
      z-index: 10;
    }
    .avatar-msg.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .novel-title-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .novel-main-title {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(26px, 6vw, 42px);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 30px var(--neon-pink-glow), 0 0 60px rgba(255,45,155,0.3);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .novel-subtitle {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(13px, 2.5vw, 16px);
      color: rgba(255,110,199,0.7);
      font-weight: 400;
      letter-spacing: 3px;
    }

    .main-card {
      background: rgba(10, 10, 15, 0.75);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border: 1px solid rgba(255, 45, 155, 0.22);
      border-radius: 20px;
      width: 100%; max-width: 640px;
      padding: 36px 28px 30px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .card-title {
      text-align: center;
      color: #f0e6ff;
      font-size: clamp(16px, 3.5vw, 20px);
      font-weight: 700;
      margin-bottom: 28px;
      text-shadow: 0 0 20px var(--neon-pink-glow);
    }

    .buttons-wrapper {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 24px;
    }

    .fall-btn {
      position: relative;
      padding: 0; border: none; background: none;
      cursor: pointer; outline: none;
      font-family: 'Tajawal', sans-serif;
      width: 100%;
    }

    .fall-btn .btn-top {
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      padding: 14px 22px;
      font-size: clamp(13px, 2.5vw, 16px);
      font-weight: 700;
      color: var(--neon-pink-light);
      background: linear-gradient(135deg, #1a0a1e 0%, #0f0515 100%);
      border-radius: 12px;
      border: 1.5px solid rgba(255,45,155,0.4);
      box-shadow: 0 0 8px rgba(255,45,155,0.15), inset 0 1px 0 rgba(255,255,255,0.06);
      transform: translateY(-4px);
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.2s;
      text-align: right;
    }
    .fall-btn .btn-num {
      font-size: 11px;
      color: rgba(255,110,199,0.5);
      font-weight: 400;
      margin-right: auto;
    }
    .fall-btn .btn-preview {
      display: block;
      font-size: 11px;
      color: rgba(200,160,220,0.6);
      font-weight: 400;
      margin-top: 3px;
    }
    .fall-btn .btn-text-wrap { text-align: right; flex: 1; }
    .fall-btn::after {
      content: '';
      display: block;
      position: absolute;
      bottom: 0; left: 6px; right: 6px; height: 8px;
      background: #5a0030;
      border-radius: 0 0 12px 12px;
      z-index: -1;
    }
    .fall-btn:hover .btn-top {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(255,45,155,0.35), inset 0 1px 0 rgba(255,255,255,0.1);
      border-color: rgba(255,45,155,0.7);
    }
    .fall-btn:active .btn-top {
      transform: translateY(0);
      box-shadow: 0 0 6px var(--neon-pink-glow);
    }

    .chapter-msg {
      overflow: hidden; max-height: 0; opacity: 0;
      transition: max-height 0.5s ease, opacity 0.4s ease, padding 0.3s ease;
      text-align: center;
    }
    .chapter-msg.show { max-height: 80px; opacity: 1; padding: 12px 0 4px; }
    .chapter-msg span {
      display: inline-block;
      background: rgba(255,45,155,0.10);
      border: 1px solid rgba(255,45,155,0.3);
      border-radius: 30px;
      padding: 6px 20px;
      color: var(--neon-pink-light);
      font-size: 13px;
    }

    /* ═══════════════════════════════════
       VIEW 2 — صفحة الفصل
    ═══════════════════════════════════ */
    #view-chapter {
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .top-bar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8, 3, 20, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,45,155,0.20);
      padding: 13px 24px;
      text-align: center;
    }

    .chapter-label {
      color: #e8d8f8;
      font-size: clamp(14px, 3vw, 18px);
      font-weight: 700;
      text-shadow: 0 0 16px var(--neon-pink-glow);
    }

    .chapter-body {
      display: flex;
      justify-content: center;
      padding: 40px 16px 120px;
    }

    .reading-card {
      width: 100%; max-width: 760px;
      background: rgba(8, 5, 18, 0.82);
      backdrop-filter: blur(20px) saturate(1.6);
      -webkit-backdrop-filter: blur(20px) saturate(1.6);
      border: 1px solid rgba(255,45,155,0.15);
      border-radius: 16px;
      padding: clamp(28px, 5vw, 56px) clamp(22px, 5vw, 58px);
      box-shadow: 0 8px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    .reading-card h2 {
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(20px, 4vw, 30px);
      font-weight: 900;
      color: #fff;
      text-align: center;
      margin-bottom: 36px;
      text-shadow: 0 0 24px var(--neon-pink-glow);
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,45,155,0.2);
    }

    #chapterContent {
      font-family: 'Lateef', serif;
      font-size: clamp(19px, 2.8vw, 24px);
      line-height: 2.2;
      color: rgba(235,225,245,0.93);
      text-align: justify;
    }

    #chapterContent .part-title {
      display: block;
      font-family: 'Tajawal', sans-serif;
      font-size: clamp(16px, 2.5vw, 20px);
      font-weight: 800;
      color: var(--neon-pink-light);
      text-align: center;
      margin: 36px 0 20px;
      text-shadow: 0 0 16px var(--neon-pink-glow);
      letter-spacing: 1px;
    }

    #chapterContent .dialogue {
      display: block;
      color: rgba(255,200,230,0.95);
      font-style: italic;
      padding: 4px 0;
    }

    .bottom-controls {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(5, 2, 15, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid rgba(255,45,155,0.15);
      padding: 14px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .ctrl-btn {
      background: rgba(20,10,30,0.9); color: #ccc;
      border: 1.5px solid rgba(255,255,255,0.15); border-radius: 10px;
      padding: 10px 24px;
      font-family: 'Tajawal', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .ctrl-btn:hover { background: rgba(40,20,50,0.9); border-color: rgba(255,255,255,0.3); color: #fff; }
    .ctrl-btn:active { transform: scale(0.97); }
    .ctrl-btn.music-active { border-color: var(--neon-pink); color: var(--neon-pink-light); background: rgba(255,45,155,0.1); }

    .music-status {
      position: fixed;
      bottom: 72px; left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(10,5,25,0.93);
      border: 1px solid var(--neon-pink);
      color: #ff6ec7;
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      padding: 7px 20px;
      border-radius: 30px;
      white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      box-shadow: 0 0 16px var(--neon-pink-glow);
      z-index: 300;
    }
    .music-status.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .reading-card { border-radius: 12px; }
      .bottom-controls { gap: 10px; padding: 10px 12px; }
      .ctrl-btn { padding: 8px 16px; font-size: 13px; }
    }
  </style>
</head>
<body>

  <div id="view-main" class="view active">

    <div class="profile-section">
      <div class="avatar-wrap" onclick="toggleAvatarMsg()">
        <div class="avatar-glow"></div>
        <div class="avatar-ring"></div>
        <img
          src="https://files.catbox.moe/inbpcb.jpg"
          alt="صورة الرواية"
          onerror="https://files.catbox.moe/fpx2sr.jpg"
        />
        <div class="avatar-msg" id="avatarMsg">انتي بتدوسي وخلاص بس.ي قزحه 😂🌹</div>
      </div>
    </div>

    <div class="novel-title-area" style="margin-top:60px;">
     <div class="novel-main-title">البوابة الزرقا👽👻</div>
    </div>

    <div class="main-card">
      <div class="card-title">✨.اختاري الفصل الي هتقرأيه ي قزحه ✨  <br>روايه رعب 👽👻</div>
      <div class="buttons-wrapper" id="chaptersButtons"></div>
      <div class="chapter-msg" id="chapterMsg">
        <span id="chapterMsgText"></span>
      </div>
    </div>

  </div>

  <div id="view-chapter" class="view">
    <div class="top-bar">
      <span class="chapter-label" id="chapterLabel"></span>
    </div>
    <div class="chapter-body">
      <div class="reading-card">
        <h2 id="chapterTitle"></h2>
        <div id="chapterContent"></div>
      </div>
    </div>
    <div class="bottom-controls">
      <button class="ctrl-btn" id="musicBtn" onclick="handleMusic()">♪ تشغيل موسيقى</button>
      <button class="ctrl-btn" onclick="goBack()">← رجوع</button>
    </div>
    <div class="music-status" id="musicStatus"></div>
  </div>

  <script>
    const chapters = [
  {
    title: 'الفصل الأول — الشقة اللي في الدور التالت',
    preview: '📖 أدهم بيلاقي جواب غريب في أوضة جده المتوفي...',
    content: `<span class="part-title">— جزء أول —</span>
الشمس كانت بدأت تغيب لما أدهم فتح باب الشقة القديمة. الشقة دي في حي شبرا، في عمارة عندها من الحكايات أكتر من طوابقها. العمارة من زمان، الدرج فيها بيئن لما حد يطلع عليه، والجيران بيعرفوا بعض من ساعة ما كانوا صغيرين لحد ما بقوا كبار وولادهم كبروا زيهم بالظبط.
<br/><br/>
الجد، الحاج سليمان، مات من تلت أسابيع. تلت أسابيع والأسرة لسه في حالة مش قادرة تبقى عادية. مش بس الحزن — الحاج سليمان كان إنسان كبير وحضوره كان ملاصق للبيت زي ما الدهان ملاصق للحيطان. لكن في أسرة زي دي، الحزن بييجي مع حاجة تانية: مسألة الشقة.
<br/><br/>
<span class="dialogue">— أدهم يا واد، ما تروحش هناك لوحدك. انتظر بكره ونروح مع بعض.</span>
<br/>
الأم، أم أدهم، قالتها وهي بتعمل شاي في المطبخ. بس أدهم ما سمعش، أو سمع وادّعى إنه ما سمعش — الاتنين محتملين.
<br/><br/>
أدهم عنده ستة وعشرين سنة. بيشتغل في شركة تصميم جرافيك صغيرة في وسط البلد، بيصحى كل يوم الساعة سبعة ونص، بياكل فول وطعمية من العربية اللي تحت البيت، وبيرجع بالليل تعبان وعنده مزاج يسمع موسيقى ويقعد على النت ومش أكتر. حياته زي خط مستقيم — مش كتير ومش قليل.
<br/><br/>
بس جده كان بيقطع الخط ده. كان بيفرق.
<br/><br/>
<span class="part-title">— جزء تاني —</span>
الشقة زي ما سابها الحاج سليمان. الأثاث لسه في مكانه — الكنبة البيجي اللي اتغيرت أغطيتها مرتين على الأقل من ساعة ما أدهم عارفها، التليفزيون القديم اللي ما بيشتغلش من زمان، الرف اللي فيه كتب ومجلات قديمة وصور في براويز.
<br/><br/>
أدهم وقف قدام الرف ده. الصور دي كان بيشوفها من وهو طفل — الجد وهو شاب، صورة سوداء وبيضا فيها بزة وشنب وشعر متمشط بعناية. جنبيه ست وقفانة تبص بجدية زي ما الصور القديمة كلها اللي فيها الناس مش بتبتسم.
<br/><br/>
<span class="dialogue">— دي مين يا جدو؟</span>
<br/>
سأله أدهم مرة وهو صغير.
<br/><br/>
<span class="dialogue">— دي ست من زمان.</span>
<br/>
والجد قفل الموضوع. من غير ما يكمّل. من غير اسم ولا قرابة ولا أي تفصيلة. وأدهم الصغير ما فضّلش يسأل لأنه حس إن في حاجة في صوت جده بتقول "ما تكملش".
<br/><br/>
دلوقتي، أدهم الكبير واقف قدام نفس الصورة. والسؤال اللي ما اتجاوبش من ساعتها لسه عايش في حتة ما في جوّاه.
<br/><br/>
فتح دراج التسريحة في أوضة الجد. دراجات كتير. ملابس مطوية بعناية، جوارب مترتبة، منديل أبيض رُبي تحته خيط مسبحة. في الدراج التاني من تحت، تحت كومة من الأوراق القديمة — فواتير وجرايد ووصفات دكتور — لاقى ضم أوراق متلفوف حواليها رباط مطاط بنّي.
<br/><br/>
الرباط كان جاف ومتشقق من كتر القِدَم. لما أدهم حركه انكسر وقع على الأرض.
<br/><br/>
<span class="part-title">— جزء تالت —</span>
الأوراق كانت جواب. مكتوب بخط اليد. خط قديم، متعب شوية، زي حد اتجهد في كتابة كل حرف. التاريخ في أول السطر كان من سنة ألفين وواحد.
<br/><br/>
أدهم قعد على طرف السرير وبدأ يقرأ.
<br/><br/>
<span class="dialogue">"سليمان العزيز، أكتب إليك وأنا أعلم أنك ربما لن تقرأ هذا. لكنني لا أستطيع أن أحمل هذا وحدي بعد الآن. مضى على آخر لقاء بيننا خمسة وعشرون عاماً، وأنا لم أتوقف يوماً عن التفكير فيما كان يمكن أن يحدث لو..."</span>
<br/><br/>
الجواب كان بالفصحى. مش شائع ده من ناس في الستينات والسبعينات — ناس جيل جدوده كانوا بيكتبوا بالفصحى حتى في الرسايل الشخصية. أدهم كمّل يقرأ ببطء.
<br/><br/>
الرسالة كانت بتتكلم عن حاجة حصلت من زمان بعيد. عن اختيار أثّر في حياة ناس كتير. عن موضوع ما اتحلش وموضوع انزعج من حاجة اتعملت.
<br/><br/>
وفي الآخر، الإمضا. اسم مش عارفه أدهم. اسم ما سمعه في عمره.
<br/><br/>
<span class="dialogue">— "نزهة حسن الشرقاوي"</span>
<br/><br/>
<span class="part-title">— جزء رابع —</span>
أدهم قضى ساعة قاعد في الأوضة. الجواب في إيده. ما حركش. الصوت الوحيد كان صوت العربيات من الشارع، وبعيد في الشقة المقابلة في حد شغال تليفزيون.
<br/><br/>
نزهة مين؟ وما اللي حصل بين جده وبينها؟ والجواب ده وصل ولا ما وصلش؟ ولو وصل، ليه الجد ما ردش؟ ولو ما وصلش، ليه هو لاقيه في الدراج؟
<br/><br/>
الأسئلة كانت بتتوالى في دماغه زي ما بتتوالى عربيات المترو. سؤال ورا سؤال من غير وقفة.
<br/><br/>
تليفونه رن. أمه.
<br/><br/>
<span class="dialogue">— آلو؟</span>
<br/>
<span class="dialogue">— أدهم فين؟ بقالك ساعتين!</span>
<br/>
<span class="dialogue">— في الشقة يا ماما. جاي.</span>
<br/>
<span class="dialogue">— الأكل اتبرد!</span>
<br/>
<span class="dialogue">— جاي دلوقتي.</span>
<br/><br/>
لكنه ما قامش فوراً. قلّب الجواب في إيده مرة تانية. نزهة. الاسم عجيب وما بيتقالش كتير دلوقتي. زمان الناس كانوا بيسموا بناتهم نزهة. اسم فيه رايحة قديمة.
<br/><br/>
حط الجواب في جيبه. وقام. وقفل باب الشقة وراه بالمفتاح.

<span class="dialogue">— طارق مين؟</span>
<br/>
<span class="dialogue">— طارق نزهة.</span>
<br/><br/>
الجملة دي. "طارق نزهة." حد بيقول اسمه واسم أمه جوه اسمه. ده حد ما بيحطش اسم الأب في التعريف.
<br/><br/>
<span class="dialogue">— أنا عارفك.</span>
<br/>
الجملة طلعت من أدهم قبل ما يفكر. وبعد ما اتقالت، ما قدرش يرجع.
<br/><br/>
<span class="dialogue">— من فين؟</span>
<br/>
<span class="dialogue">— من حكاية طويلة. ممكن أحكيهالك؟</span>
<br/><br/>
<span class="part-title">— جزء رابع —</span>
طارق بص فيه بعيون ما تقراش سريع. بعدين بص في سلمى اللي كانت واقفة في الخلف. بعدين رجع أدهم.
<br/><br/>
<span class="dialogue">— تعالوا اقعدوا.</span>
<br/><br/>
في ركن في المكتبة في كرسيين قديمين وترابيزة صغيرة عليها فنجان قهوة. طارق جاب كرسي تالت وقعد.
<br/><br/>
وأدهم حكى. حكى كل حاجة. من الجواب. من عمه كمال. من أبيه. من سعاد. من شهادة الميلاد.
<br/><br/>
حكى ببطء وبترتيب. مش بإيمو كتير. بس بوضوح.
<br/><br/>
وطارق سمع. ما قطعش. عيونه كانت ثابتة ومركزة. زي حد بيسمع درس مهم.
<br/><br/>
لما أدهم خلّص، صمت.
<br/><br/>
<span class="part-title">— جزء خامس —</span>
الصمت دام دقائق. طارق شال الفنجان وشرب. وضعه. وبص في إيده.
<br/><br/>
<span class="dialogue">— أمي قالتلي إن أبي مات.</span>
<br/>
<span class="dialogue">— عارف.</span>
<br/>
<span class="dialogue">— وإنت بتقولي إنه لسه حي.</span>
<br/>
<span class="dialogue">— آه.</span>
<br/><br/>
طارق بص في الرف اللي قدامه. كتاب عن الفلسفة اليونانية. بص فيه بعيون مش بتقرأ.
<br/><br/>
<span class="dialogue">— أنا... أنا كنت دايماً حاسس إن في حاجة ناقصة في الحكاية. ناس بتتكلم وبتوقف. أسئلة ما بتتجاوبش. أمي — ربنا يرحمها — كانت إنسانة كاملة. بس في الموضوع ده كان عندها حاجة بتحجزها.</span>
<br/><br/>
<span class="dialogue">— هي كانت بتحميك.</span>
<br/>
<span class="dialogue">— عارف. بس الحماية أحياناً بتاخد منك حاجة مع ما بتديك.</span>
<br/><br/>
<span class="part-title">— جزء سادس —</span>
سلمى اللي ما اتكلمتش طول الوقت قالت:
<br/><br/>
<span class="dialogue">— إنت عايز تعرف؟</span>
<br/>
طارق بص فيها.
<br/><br/>
<span class="dialogue">— بمعنى إيه؟</span>
<br/>
<span class="dialogue">— عايز تقابل أبوك؟</span>
<br/><br/>
طارق ما رد فوراً. بص في الهوا قدامه.
<br/><br/>
<span class="dialogue">— مش عارف. ده سؤال كبير على دقيقتين.</span>
<br/>
<span class="dialogue">— طبعاً. ما أنا ما بطلبش منك تجاوب دلوقتي.</span>
<br/><br/>
أدهم قال:
<br/><br/>
<span class="dialogue">— أنا ما جيتش هنا عشان أبوي. جيت عشان أنا. عشان لاقيت جواب وأنا كنت محتاج أفهم. وفضلت أمشي وألاقي. لحد ما وصلتلك.</span>
<br/><br/>
<span class="dialogue">— وإنت عارف إنت لاقيت إيه؟</span>
<br/>
<span class="dialogue">— إني عندي أخ ما عرفتوش.</span>
<br/><br/>
<span class="part-title">— جزء سابع —</span>
الكلمة دي — "أخ" — وقفت في الهوا زي الدخان. مش بتتلاشى. بتفضل.
<br/><br/>
طارق بص في أدهم. عيون بيتأملوا. بيتحققوا. بيوزنوا.
<br/><br/>
<span class="dialogue">— إنت مش خايف إني أرفض الموضوع كله؟</span>
<br/>
<span class="dialogue">— خايف. بس ما قدرتش ما ييجيش.</span>
<br/>
<span class="dialogue">— ليه؟</span>
<br/>
<span class="dialogue">— لأن لو أنا في مكانك، كنت هيجيلي حد يقولي.</span>
<br/><br/>
طارق نظر إليه ثانية. ثم نظر إلى سلمى.
<br/><br/>
<span class="dialogue">— إنتوا التنين إخوتي؟</span>
<br/>
<span class="dialogue">— إيه ما أنا جايالك. وهي برضو جايالك.</span>
<br/><br/>
<span class="part-title">— جزء تامن —</span>
طارق قام وراح ورا الترابيزة. دور في درج وأخرج حاجة. رجع وحطها على الترابيزة.
<br/><br/>
صورة. صورة قديمة. امرأة شابة ووراها مجموعة. أدهم نظر فيها.
<br/><br/>
المرأة كانت نزهة. والجماعة ورايها كانوا ناس.
<br/><br/>
وفي ركن الصورة، في الطرف، في واحد كان أدهم قدر يتعرف عليه حتى لو في شبابه وحتى لو الصورة صغيرة.
<br/><br/>
الجد.
<br/><br/>
<span class="dialogue">— ده جدي.</span>
<br/>
<span class="dialogue">— عارف. أمي كانت بتقولي عليه. كانت بتقول "جدك سليمان". كنت أظن هي بتتكلم تعبيراً.</span>
<br/><br/>
أدهم بص فيه.
<br/><br/>
<span class="dialogue">— ما كانتش تعبير.</span>
<br/>
<span class="dialogue">— عارف دلوقتي.</span>
<br/><br/>
<span class="part-title">— جزء تاسع —</span>
خرجوا الثلاثة من المكتبة مع بعض. الشارع كان مزدحم بالوقت ده — الناس راجعة من شغلها. صوت العربيات والباعة والحياة اليومية اللي ما بتوقفش.
<br/><br/>
وقفوا على الرصيف.
<br/><br/>
<span class="dialogue">— إيه اللي بيحصل دلوقتي؟</span>
<br/>
طارق سأل. سؤال واضح وما فيش فيه تعقيد.
<br/><br/>
<span class="dialogue">— مش عارف بالظبط. بس في حاجة اتبنت النهارده ما كانتش موجودة أمبارح.</span>
<br/>
<span class="dialogue">— وأبوي؟ يعني محمد صبري؟</span>
<br/>
<span class="dialogue">— أبويا ما يعرفش إني جيتلك. وما يعرفش إنك موجود. ده قرارك — لو عايز يعرف أو لأ.</span>
<br/>
<span class="dialogue">— وإنت؟</span>
<br/>
<span class="dialogue">— أنا قولتلك اللي أنا محتاج أقوله. باقي الطريق، إنت اللي تختار.</span>
<br/><br/>
<span class="part-title">— جزء عاشر —</span>
بعد أسبوع.
<br/><br/>
أدهم قاعد في شقة أهله. الأسرة موجودة. أبوه. أمه. سلمى. وعمه كمال.
<br/><br/>
وفي الباب، طارق.
<br/><br/>
الباب اتفتح وطارق دخل وأدهم قدّمه ببساطة. ما أطال. ما بالغ. قال اسمه وقال اللي لازم يتقال.
<br/><br/>
المشهد ما كانش من أفلام. ما كانش دراما مبكية. كان صعب ومعقد وفيه لحظات صمت وفيه أسئلة وفيه دموع بكت على جنب من أمه — بس كانت دموع فاهمة، مش دموع مصدومة.
<br/><br/>
الأب. محمد صبري. وقف أمام طارق.
<br/><br/>
الاتنين اتأملوا في بعض. ثلاثين سنة في ثانية.
<br/><br/>
<span class="dialogue">— أنا آسف.</span>
<br/>
قالها الأب. جملة واحدة. بس فيها كل حاجة.
<br/><br/>
<span class="dialogue">— ما فيش داعي لأسف على حاجة إنت ما عرفتهاش.</span>
<br/>
طارق قالها بهدوء. هدوء إنسان فكّر في الحاجة دي كتير قبل ما ييجي.
<br/><br/>
<span class="part-title">— جزء حاداشر —</span>
في الليل، الكل انصرف غير أدهم وطارق. قعدوا في الأوضة الكبيرة. الضل خافت. في كوبايتين شاي.
<br/><br/>
<span class="dialogue">— إنت بتحب إيه؟</span>
<br/>
طارق سأل فجأة.
<br/><br/>
<span class="dialogue">— يعني؟</span>
<br/>
<span class="dialogue">— بتحب إيه في الحياة. مش الشغل ولا المسؤوليات. حاجة إنت بتحبها.</span>
<br/><br/>
أدهم فكر.
<br/><br/>
<span class="dialogue">— بحب الموسيقى. وبحب الليالي اللي الجو فيها بارد وبقعد على البلكونة من غير ما أعمل حاجة تانية. وبحب لما بلاقي خط كويس في تصميم — يعني خط في مكانه الصح.</span>
<br/><br/>
<span class="dialogue">— أنا بحب الكتب. وبحب لما حد بييجيلي في المكتبة وهو ما عارفش عايز إيه وأنا أختارله حاجة وتعجبه. ده بيديني حاجة.</span>
<br/><br/>
<span class="dialogue">— إيه الحاجة؟</span>
<br/>
<span class="dialogue">— إن الناس ممكن يتفاهموا حتى لو ما عرفوش بعض.</span>
<br/><br/>
<span class="part-title">— جزء اتناشر —</span>
قبل ما طارق يقوم يمشي، أدهم أخرج شيء من جيبه. ورقة. الجواب.
<br/><br/>
<span class="dialogue">— ده بتاعك أنت في الأصل.</span>
<br/>
قال أدهم وناوله الجواب.
<br/><br/>
طارق أخده وبص فيه. خط أمه. الكلمات بتاعتها. قرأ ببطء.
<br/><br/>
لما خلص، حط الجواب على الترابيزة بين الاتنين.
<br/><br/>
<span class="dialogue">— أمي كانت شجاعة.</span>
<br/>
<span class="dialogue">— شجاعة جداً.</span>
<br/>
<span class="dialogue">— وجدك... جدنا... كان بيحاول يصلح حاجة بعد ما اتكسرت.</span>
<br/>
<span class="dialogue">— آه. بطريقته. بالطريقة الوحيدة اللي عرفها.</span>
<br/><br/>
<span class="part-title">— جزء تالتاشر —</span>
طارق لما راح، أدهم فضل جالس لوحده. الشقة ساكتة. الجواب لسه على الترابيزة.
<br/><br/>
فكر في الجد. الحاج سليمان اللي عاش خمسة وثمانين سنة ومات وسايب وراه سر. بس السر ما كانش من النوع اللي بيتخفى من خيانة — كان من النوع اللي بيتخفى من خوف. خوف من إنه لو الحقيقة اتقالت هيوجع ناس أكتر.
<br/><br/>
الجد كان غلط. مش في النية — في الحساب. لأن الحقيقة، لو اتأخرت، ما بتوجعش أقل. بتوجع أكتر وعلى ناس أكتر.
<br/><br/>
بس الجد كمان كان بيحاول. كان بيساعد نزهة من غير ما حد يعرف. كان بيشيل تقل الموضوع لوحده. وده كان شكل من أشكال الندم — مش الندم اللي بيتقال بصوت عالي، الندم اللي بيعيشه حد في تصرفاته اليومية.
<br/><br/>
<span class="part-title">— جزء أربعتاشر — خاتمة —</span>
في الصبح الجاي، أدهم راح شقة الجد. مفتاحه لسه معاه.
<br/><br/>
الشقة نفسها. الأثاث. الرف. الصور. بس دلوقتي، أدهم بيبص فيها بعيون مختلفة. مش عيون حد بيشيل ذكريات — عيون حد بيفهم الحكاية ورا الذكريات.
<br/><br/>
وقف قدام الصورة. الصورة السوداء وبيضا. الجد وهو شاب. والست الواقفة جنبيه — اللي ما كانش أدهم يعرفها.
<br/><br/>
دلوقتي عرف.
<br/><br/>
دي مش ست مجهولة. دي نزهة. وكانت موجودة في الصورة دي عند الجد طول الوقت. والجد حافظ عليها.
<br/><br/>
إيه اللي الإنسان بيشيله طول حياته؟ إيه اللي بيسيبه ورا من غير ما ينتوي؟ ورقة في دراج. صورة على رف. عنوان في كتاب قديم.
<br/><br/>
الحياة مش بتتلخص في اللي بيتقال. بتتلخص في اللي بيتسيّب.
<br/><br/>
أدهم أخد الصورة من الرف. مشى بيها للشباك. الشمس كانت بتطلع على شبرا. الشارع بيصحى ببطء — عربية خضار بتمشي، حد بيفتح دكانه، كلاكيت باب عمارة قريبة بيتقفل.
<br/><br/>
نضر في الصورة مرة أخيرة. الجد. نزهة.
<br/><br/>
حطها في جيبه.
<br/><br/>
خرج من الشقة. قفل الباب. وقف لحظة في السلم.
<br/><br/>
طارق كان رن له الصبح ده. رسالة قصيرة:
<br/><br/>
<span class="dialogue">"أنا مبسوط إنك جيتلي."</span>
<br/><br/>
أدهم بعتله:
<br/><br/>
<span class="dialogue">"أنا برضو."</span>
<br/><br/>
وبعدها ثلاث نقط. وبعدها:
<br/><br/>
<span class="dialogue">"نروح نتغدى يوم الجمعة؟"</span>
<br/><br/>
أدهم ابتسم. أول مرة يبتسم من وهو بدأ الحكاية دي.
<br/><br/>
نزل السلم. وخرج على الشارع. والشمس كانت دافية ومش حارة. يوم بيبدأ بيبدأ.
<br/><br/>
والورقة الأخيرة كانت اتقرأت.`
  }
];

    /* ══════════════════════════════
       RENDER CHAPTER BUTTONS
    ══════════════════════════════ */
    const wrapper = document.getElementById('chaptersButtons');
    chapters.forEach((ch, i) => {
      const btn = document.createElement('button');
      btn.className = 'fall-btn';
      btn.innerHTML = `<span class="btn-top">
        <span class="btn-text-wrap">
          <strong>${ch.title}</strong>
          <span class="btn-preview">${ch.preview}</span>
        </span>
        <span class="btn-num">${i + 1}</span>
      </span>`;
      btn.onclick = () => goToChapter(i);
      wrapper.appendChild(btn);
    });

    /* ══════════════════════════════
       AVATAR
    ══════════════════════════════ */
    let avatarTimer = null;
    function toggleAvatarMsg() {
      const msg = document.getElementById('avatarMsg');
      msg.classList.add('show');
      clearTimeout(avatarTimer);
      avatarTimer = setTimeout(() => msg.classList.remove('show'), 3000);
    }

    /* ══════════════════════════════
       VIEW SWITCHING
    ══════════════════════════════ */
    function showView(id) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ══════════════════════════════
       GO TO CHAPTER
    ══════════════════════════════ */
    let msgTimer = null;

    function goToChapter(index) {
      const ch = chapters[index];
      const msg = document.getElementById('chapterMsg');
      document.getElementById('chapterMsgText').textContent = ch.preview;
      msg.classList.add('show');
      clearTimeout(msgTimer);

      document.getElementById('chapterLabel').textContent = ch.title;
      document.getElementById('chapterTitle').textContent = ch.title;
      document.getElementById('chapterContent').innerHTML = ch.content;

      msgTimer = setTimeout(() => {
        msg.classList.remove('show');
        stopMusic();
        showView('view-chapter');
      }, 800);
    }

    /* ══════════════════════════════
       GO BACK
    ══════════════════════════════ */
    function goBack() {
      stopMusic();
      showView('view-main');
    }

    /* ══════════════════════════════
       MUSIC
    ══════════════════════════════ */
    const songs = [
  'https://files.catbox.moe/lxndt.mp3',
  'https://files.catbox.moe/twmgbl.mp3',
  'https://files.catbox.moe/6qzo5p.mp3',
  'https://files.catbox.moe/cw8poa.mp3',
  'https://files.catbox.moe/hjqj1k.mp3',
  'https://files.catbox.moe/2bdoc7.mp3',
  'https://files.catbox.moe/cmzw9j.mp3',
  'https://files.catbox.moe/1dspxh.mp3',
  'https://files.catbox.moe/t5xnwb.mp3',
  'https://files.catbox.moe/aolqiy.mp3'
];

    let audio = null;
    let isPlaying = false;
    let statusTimer = null;

    function showMusicStatus(text) {
      const el = document.getElementById('musicStatus');
      el.textContent = text;
      el.classList.add('show');
      clearTimeout(statusTimer);
      statusTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    function getRandom(exclude) {
      let i;
      do { i = Math.floor(Math.random() * songs.length); }
      while (songs.length > 1 && songs[i] === exclude);
      return songs[i];
    }

    function stopMusic() {
      if (audio) { audio.pause(); audio.src = ''; }
      isPlaying = false;
      const btn = document.getElementById('musicBtn');
      if (btn) { btn.textContent = '♪ تشغيل موسيقى'; btn.classList.remove('music-active'); }
    }

    function handleMusic() {
      const btn = document.getElementById('musicBtn');
      if (!isPlaying) {
        if (!audio) audio = new Audio();
        audio.src = getRandom(null);
        audio.play().catch(() => showMusicStatus('⚠️ تعذّر التشغيل'));
        audio.onended = () => { audio.src = getRandom(audio.src); audio.play(); };
        isPlaying = true;
        btn.textContent = '⟳ تغيير الأغنية';
        btn.classList.add('music-active');
        showMusicStatus('♪ جاري التشغيل...');
      } else {
        const prev = audio.src;
        audio.src = getRandom(prev);
        audio.play().catch(() => showMusicStatus('⚠️ تعذّر التشغيل'));
        showMusicStatus('♪ تم تغيير الأغنية');
      }
    }
  </script>
